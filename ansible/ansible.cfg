[defaults]
inventory      = ./inventories/homelab/hosts.yaml
roles_path     = ./roles
collections_path = ./collections
retry_files_enabled = False
host_key_checking = False
vars_plugins_enabled = host_group_vars,community.sops.sops

[ssh_connection]
# Pipelining sends modules over stdin instead of staging temp files on the
# target. Besides being faster, it makes unprivileged become_user switches
# (e.g. netbox's postgres tasks) work without world-readable tmpfiles, which
# previously required remote_tmp=/tmp + allow_world_readable_tmpfiles.
pipelining = True
