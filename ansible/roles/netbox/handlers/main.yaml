---
- name: Reload systemd
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart netbox
  become: true
  ansible.builtin.service:
    name: netbox
    state: restarted

- name: Restart netbox-rq
  become: true
  ansible.builtin.service:
    name: netbox-rq
    state: restarted

- name: Restart nginx
  become: true
  ansible.builtin.service:
    name: nginx
    state: restarted
