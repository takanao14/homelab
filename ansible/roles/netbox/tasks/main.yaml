---
- name: Install dependencies
  become: true
  ansible.builtin.apt:
    name:
      - postgresql
      - redis-server
      - nginx
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - python3-psycopg2
      - build-essential
      - libxml2-dev
      - libxslt1-dev
      - libffi-dev
      - libpq-dev
      - libssl-dev
      - zlib1g-dev
    state: present
    update_cache: true

- name: Ensure PostgreSQL is started
  become: true
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: Ensure Redis is started
  become: true
  ansible.builtin.service:
    name: redis-server
    state: started
    enabled: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: Create netbox PostgreSQL database
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ netbox_db_name }}"
    encoding: UTF-8
    template: template0
  ignore_errors: "{{ ansible_check_mode }}"

- name: Create netbox PostgreSQL user
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ netbox_db_user }}"
    password: "{{ netbox_db_password }}"
  ignore_errors: "{{ ansible_check_mode }}"

- name: Grant database privileges to netbox PostgreSQL user
  become: true
  become_user: postgres
  community.postgresql.postgresql_privs:
    database: "{{ netbox_db_name }}"
    roles: "{{ netbox_db_user }}"
    type: database
    privs: ALL
  ignore_errors: "{{ ansible_check_mode }}"

- name: Grant schema privileges to netbox PostgreSQL user
  become: true
  become_user: postgres
  community.postgresql.postgresql_privs:
    database: "{{ netbox_db_name }}"
    roles: "{{ netbox_db_user }}"
    type: schema
    objs: public
    privs: ALL
  ignore_errors: "{{ ansible_check_mode }}"

- name: Create netbox group
  become: true
  ansible.builtin.group:
    name: "{{ netbox_group }}"
    system: true
    state: present

- name: Create netbox user
  become: true
  ansible.builtin.user:
    name: "{{ netbox_user }}"
    group: "{{ netbox_group }}"
    shell: /usr/sbin/nologin
    create_home: false
    system: true
    state: present

- name: Download NetBox
  become: true
  ansible.builtin.get_url:
    url: "https://github.com/netbox-community/netbox/archive/refs/tags/v{{ netbox_version }}.tar.gz"
    dest: "/tmp/netbox-{{ netbox_version }}.tar.gz"
    mode: '0644'

- name: Extract NetBox
  become: true
  ansible.builtin.unarchive:
    src: "/tmp/netbox-{{ netbox_version }}.tar.gz"
    dest: /opt/
    remote_src: true
    creates: "/opt/netbox-{{ netbox_version }}"
  ignore_errors: "{{ ansible_check_mode }}"

- name: Symlink netbox directory
  become: true
  ansible.builtin.file:
    src: "/opt/netbox-{{ netbox_version }}"
    dest: "{{ netbox_home }}"
    state: link
    force: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: Set ownership on netbox writable directories
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ netbox_user }}"
    group: "{{ netbox_group }}"
    recurse: true
  loop:
    - "{{ netbox_home }}/netbox/media"
    - "{{ netbox_home }}/netbox/reports"
    - "{{ netbox_home }}/netbox/scripts"
  ignore_errors: "{{ ansible_check_mode }}"

- name: Create Python virtualenv and install requirements
  become: true
  ansible.builtin.pip:
    requirements: "{{ netbox_home }}/requirements.txt"
    virtualenv: "{{ netbox_venv }}"
    virtualenv_command: python3 -m venv
  ignore_errors: "{{ ansible_check_mode }}"

- name: Install gunicorn in virtualenv
  become: true
  ansible.builtin.pip:
    name: gunicorn
    virtualenv: "{{ netbox_venv }}"
  ignore_errors: "{{ ansible_check_mode }}"

- name: Deploy NetBox configuration
  become: true
  ansible.builtin.template:
    src: configuration.py.j2
    dest: "{{ netbox_home }}/netbox/netbox/configuration.py"
    owner: "{{ netbox_user }}"
    group: "{{ netbox_group }}"
    mode: '0640'
  notify: restart netbox
  ignore_errors: "{{ ansible_check_mode }}"

- name: Run NetBox database migrations
  become: true
  ansible.builtin.command:
    cmd: "{{ netbox_venv }}/bin/python netbox/manage.py migrate"
    chdir: "{{ netbox_home }}"
  register: migrate_result
  changed_when: "'No migrations to apply' not in migrate_result.stdout"
  when: not ansible_check_mode

- name: Collect static files
  become: true
  ansible.builtin.command:
    cmd: "{{ netbox_venv }}/bin/python netbox/manage.py collectstatic --no-input"
    chdir: "{{ netbox_home }}"
  changed_when: true
  when: not ansible_check_mode

- name: Set ownership on static files directory
  become: true
  ansible.builtin.file:
    path: "{{ netbox_home }}/netbox/static"
    owner: "{{ netbox_user }}"
    group: "{{ netbox_group }}"
    recurse: true
  when: not ansible_check_mode

- name: Create NetBox superuser
  become: true
  ansible.builtin.command:
    cmd: >
      {{ netbox_venv }}/bin/python netbox/manage.py shell -c
      "from django.contrib.auth import get_user_model;
      User = get_user_model();
      User.objects.filter(username='{{ netbox_superuser_name }}').exists() or
      User.objects.create_superuser('{{ netbox_superuser_name }}', '{{ netbox_superuser_email }}', '{{ netbox_superuser_password }}')"
    chdir: "{{ netbox_home }}"
  changed_when: false
  when: not ansible_check_mode

- name: Deploy gunicorn config
  become: true
  ansible.builtin.template:
    src: gunicorn.py.j2
    dest: "{{ netbox_home }}/gunicorn.py"
    owner: "{{ netbox_user }}"
    group: "{{ netbox_group }}"
    mode: '0644'
  notify: restart netbox
  ignore_errors: "{{ ansible_check_mode }}"

- name: Deploy netbox systemd unit
  become: true
  ansible.builtin.template:
    src: netbox.service.j2
    dest: /etc/systemd/system/netbox.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart netbox

- name: Deploy netbox-rq systemd unit
  become: true
  ansible.builtin.template:
    src: netbox-rq.service.j2
    dest: /etc/systemd/system/netbox-rq.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart netbox-rq

- name: Ensure netbox is started and enabled
  become: true
  ansible.builtin.service:
    name: netbox
    state: started
    enabled: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: Ensure netbox-rq is started and enabled
  become: true
  ansible.builtin.service:
    name: netbox-rq
    state: started
    enabled: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: Deploy nginx config for netbox
  become: true
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/netbox
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx

- name: Enable nginx site for netbox
  become: true
  ansible.builtin.file:
    src: /etc/nginx/sites-available/netbox
    dest: /etc/nginx/sites-enabled/netbox
    state: link
  notify: restart nginx

- name: Remove nginx default site
  become: true
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Ensure nginx is started and enabled
  become: true
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
