---
# renovate: datasource=github-releases depName=dmachard/DNS-collector
dnscollector_version: "2.2.2"
dnscollector_loki_url: "{{ loki_endpoint }}"
dnscollector_dnsdist_socket: "/run/dnstap-dnsdist.sock"
dnscollector_debug: false

_dnscollector_arch_map:
  x86_64: amd64
  aarch64: arm64
dnscollector_arch: "{{ _dnscollector_arch_map[ansible_facts['architecture']] }}"
