---
- name: Validate dnsdist supported OS
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
      - ansible_facts['distribution'] == 'Ubuntu'
    fail_msg: "dnsdist role currently supports Ubuntu only."

- name: Validate required environment variables
  ansible.builtin.assert:
    that:
      - primary_auth_server | length > 0
      - secondary_auth_servers | length > 0
      - dnsdist_web_password | length > 0
      - dnsdist_web_api_key | length > 0
      - dnsdist_console_key | length > 0
      - dnsdist_mgmt_acl | length > 0
      - dnsdist_console_acl | length > 0
      - dnsdist_internal_domains | length > 0
      - dnsdist_internal_check_name | length > 0
    fail_msg: "Required environment variables (PRIMARY_AUTH_SERVER, etc.) are missing. Check your .envrc.prd.dev."

- name: Ensure apt keyring directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install deb822 repository prerequisites
  become: true
  ansible.builtin.apt:
    name: python3-debian
    state: present
    update_cache: true

- name: Install PowerDNS repository key
  become: true
  ansible.builtin.get_url:
    url: "{{ dnsdist_repo_key_url }}"
    dest: "{{ dnsdist_repo_key_path }}"
    mode: "0644"

- name: Configure dnsdist apt pinning
  become: true
  ansible.builtin.copy:
    dest: "{{ dnsdist_repo_pin_path }}"
    mode: "0644"
    content: |
      Package: dnsdist*
      Pin: origin repo.powerdns.com
      Pin-Priority: 600

# deb822_repository replaces apt_repository (deprecated, removal in
# ansible-core 2.25). Writes dnsdist.sources instead of dnsdist.list.
- name: Configure PowerDNS dnsdist repository
  become: true
  ansible.builtin.deb822_repository:
    name: dnsdist
    uris: "{{ dnsdist_repo_base_url }}"
    suites: "{{ dnsdist_repo_release }}-{{ dnsdist_repo_channel }}"
    components: main
    signed_by: "{{ dnsdist_repo_key_path }}"
  register: dnsdist_repo

- name: Remove legacy dnsdist.list written by apt_repository
  become: true
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/dnsdist.list
    state: absent
  register: dnsdist_legacy_list

- name: Update apt cache after repository change  # noqa no-handler
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: dnsdist_repo.changed or dnsdist_legacy_list.changed

- name: Install dnsdist package
  become: true
  ansible.builtin.apt:
    name: dnsdist
    state: present

- name: Deploy dnsdist configuration
  become: true
  ansible.builtin.template:
    src: dnsdist.conf.j2
    dest: /etc/dnsdist/dnsdist.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnsdist

- name: Ensure dnsdist service is enabled and started
  become: true
  ansible.builtin.systemd:
    name: dnsdist
    enabled: true
    state: started
    daemon_reload: true
