---
# Fallback address for dnsdist frontend bind/web UI.
# By default use the primary IPv4 fact; override per-host if needed.
dnsdist_server_addr: "{{ ansible_facts['default_ipv4'].address | default(ansible_host) }}"

dnsdist_repo_base_url: "http://repo.powerdns.com/ubuntu"
dnsdist_repo_release: "{{ ansible_facts['distribution_release'] | default('noble') }}"
dnsdist_repo_channel: "dnsdist-20"
dnsdist_repo_key_url: "https://repo.powerdns.com/FD380FBB-pub.asc"
dnsdist_repo_validate_certs: true
dnsdist_repo_key_path: "/etc/apt/keyrings/dnsdist-20-pub.asc"
dnsdist_repo_pin_path: "/etc/apt/preferences.d/dnsdist-20"

dnsdist_mgmt_acl: "127.0.0.1/32,192.168.0.0/16,10.0.0.0/8"
dnsdist_console_acl: "127.0.0.1/32"

dnsdist_packet_cache_size: 10000
dnsdist_packet_cache_max_ttl: 86400

dnsdist_internal_domains:
  - "home.butaco.net."
  - "prd.butaco.net."
  - "dev.butaco.net."
dnsdist_internal_check_name: "ns1.home.butaco.net."

# Secrets - loaded via community.sops.sops from group_vars/dnsdist.sops.yaml
dnsdist_web_password: "{{ DNSDIST_WEB_PASSWORD }}"
dnsdist_web_api_key: "{{ DNSDIST_WEB_API_KEY }}"
dnsdist_console_key: "{{ DNSDIST_CONSOLE_KEY }}"

# Backend Servers Configuration
# Builds one backend entry per element in secondary_auth_servers.
# Adding or removing a secondary only requires updating that list.
dnsdist_internal_backends: >-
  {{ secondary_auth_servers
     | map('combine', {'pool': 'internal', 'checkName': dnsdist_internal_check_name, 'checkType': 'A'})
     | list }}

dnsdist_default_backends: >-
  {{ dnsdist_default_servers
     | map('combine', {'pool': '', 'checkType': 'A'})
     | list }}
