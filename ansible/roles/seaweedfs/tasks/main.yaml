---
- name: Create seaweedfs group
  become: true
  ansible.builtin.group:
    name: "{{ seaweedfs_group }}"
    system: true
    state: present

- name: Create seaweedfs user
  become: true
  ansible.builtin.user:
    name: "{{ seaweedfs_user }}"
    group: "{{ seaweedfs_group }}"
    home: "{{ seaweedfs_data_dir }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false
    state: present

- name: Create required directories
  become: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ seaweedfs_download_dir }}", owner: root, group: root, mode: '0755' }
    - { path: "{{ seaweedfs_config_dir }}", owner: root, group: "{{ seaweedfs_group }}", mode: '0750' }
    - { path: "{{ seaweedfs_data_dir }}", owner: "{{ seaweedfs_user }}", group: "{{ seaweedfs_group }}", mode: '0750' }
  loop_control:
    label: "{{ item.path }}"

- name: Download SeaweedFS archive
  become: true
  ansible.builtin.get_url:
    url: "https://github.com/seaweedfs/seaweedfs/releases/download/{{ seaweedfs_version }}/linux_amd64.tar.gz"
    dest: "{{ seaweedfs_download_dir }}/seaweedfs-{{ seaweedfs_version }}.tar.gz"
    owner: root
    group: root
    mode: '0644'
  register: seaweedfs_download

- name: Install weed binary  # noqa no-handler
  become: true
  ansible.builtin.unarchive:
    src: "{{ seaweedfs_download_dir }}/seaweedfs-{{ seaweedfs_version }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    owner: root
    group: root
    mode: '0755'
  when: seaweedfs_download.changed
  notify: Restart seaweedfs

- name: Deploy S3 identity configuration
  become: true
  ansible.builtin.template:
    src: s3.json.j2
    dest: "{{ seaweedfs_s3_config }}"
    owner: root
    group: "{{ seaweedfs_group }}"
    mode: '0640'
  no_log: true
  notify: Restart seaweedfs

- name: Deploy SeaweedFS systemd unit
  become: true
  ansible.builtin.template:
    src: seaweedfs.service.j2
    dest: /etc/systemd/system/seaweedfs.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart seaweedfs

- name: Ensure seaweedfs is started and enabled
  become: true
  ansible.builtin.service:
    name: seaweedfs
    state: started
    enabled: true

- name: Apply SeaweedFS service changes before bucket management
  ansible.builtin.meta: flush_handlers

- name: Install rclone
  become: true
  ansible.builtin.apt:
    name: rclone
    state: present
    update_cache: true
  when: (seaweedfs_public_buckets | length > 0) or (seaweedfs_backup_enabled | bool)

- name: Ensure SeaweedFS public buckets exist
  become: true
  ansible.builtin.command:
    argv:
      - rclone
      - mkdir
      - "seaweedfs:{{ item }}"
  environment:
    RCLONE_CONFIG_SEAWEEDFS_TYPE: s3
    RCLONE_CONFIG_SEAWEEDFS_PROVIDER: Other
    RCLONE_CONFIG_SEAWEEDFS_ACCESS_KEY_ID: "{{ seaweedfs_s3_access_key }}"
    RCLONE_CONFIG_SEAWEEDFS_SECRET_ACCESS_KEY: "{{ seaweedfs_s3_secret_key }}"
    RCLONE_CONFIG_SEAWEEDFS_ENDPOINT: "http://127.0.0.1:{{ seaweedfs_s3_port }}"
    RCLONE_CONFIG_SEAWEEDFS_REGION: us-east-1
  loop: "{{ seaweedfs_public_buckets }}"
  loop_control:
    label: "{{ item }}"
  register: seaweedfs_bucket_create
  vars:
    seaweedfs_bucket_create_output: "{{ (seaweedfs_bucket_create.stdout ~ ' ' ~ seaweedfs_bucket_create.stderr) | lower }}"
  changed_when: "'already' not in seaweedfs_bucket_create_output and 'exists' not in seaweedfs_bucket_create_output"
  failed_when: >
    seaweedfs_bucket_create.rc != 0 and
    'already' not in seaweedfs_bucket_create_output and
    'exists' not in seaweedfs_bucket_create_output
  no_log: true
  when:
    - not ansible_check_mode
    - seaweedfs_public_buckets | length > 0

- name: Configure SeaweedFS admin UI
  when: seaweedfs_admin_enabled | bool
  block:
    - name: Create admin data directory
      become: true
      ansible.builtin.file:
        path: "{{ seaweedfs_admin_data_dir }}"
        state: directory
        owner: "{{ seaweedfs_user }}"
        group: "{{ seaweedfs_group }}"
        mode: '0750'

    - name: Deploy admin UI environment file
      become: true
      ansible.builtin.template:
        src: admin.env.j2
        dest: "{{ seaweedfs_admin_env_file }}"
        owner: root
        group: "{{ seaweedfs_group }}"
        mode: '0640'
      no_log: true
      notify: Restart seaweedfs-admin

    - name: Deploy SeaweedFS admin systemd unit
      become: true
      ansible.builtin.template:
        src: seaweedfs-admin.service.j2
        dest: /etc/systemd/system/seaweedfs-admin.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd
        - Restart seaweedfs-admin

    - name: Ensure seaweedfs-admin is started and enabled
      become: true
      ansible.builtin.service:
        name: seaweedfs-admin
        state: started
        enabled: true

- name: Configure R2 -> SeaweedFS state backup
  when: seaweedfs_backup_enabled | bool
  block:
    - name: Deploy rclone configuration
      become: true
      ansible.builtin.template:
        src: rclone.conf.j2
        dest: "{{ seaweedfs_backup_rclone_config }}"
        owner: root
        group: "{{ seaweedfs_group }}"
        mode: '0640'
      no_log: true

    - name: Deploy backup service unit
      become: true
      ansible.builtin.template:
        src: seaweedfs-backup.service.j2
        dest: /etc/systemd/system/seaweedfs-backup.service
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd

    - name: Deploy backup timer unit
      become: true
      ansible.builtin.template:
        src: seaweedfs-backup.timer.j2
        dest: /etc/systemd/system/seaweedfs-backup.timer
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd

    - name: Ensure backup timer is started and enabled
      become: true
      ansible.builtin.systemd:
        name: seaweedfs-backup.timer
        state: started
        enabled: true
        daemon_reload: true
