---
- name: Install prerequisites
  # https://rocm.docs.amd.com/en/latest/install/rocm.html (Prerequisites, Install additional packages)
  become: true
  ansible.builtin.apt:
    name:
      - wget
      - python3-debian
      - libatomic1
      - libquadmath0
    state: present
    update_cache: true

- name: Add user to render and video groups
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts['env']['USER'] }}"
    groups:
      - render
      - video
    append: true

- name: Download amdgpu-insecure-instinct-udev-rules
  ansible.builtin.get_url:
    url: "https://repo.radeon.com/amdgpu/{{ rocm_amdgpu_version }}/ubuntu/pool/main/a/amdgpu-insecure-instinct-udev-rules/{{ rocm_udev_rules }}"
    dest: "/tmp/{{ rocm_udev_rules }}"
    mode: '0644'

- name: Grant GPU access to all users on the system
  become: true
  ansible.builtin.apt:
    deb: "/tmp/{{ rocm_udev_rules }}"
    state: present
    update_cache: true
  when: not ansible_check_mode

- name: Ensure apt keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
    owner: root
    group: root
    recurse: true

- name: Download ROCm GPG key
  become: true
  ansible.builtin.get_url:
    url: https://repo.radeon.com/rocm/rocm.gpg.key
    dest: /tmp/rocm.gpg.key
    mode: '0644'

- name: Add ROCm GPG key to keyring
  become: true
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/rocm.gpg /tmp/rocm.gpg.key
    creates: /etc/apt/keyrings/rocm.gpg

# ROCm 7.14 moved its apt repo to repo.amd.com under a separate signing key
# from the repo.radeon.com key above, which still signs the amdgpu and
# device-metrics-exporter repos.
- name: Download ROCm 7.14+ apt repository GPG key
  become: true
  ansible.builtin.get_url:
    url: https://repo.amd.com/rocm/packages-multi-arch/gpg/rocm.gpg
    dest: /tmp/amdrocm.gpg.key
    mode: '0644'

- name: Add ROCm 7.14+ apt repository GPG key to keyring
  become: true
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/amdrocm.gpg /tmp/amdrocm.gpg.key
    creates: /etc/apt/keyrings/amdrocm.gpg

- name: Add ROCm apt preferences pin
  become: true
  ansible.builtin.copy:
    src: rocm-pin-600
    dest: /etc/apt/preferences.d/rocm-pin-600
    mode: '0644'
    owner: root
    group: root

# Legacy "rocm"/"rocm-core" packages (ROCm <= 7.2.4, from the old
# repo.radeon.com/rocm/apt/<version> repo) are not upgraded in place by the
# new gfx-specific amdrocm<series>-<target> packages; AMD's install docs
# require removing them before installing the new package set.
#
# Do NOT set autoremove here: rocm is a metapackage whose dev components pull
# in general build tooling (cmake, python3-dev, opencv, gstreamer, ...), and
# autoremove would drag all of that out in one huge dpkg transaction. On a
# host whose amdgpu-dkms cannot build against the running kernel, that large
# transaction also trips a kernel-header reconfigure and leaves dpkg broken.
# Remove only the ROCm meta-packages; orphaned old ROCm libs live under the
# flat /opt/rocm and do not collide with the versioned /opt/rocm/*/ layout of
# 7.14.
- name: Purge legacy ROCm packages predating the repo.amd.com apt repo
  become: true
  ansible.builtin.apt:
    name:
      - rocm
      - rocm-core
    state: absent
    purge: true

- name: Configure ROCm apt repository
  become: true
  ansible.builtin.deb822_repository:
    name: rocm
    types:
      - deb
    uris:
      - https://repo.amd.com/rocm/packages-multi-arch/ubuntu2404
    suites:
      - stable
    components:
      - main
    architectures:
      - amd64
    signed_by: /etc/apt/keyrings/amdrocm.gpg
    state: present
    mode: '0644'
  register: rocm_apt_repository

- name: Configure AMD Deb822 repositories
  become: true
  ansible.builtin.deb822_repository:
    name: "{{ item.name }}"
    types:
      - deb
    uris:
      - "{{ item.uri }}"
    suites:
      - "{{ rocm_ubuntu_codename }}"
    components:
      - main
    architectures:
      - amd64
    signed_by: /etc/apt/keyrings/rocm.gpg
    state: present
    mode: '0644'
  loop:
    - name: amdgpu
      uri: "https://repo.radeon.com/amdgpu/{{ rocm_amdgpu_version }}/ubuntu"
    - name: device-metrics-exporter
      uri: "https://repo.radeon.com/device-metrics-exporter/apt/{{ rocm_device_metrics_exporter_version }}"
  register: rocm_deb822_repositories

# ROCm 7.14 dropped the separate rocm-graphics apt repo; "graphics" packages
# are now selected as an install-time option of the runfile/pip installers
# instead of a standalone repo.
- name: Remove obsolete rocm-graphics apt repository
  become: true
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/rocm-graphics.sources
    state: absent

- name: Update apt cache after repository changes
  become: true
  ansible.builtin.apt:
    update_cache: true
  when:
    - not ansible_check_mode
    - rocm_apt_repository.changed or rocm_deb822_repositories.changed

# Install the specific AMD-supported HWE kernel and its headers/modules
# before building amdgpu-dkms. dkms builds the module for every installed
# kernel that has headers, so an unsupported kernel left installed (e.g. a
# 7.0 pulled in by the rolling HWE meta) would make the amdgpu build fail and
# break dpkg. Pin one supported kernel via rocm_hwe_kernel.
- name: Install the ROCm-supported pinned HWE kernel
  become: true
  ansible.builtin.apt:
    name:
      - "linux-image-{{ rocm_hwe_kernel }}"
      - "linux-headers-{{ rocm_hwe_kernel }}"
      - "linux-modules-extra-{{ rocm_hwe_kernel }}"
    state: present
    update_cache: true

# Hold the rolling HWE metapackages so future apt upgrades don't reintroduce
# an unsupported kernel. Removal of an already-installed unsupported kernel is
# a one-time manual step: it can't be removed while it is the running kernel.
- name: Hold rolling HWE metapackages at their current version
  become: true
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - linux-generic-hwe-24.04
    - linux-headers-generic-hwe-24.04
    - linux-image-generic-hwe-24.04
  failed_when: false

- name: Gather kernel facts
  ansible.builtin.setup:
    gather_subset:
      - kernel

- name: Assert the running kernel is the ROCm-supported pinned kernel
  ansible.builtin.assert:
    that:
      - ansible_facts['kernel'] == rocm_hwe_kernel
    fail_msg: >-
      Running kernel {{ ansible_facts['kernel'] }} is not the ROCm-supported
      pinned kernel {{ rocm_hwe_kernel }}. amdgpu-dkms only builds cleanly on
      AMD-supported kernels, so boot into {{ rocm_hwe_kernel }} (set it as the
      GRUB default and reboot, removing unsupported kernels such as 7.x) before
      running this role.
    success_msg: "Running the ROCm-supported kernel {{ rocm_hwe_kernel }}."
  when: not ansible_check_mode

- name: Read available boot partition space before AMD GPU driver upgrade
  ansible.builtin.command:
    argv:
      - df
      - --output=avail
      - --block-size=1M
      - /boot
  register: rocm_boot_available
  changed_when: false
  when: rocm_amdgpu_package_state == 'latest'

- name: Verify boot partition space before AMD GPU driver upgrade
  ansible.builtin.assert:
    that:
      - rocm_boot_available.stdout_lines[-1] | int >= rocm_amdgpu_minimum_boot_free_mb
    fail_msg: >-
      /boot requires at least {{ rocm_amdgpu_minimum_boot_free_mb }} MB free before upgrading amdgpu-dkms;
      only {{ rocm_boot_available.stdout_lines[-1] | int }} MB is available.
  when: rocm_amdgpu_package_state == 'latest'

- name: Install AMD GPU kernel driver
  become: true
  ansible.builtin.apt:
    name: amdgpu-dkms
    state: "{{ rocm_amdgpu_package_state }}"
    update_cache: true
  register: rocm_amdgpu_install

- name: Install ROCm
  become: true
  ansible.builtin.apt:
    name:
      - "{{ rocm_package_name }}"
    state: "{{ rocm_package_state }}"
    update_cache: true
  async: 3600
  poll: 30

# ROCm 7.14 installs each component into its own versioned subdirectory
# under /opt/rocm (e.g. /opt/rocm/core-7.14/lib) instead of a flat
# /opt/rocm/{lib,lib64}, and the exact set of subdirectories depends on
# which component/gfx packages are installed. Discover them rather than
# hardcoding names ldconfig itself cannot glob-expand.
- name: Discover ROCm component library directories
  ansible.builtin.command:
    cmd: find /opt/rocm -mindepth 2 -maxdepth 2 -type d -name lib
  register: rocm_lib_dirs
  changed_when: false
  when: not ansible_check_mode

- name: Assert ROCm component library directories were found
  ansible.builtin.assert:
    that:
      - rocm_lib_dirs.stdout_lines | length > 0
    fail_msg: "No /opt/rocm/*/lib directories found after installing ROCm; check the amdrocm package layout."
  when: not ansible_check_mode

- name: Configure ROCm library path
  become: true
  ansible.builtin.copy:
    dest: /etc/ld.so.conf.d/rocm.conf
    content: |
      {{ rocm_lib_dirs.stdout }}
    owner: root
    group: root
    mode: '0644'
  when: not ansible_check_mode

- name: Update ldconfig
  become: true
  ansible.builtin.command:
    cmd: ldconfig
  changed_when: false

- name: Reboot to apply AMD GPU driver
  become: true
  ansible.builtin.reboot:
    reboot_timeout: 300
  when:
    - rocm_amdgpu_install.changed
    - not ansible_check_mode

- name: Install amdgpu-exporter
  become: true
  ansible.builtin.apt:
    name: amdgpu-exporter
    state: present
    update_cache: true

- name: Enable and start gpuagent
  become: true
  ansible.builtin.service:
    name: gpuagent
    state: started
    enabled: true

- name: Enable and start amd-metrics-exporter
  become: true
  ansible.builtin.service:
    name: amd-metrics-exporter
    state: started
    enabled: true

- name: Read installed ROCm package version
  ansible.builtin.command:
    argv:
      - dpkg-query
      - --show
      - --showformat=${Version}
      - "{{ rocm_package_name }}"
  register: rocm_installed_version
  changed_when: false
  when: not ansible_check_mode

- name: Verify installed ROCm package version
  ansible.builtin.assert:
    that:
      # Debian package version carries a "-<revision>" suffix (e.g. 7.14.0-3)
      # not present in rocm_version, so match on the upstream version prefix.
      - rocm_installed_version.stdout.startswith(rocm_version)
    fail_msg: "Installed ROCm {{ rocm_installed_version.stdout }} does not match requested {{ rocm_version }}."
    success_msg: "ROCm {{ rocm_installed_version.stdout }} is installed."
  when: not ansible_check_mode

- name: Discover ROCm component bin directories
  ansible.builtin.command:
    cmd: find /opt/rocm -mindepth 2 -maxdepth 2 -type d -name bin
  register: rocm_bin_dirs
  changed_when: false
  when: not ansible_check_mode

- name: Locate hipcc and rocminfo binaries
  ansible.builtin.find:
    paths: "{{ rocm_bin_dirs.stdout_lines }}"
    patterns:
      - hipcc
      - rocminfo
    file_type: file
  register: rocm_verify_bins
  when: not ansible_check_mode

- name: Assert hipcc and rocminfo were found
  ansible.builtin.assert:
    that:
      - rocm_verify_bins.files | selectattr('path', 'match', '.*/hipcc$') | list | length > 0
      - rocm_verify_bins.files | selectattr('path', 'match', '.*/rocminfo$') | list | length > 0
    fail_msg: >-
      Could not locate hipcc and/or rocminfo under any /opt/rocm/*/bin directory;
      found bin dirs: {{ rocm_bin_dirs.stdout_lines }}
  when: not ansible_check_mode

- name: Verify HIP compiler
  ansible.builtin.command:
    cmd: "{{ (rocm_verify_bins.files | selectattr('path', 'match', '.*/hipcc$') | first).path }} --version"
  changed_when: false
  when: not ansible_check_mode

- name: Verify ROCm detects a GPU
  ansible.builtin.command:
    cmd: "{{ (rocm_verify_bins.files | selectattr('path', 'match', '.*/rocminfo$') | first).path }}"
  register: rocm_info
  changed_when: false
  when: not ansible_check_mode

- name: Assert ROCm detected a GPU agent
  ansible.builtin.assert:
    that:
      - "'Device Type:             GPU' in rocm_info.stdout"
    fail_msg: ROCm did not detect a GPU agent.
    success_msg: ROCm detected a GPU agent.
  when: not ansible_check_mode
