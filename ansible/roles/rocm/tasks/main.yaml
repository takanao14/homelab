---
- name: Install prerequisites
  become: true
  ansible.builtin.apt:
    name:
      - wget
      - python3-setuptools
      - python3-wheel
    state: present
    update_cache: true

- name: Download amdgpu-install package
  become: true
  ansible.builtin.get_url:
    url: "https://repo.radeon.com/amdgpu-install/7.2.1/ubuntu/noble/amdgpu-install_7.2.1.70201-1_all.deb"
    dest: /tmp/amdgpu-install.deb
    mode: '0644'

- name: Install amdgpu-install package
  become: true
  ansible.builtin.apt:
    deb: /tmp/amdgpu-install.deb
    state: present

- name: Install HWE kernel and headers
  become: true
  ansible.builtin.apt:
    name:
      - linux-generic-hwe-24.04
      - linux-headers-generic-hwe-24.04
    state: present

- name: Reboot to apply HWE kernel
  become: true
  ansible.builtin.reboot:
    reboot_timeout: 300
  when: not ansible_check_mode

- name: Gather facts after reboot
  ansible.builtin.setup:

- name: Install kernel headers for running kernel
  become: true
  ansible.builtin.apt:
    name:
      - "linux-headers-{{ ansible_facts['kernel'] }}"
      - "linux-modules-extra-{{ ansible_facts['kernel'] }}"
    state: present
    update_cache: true

- name: Install amdgpu-dkms and ROCm
  become: true
  ansible.builtin.apt:
    name:
      - amdgpu-dkms
      - rocm
    state: present
    update_cache: true
  async: 3600
  poll: 30

- name: Add user to render and video groups
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts['env']['USER'] }}"
    groups:
      - render
      - video
    append: true

- name: Configure ROCm library path
  become: true
  ansible.builtin.copy:
    dest: /etc/ld.so.conf.d/rocm.conf
    content: |
      /opt/rocm/lib
      /opt/rocm/lib64
    owner: root
    group: root
    mode: '0644'

- name: Update ldconfig
  become: true
  ansible.builtin.command:
    cmd: ldconfig
  changed_when: false

- name: Reboot to apply GPU driver
  become: true
  ansible.builtin.reboot:
    reboot_timeout: 300
  when: not ansible_check_mode

- name: Add device-metrics-exporter apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/device-metrics-exporter/apt/1.4.0 noble main"
    filename: device-metrics-exporter
    state: present

- name: Install amdgpu-exporter
  become: true
  ansible.builtin.apt:
    name: amdgpu-exporter
    state: present
    update_cache: true

- name: Enable and start gpuagent
  become: true
  ansible.builtin.service:
    name: gpuagent
    state: started
    enabled: true

- name: Enable and start amd-metrics-exporter
  become: true
  ansible.builtin.service:
    name: amd-metrics-exporter
    state: started
    enabled: true
