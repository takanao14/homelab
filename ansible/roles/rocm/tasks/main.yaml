---
- name: Install prerequisites
  # https://rocm.docs.amd.com/projects/install-on-linux/en/latest/install/prerequisites.html
  become: true
  ansible.builtin.apt:
    name:
      - wget
      - python3-debian
      - python3-setuptools
      - python3-wheel
    state: present
    update_cache: true

- name: Install optional packages
  become: true
  ansible.builtin.apt:
    name:
      - environment-modules
    state: present
    update_cache: true

- name: Add user to render and video groups
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts['env']['USER'] }}"
    groups:
      - render
      - video
    append: true

- name: Download amdgpu-insecure-instinct-udev-rules
  ansible.builtin.get_url:
    url: "https://repo.radeon.com/amdgpu/{{ rocm_amdgpu_version }}/ubuntu/pool/main/a/amdgpu-insecure-instinct-udev-rules/{{ rocm_udev_rules }}"
    dest: "/tmp/{{ rocm_udev_rules }}"
    mode: '0644'

- name: Grant GPU access to all users on the system
  become: true
  ansible.builtin.apt:
    deb: "/tmp/{{ rocm_udev_rules }}"
    state: present
    update_cache: true
  when: not ansible_check_mode

- name: Ensure apt keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
    owner: root
    group: root
    recurse: true

- name: Download ROCm GPG key
  become: true
  ansible.builtin.get_url:
    url: https://repo.radeon.com/rocm/rocm.gpg.key
    dest: /tmp/rocm.gpg.key
    mode: '0644'

- name: Add ROCm GPG key to keyring
  become: true
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/rocm.gpg /tmp/rocm.gpg.key
    creates: /etc/apt/keyrings/rocm.gpg

- name: Add ROCm apt preferences pin
  become: true
  ansible.builtin.copy:
    src: rocm-pin-600
    dest: /etc/apt/preferences.d/rocm-pin-600
    mode: '0644'
    owner: root
    group: root

- name: Configure AMD Deb822 repositories
  become: true
  ansible.builtin.deb822_repository:
    name: "{{ item.name }}"
    types:
      - deb
    uris:
      - "{{ item.uri }}"
    suites:
      - "{{ rocm_ubuntu_codename }}"
    components:
      - main
    architectures:
      - amd64
    signed_by: /etc/apt/keyrings/rocm.gpg
    state: present
    mode: '0644'
  loop:
    - name: rocm
      uri: "https://repo.radeon.com/rocm/apt/{{ rocm_version }}"
    - name: rocm-graphics
      uri: "https://repo.radeon.com/graphics/{{ rocm_version }}/ubuntu"
    - name: amdgpu
      uri: "https://repo.radeon.com/amdgpu/{{ rocm_amdgpu_version }}/ubuntu"
    - name: device-metrics-exporter
      uri: "https://repo.radeon.com/device-metrics-exporter/apt/{{ rocm_device_metrics_exporter_version }}"
  register: rocm_deb822_repositories

- name: Update apt cache after repository changes
  become: true
  ansible.builtin.apt:
    update_cache: true
  when:
    - not ansible_check_mode
    - rocm_deb822_repositories.changed

- name: Read available boot partition space before AMD GPU driver upgrade
  ansible.builtin.command:
    argv:
      - df
      - --output=avail
      - --block-size=1M
      - /boot
  register: rocm_boot_available
  changed_when: false
  when: rocm_amdgpu_package_state == 'latest'

- name: Verify boot partition space before AMD GPU driver upgrade
  ansible.builtin.assert:
    that:
      - rocm_boot_available.stdout_lines[-1] | int >= rocm_amdgpu_minimum_boot_free_mb
    fail_msg: >-
      /boot requires at least {{ rocm_amdgpu_minimum_boot_free_mb }} MB free before upgrading amdgpu-dkms;
      only {{ rocm_boot_available.stdout_lines[-1] | int }} MB is available.
  when: rocm_amdgpu_package_state == 'latest'

- name: Install AMD GPU kernel driver
  become: true
  ansible.builtin.apt:
    name: amdgpu-dkms
    state: "{{ rocm_amdgpu_package_state }}"
    update_cache: true
  register: rocm_amdgpu_install

- name: Install Ubuntu HWE kernel and headers
  become: true
  ansible.builtin.apt:
    name:
      - linux-generic-hwe-24.04
      - linux-headers-generic-hwe-24.04
    state: present
  register: rocm_hwe_install

- name: Reboot to apply Ubuntu HWE kernel
  become: true
  ansible.builtin.reboot:
    reboot_timeout: 300
  when:
    - rocm_hwe_install.changed
    - not ansible_check_mode

- name: Gather facts after reboot
  ansible.builtin.setup:

- name: Install kernel headers for running kernel
  become: true
  ansible.builtin.apt:
    name:
      - "linux-headers-{{ ansible_facts['kernel'] }}"
      - "linux-modules-extra-{{ ansible_facts['kernel'] }}"
    state: present
    update_cache: true

- name: Install ROCm
  become: true
  ansible.builtin.apt:
    name:
      - rocm
    state: "{{ rocm_package_state }}"
    update_cache: true
  async: 3600
  poll: 30

- name: Configure ROCm library path
  become: true
  ansible.builtin.copy:
    dest: /etc/ld.so.conf.d/rocm.conf
    content: |
      /opt/rocm/lib
      /opt/rocm/lib64
    owner: root
    group: root
    mode: '0644'

- name: Update ldconfig
  become: true
  ansible.builtin.command:
    cmd: ldconfig
  changed_when: false

- name: Reboot to apply AMD GPU driver
  become: true
  ansible.builtin.reboot:
    reboot_timeout: 300
  when:
    - rocm_amdgpu_install.changed
    - not ansible_check_mode

- name: Install amdgpu-exporter
  become: true
  ansible.builtin.apt:
    name: amdgpu-exporter
    state: present
    update_cache: true

- name: Enable and start gpuagent
  become: true
  ansible.builtin.service:
    name: gpuagent
    state: started
    enabled: true

- name: Enable and start amd-metrics-exporter
  become: true
  ansible.builtin.service:
    name: amd-metrics-exporter
    state: started
    enabled: true

- name: Read installed ROCm package version
  ansible.builtin.command:
    argv:
      - dpkg-query
      - --show
      - --showformat=${Version}
      - rocm
  register: rocm_installed_version
  changed_when: false
  when: not ansible_check_mode

- name: Verify installed ROCm package version
  ansible.builtin.assert:
    that:
      - rocm_installed_version.stdout == rocm_version or rocm_installed_version.stdout.startswith(rocm_version + '.')
    fail_msg: "Installed ROCm {{ rocm_installed_version.stdout }} does not match requested {{ rocm_version }}."
    success_msg: "ROCm {{ rocm_installed_version.stdout }} is installed."
  when: not ansible_check_mode

- name: Verify HIP compiler
  ansible.builtin.command:
    cmd: /opt/rocm/bin/hipcc --version
  changed_when: false
  when: not ansible_check_mode

- name: Verify ROCm detects a GPU
  ansible.builtin.command:
    cmd: /opt/rocm/bin/rocminfo
  register: rocm_info
  changed_when: false
  when: not ansible_check_mode

- name: Assert ROCm detected a GPU agent
  ansible.builtin.assert:
    that:
      - "'Device Type:             GPU' in rocm_info.stdout"
    fail_msg: ROCm did not detect a GPU agent.
    success_msg: ROCm detected a GPU agent.
  when: not ansible_check_mode
