---
- name: Check if admin policy exists
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} policy read admin"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  register: admin_policy_check
  changed_when: false
  failed_when: false

- name: Create admin policy
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} policy write admin -"
    stdin: |
      path "*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  when: admin_policy_check.rc != 0
  changed_when: true

- name: Create admin token
  ansible.builtin.command:
    cmd: >
      {{ openbao_binary }} token create
      -policy=admin
      -no-default-policy
      -display-name=ansible-admin
      -format=json
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  register: admin_token_result
  changed_when: true

- name: Show admin token
  ansible.builtin.debug:
    msg: >-
      Admin token created. Add the following to openbao.sops.yaml:
      openbao_admin_token: "{{ (admin_token_result.stdout | from_json).auth.client_token }}"
