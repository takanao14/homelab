---
- name: Require Ansible admin password
  ansible.builtin.fail:
    msg: >-
      openbao_ansible_password is empty. Set it in the SOPS-encrypted
      group_vars/openbao.sops.yaml before running this playbook.
  when: openbao_ansible_password | length == 0

- name: Define admin policy
  ansible.builtin.set_fact:
    openbao_admin_policy: |
      path "*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }

      path "sys/mounts" {
        capabilities = ["read", "list", "sudo"]
      }

      path "sys/mounts/*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }

      path "sys/auth" {
        capabilities = ["read", "list", "sudo"]
      }

      path "sys/auth/*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }

      path "sys/policies/acl/*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }

- name: Check if admin policy exists
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} policy read admin"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  register: openbao_admin_policy_check
  changed_when: false
  failed_when: false

- name: Ensure admin policy
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} policy write admin -"
    stdin: "{{ openbao_admin_policy }}"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  when: openbao_admin_policy_check.rc != 0 or openbao_admin_policy_check.stdout != openbao_admin_policy
  changed_when: true

- name: List enabled auth methods
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} auth list -format=json"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  register: openbao_auth_methods
  changed_when: false

- name: Enable userpass auth method
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} auth enable userpass"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  when: "'userpass/' not in (openbao_auth_methods.stdout | default('{}', true) | from_json)"
  changed_when: true

- name: Create or update Ansible admin user
  ansible.builtin.command:
    cmd: >-
      {{ openbao_binary }} write auth/userpass/users/{{ openbao_ansible_user }}
      password=- policies=admin token_ttl=1h
    stdin: "{{ openbao_ansible_password }}"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  changed_when: true
  no_log: true
