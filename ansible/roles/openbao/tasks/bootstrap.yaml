---
- name: Define admin policy
  ansible.builtin.set_fact:
    openbao_admin_policy: |
      path "*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }

      path "sys/mounts" {
        capabilities = ["read", "list", "sudo"]
      }

      path "sys/mounts/*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }

      path "sys/auth" {
        capabilities = ["read", "list", "sudo"]
      }

      path "sys/auth/*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }

      path "sys/policies/acl/*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }

- name: Check if admin policy exists
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} policy read admin"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  register: openbao_admin_policy_check
  changed_when: false
  failed_when: false

- name: Ensure admin policy
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} policy write admin -"
    stdin: "{{ openbao_admin_policy }}"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  when: openbao_admin_policy_check.rc != 0 or openbao_admin_policy_check.stdout != openbao_admin_policy
  changed_when: true

- name: Create admin token
  ansible.builtin.command:
    cmd: >
      {{ openbao_binary }} token create
      -policy=admin
      -no-default-policy
      -display-name=ansible-admin
      -format=json
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
  register: openbao_admin_token_result
  changed_when: true

- name: Show admin token
  ansible.builtin.debug:
    msg: >-
      Admin token created. Add the following to openbao.sops.yaml:
      openbao_admin_token: "{{ (openbao_admin_token_result.stdout | from_json).auth.client_token }}"
