---
- name: List enabled auth methods
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} auth list -format=json"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  register: openbao_auth_methods
  changed_when: false

- name: Enable userpass auth method
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} auth enable userpass"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  when: "'userpass/' not in (openbao_auth_methods.stdout | default('{}', true) | from_json)"
  changed_when: true

- name: Write kv-admin policy
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} policy write kv-admin -"
    stdin: |
      path "secret/*" {
        capabilities = ["create", "read", "update", "delete", "list"]
      }
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  changed_when: true

- name: Write kv-read policy
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} policy write kv-read -"
    stdin: |
      path "secret/data/*" {
        capabilities = ["read", "list"]
      }
      path "secret/metadata/*" {
        capabilities = ["read", "list"]
      }
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  changed_when: true

- name: Create or update userpass users
  ansible.builtin.command:
    cmd: >
      {{ openbao_binary }} write auth/userpass/users/{{ item.username }}
      password="{{ item.password }}"
      policies="{{ item.policies }}"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  loop: "{{ openbao_userpass_users }}"
  loop_control:
    label: "{{ item.username }}"
  changed_when: true
  no_log: true
