---
- name: Verify admin token is valid
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} token lookup -format=json"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  register: openbao_token_lookup
  changed_when: false
  failed_when: false

- name: Fail with actionable message if admin token is invalid
  ansible.builtin.fail:
    msg: >-
      openbao_admin_token is invalid or expired (rc={{ openbao_token_lookup.rc }}).
      Run openbao_bootstrap.yaml to generate a new token, then update
      openbao_admin_token in group_vars/openbao.sops.yaml.
  when: openbao_token_lookup.rc != 0

- name: List enabled secrets engines
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} secrets list -format=json"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  register: openbao_secrets_engines
  changed_when: false

- name: Enable KV v2 secrets engine at secret/
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} secrets enable -path=secret kv-v2"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  when: "'secret/' not in (openbao_secrets_engines.stdout | default('{}', true) | from_json)"
  changed_when: true
