---
- name: Log in as the Ansible admin user
  ansible.builtin.include_tasks: login_admin.yaml

- name: List enabled secrets engines
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} secrets list -format=json"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  register: openbao_secrets_engines
  changed_when: false

- name: Enable KV v2 secrets engine at secret/
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} secrets enable -path=secret kv-v2"
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  when: "'secret/' not in (openbao_secrets_engines.stdout | default('{}', true) | from_json)"
  changed_when: true
