---
- name: Write kubeconfig to OpenBao KV
  ansible.builtin.command:
    argv:
      - bao
      - kv
      - put
      - "secret/kubeconfig/{{ item.name }}"
      - "kubeconfig={{ lookup('file', item.path) }}"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  delegate_to: localhost
  changed_when: true
  loop: "{{ openbao_kubeconfigs }}"
  loop_control:
    label: "{{ item.name }}"
