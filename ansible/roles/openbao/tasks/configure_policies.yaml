---
# KV v2 stores secrets at secret/data/<path>, so policies must use that prefix.

- name: Write policy for cert-manager namespace
  ansible.builtin.command:
    cmd: "{{ openbao_binary }} policy write k8s-cert-manager -"
    stdin: |
      path "secret/data/k8s/cert-manager/*" {
        capabilities = ["read"]
      }
      path "secret/metadata/k8s/cert-manager/*" {
        capabilities = ["read"]
      }
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  changed_when: true

