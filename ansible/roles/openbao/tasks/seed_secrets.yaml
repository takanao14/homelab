---
- name: Write secrets to OpenBao KV
  ansible.builtin.command:
    cmd: >
      {{ openbao_binary }} kv put {{ item.path }}
      {{ item.data | dict2items | map(attribute='key') | zip(item.data | dict2items | map(attribute='value')) | map('join', '=') | join(' ') }}
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  loop: "{{ openbao_secrets }}"
  loop_control:
    label: "{{ item.path }}"
  changed_when: true
  no_log: true
