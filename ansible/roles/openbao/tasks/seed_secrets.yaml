---
- name: Log in as the Ansible admin user
  ansible.builtin.include_tasks: login_admin.yaml

- name: Write secrets to OpenBao KV
  ansible.builtin.command:
    cmd: >
      {{ openbao_binary }} kv put {{ item.path }}
      {{ item.data | dict2items | map(attribute='key') | zip(item.data | dict2items | map(attribute='value')) | map('join', '=') | join(' ') }}
  environment:
    BAO_ADDR: "{{ openbao_local_addr }}"
    BAO_TOKEN: "{{ openbao_admin_token }}"
  loop: "{{ openbao_secrets }}"
  loop_control:
    label: "{{ item.path }}"
  changed_when: true
  no_log: true
  register: openbao_seed_results
  ignore_errors: true

# The write task is no_log, so failures are censored. Re-report only the
# KV path and the bao CLI stderr, which never contain secret values.
- name: Report seed failures without exposing secret values
  ansible.builtin.fail:
    msg: |
      {% for r in openbao_seed_results.results | default([]) if r is failed %}
      {{ r.item.path }}: {{ r.stderr | default(r.msg) | default('unknown error') }}
      {% endfor %}
  when: openbao_seed_results is failed
