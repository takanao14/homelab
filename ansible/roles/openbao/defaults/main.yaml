---
# renovate: datasource=github-releases depName=openbao/openbao
openbao_version: "2.5.3"
openbao_user: openbao
openbao_group: openbao
openbao_config_dir: /etc/openbao
openbao_data_dir: /opt/openbao/data
openbao_binary: /usr/bin/bao
openbao_seal_key_path: "{{ openbao_config_dir }}/seal.key"

openbao_api_port: 8200
openbao_cluster_port: 8201
openbao_api_addr: "https://{{ ansible_default_ipv4.address }}:{{ openbao_api_port }}"
openbao_cluster_addr: "{{ 'http' if openbao_tls_disable else 'https' }}://{{ ansible_default_ipv4.address }}:{{ openbao_cluster_port }}"

openbao_tls_disable: true
openbao_tls_cert_file: "{{ openbao_config_dir }}/tls/cert.pem"
openbao_tls_key_file: "{{ openbao_config_dir }}/tls/key.pem"

# List of other cluster node API addresses for Raft auto-join
# e.g. ["https://192.168.10.1:8200", "https://192.168.10.2:8200"]
openbao_raft_retry_join: []

# Static seal key ID (permanent identifier, update when rotating key)
openbao_seal_key_id: "key-1"

# Static seal key: 32 raw bytes, base64-encoded (set via group_vars with SOPS encryption)
# Generate with: openssl rand -base64 32
openbao_seal_key: ""

# Local API address used by bao CLI tasks running on the openbao host itself.
# TLS is terminated by Caddy upstream, so the listener is plain HTTP.
openbao_local_addr: "http://127.0.0.1:{{ openbao_api_port }}"

# Tokens (set via group_vars with SOPS encryption)
openbao_root_token: ""
openbao_admin_token: ""

# Kubernetes auth configuration
# prd cluster (mount path: kubernetes)
openbao_k8s_host: ""
openbao_k8s_ca_cert: ""
openbao_k8s_token_reviewer_jwt: ""

# dev cluster (mount path: kubernetes-dev)
openbao_k8s_dev_host: ""
openbao_k8s_dev_ca_cert: ""
openbao_k8s_dev_token_reviewer_jwt: ""

# All clusters to configure (references vars above)
openbao_k8s_clusters:
  - mount_path: kubernetes
    host: "{{ openbao_k8s_host }}"
    ca_cert: "{{ openbao_k8s_ca_cert }}"
    ca_cert_file: "{{ openbao_config_dir }}/k8s-prd-ca.pem"
    token_reviewer_jwt: "{{ openbao_k8s_token_reviewer_jwt }}"
    role: k8s-eso
    policies: "k8s-cert-manager,k8s-dns-homelab,k8s-homepage,k8s-monitoring"
  - mount_path: kubernetes-dev
    host: "{{ openbao_k8s_dev_host }}"
    ca_cert: "{{ openbao_k8s_dev_ca_cert }}"
    ca_cert_file: "{{ openbao_config_dir }}/k8s-dev-ca.pem"
    token_reviewer_jwt: "{{ openbao_k8s_dev_token_reviewer_jwt }}"
    role: k8s-eso
    policies: "k8s-cert-manager,k8s-dns-homelab,k8s-monitoring"

# Secrets to write into OpenBao KV (set via group_vars with SOPS encryption)
# Each entry requires: path (KV path) and data (key/value pairs)
# Example:
#   openbao_secrets:
#     - path: secret/k8s/cert-manager/cloudflare
#       data:
#         api-token: "xxxx"
openbao_secrets: []
