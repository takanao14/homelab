---
- name: Create caddy group
  become: true
  ansible.builtin.group:
    name: "{{ caddy_group }}"
    system: true
    state: present

- name: Create caddy user
  become: true
  ansible.builtin.user:
    name: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    shell: /usr/sbin/nologin
    system: true
    state: present

- name: Create caddy config directory
  become: true
  ansible.builtin.file:
    path: /etc/caddy
    state: directory
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: "0750"

- name: Download Caddy binary with Cloudflare DNS plugin
  become: true
  ansible.builtin.get_url:
    url: "https://caddyserver.com/api/download?os=linux&arch=amd64&p=github.com/caddy-dns/cloudflare"
    dest: "{{ caddy_binary }}"
    owner: root
    group: root
    mode: "0755"
  notify: restart caddy

- name: Set CAP_NET_BIND_SERVICE on Caddy binary
  become: true
  community.general.capabilities:
    path: "{{ caddy_binary }}"
    capability: cap_net_bind_service+ep
    state: present
  ignore_errors: "{{ ansible_check_mode }}"

- name: Deploy Caddyfile
  become: true
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_config }}"
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: "0640"
  notify: restart caddy

- name: Deploy caddy environment file
  become: true
  ansible.builtin.template:
    src: caddy.env.j2
    dest: "{{ caddy_env_file }}"
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: "0640"
  notify: restart caddy

- name: Deploy caddy systemd unit
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/caddy.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Caddy
      After=network.target

      [Service]
      User={{ caddy_user }}
      Group={{ caddy_group }}
      ExecStart={{ caddy_binary }} run --config {{ caddy_config }}
      ExecReload={{ caddy_binary }} reload --config {{ caddy_config }}
      EnvironmentFile={{ caddy_env_file }}
      TimeoutStopSec=5s
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  notify: restart caddy

- name: Ensure caddy is started and enabled
  become: true
  ansible.builtin.systemd:
    name: caddy
    state: started
    enabled: true
    daemon_reload: true
  ignore_errors: "{{ ansible_check_mode }}"
