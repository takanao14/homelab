---
- name: Validate users_accounts
  ansible.builtin.assert:
    that:
      - users_accounts | length > 0
      - users_accounts | map(attribute='name') | list | length ==
        (users_accounts | map(attribute='name') | unique | list | length)
      - users_accounts | selectattr('state', 'defined')
          | rejectattr('state', 'in', ['enabled', 'disabled']) | list | length == 0
    fail_msg: >-
      users_accounts is empty, contains duplicate names, or has an item whose
      `state` is not 'enabled'/'disabled'. Define it in group_vars.

- name: Ensure sudo is installed (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    name: sudo
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == "Debian"

- name: Manage user accounts
  become: true
  ansible.builtin.user:
    name: "{{ item.name }}"
    password: "{{ item.password | password_hash(users_password_scheme) }}"
    # Only set the password when the account is created; existing users keep theirs.
    update_password: on_create
    # Disabled accounts: lock the password so it cannot be used to authenticate.
    # Re-enabling (state back to enabled) unlocks it, so this is reversible.
    password_lock: "{{ _user_disabled }}"
    # Expire the account (epoch day 1) when disabled. Account expiration is enforced
    # at the PAM account stage, so it blocks ALL logins -- including SSH public-key
    # auth, SFTP, and tunneling -- not just password. Enabled accounts are set to -1
    # (no expiration) to explicitly clear any prior expiry, keeping this reversible.
    expires: "{{ 1 if _user_disabled else -1 }}"
    # Disabled accounts get a nologin shell; enabled accounts use their own/default.
    shell: >-
      {{ (('/usr/sbin/nologin' if ansible_facts['os_family'] == 'Debian'
           else '/sbin/nologin') if _user_disabled
          else (item.shell | default(users_default_shell))) }}
    # Grant the admin group (sudo on Debian/Ubuntu, wheel on RHEL-family) only to
    # enabled accounts that opt in with `sudo: true`. Enabled accounts append
    # (preserving other supplementary groups); disabled accounts replace with an
    # empty set, which strips sudo/wheel and revokes elevated access.
    groups: >-
      {{ ([] if _user_disabled
          else ((['sudo'] if ansible_facts['os_family'] == 'Debian' else ['wheel'])
                if (item.sudo | default(false) | bool) else [])) }}
    append: "{{ not _user_disabled }}"
    create_home: "{{ users_create_home }}"
    state: present
  vars:
    _user_disabled: "{{ (item.state | default('enabled')) == 'disabled' }}"
  loop: "{{ users_accounts }}"
  loop_control:
    label: "{{ item.name }} ({{ item.state | default('enabled') }})"
  no_log: true
