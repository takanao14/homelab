---
- name: Install rsyslog
  become: true
  ansible.builtin.apt:
    name: rsyslog
    state: present
    update_cache: true

- name: Configure rsyslog forwarding
  become: true
  ansible.builtin.template:
    src: 99-forward.conf.j2
    dest: /etc/rsyslog.d/99-forward.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart rsyslog

- name: Ensure rsyslog is started and enabled
  become: true
  ansible.builtin.service:
    name: rsyslog
    state: started
    enabled: true
