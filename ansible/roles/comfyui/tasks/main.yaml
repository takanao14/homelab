---
- name: Install prerequisites
  become: true
  ansible.builtin.apt:
    name:
      - git
      - python3.12-venv
      - wget
    state: present
    update_cache: true

- name: Clone ComfyUI
  ansible.builtin.git:
    repo: https://github.com/comfyanonymous/ComfyUI.git
    dest: "{{ comfyui_dir }}"
    version: master
    update: true

- name: Create virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv {{ comfyui_venv }}
    creates: "{{ comfyui_venv }}/bin/activate"

- name: Install PyTorch with ROCm 7.2
  ansible.builtin.pip:
    name:
      - torch
      - torchvision
    extra_args: "--index-url https://download.pytorch.org/whl/rocm7.2"
    virtualenv: "{{ comfyui_venv }}"

- name: Install ComfyUI requirements
  ansible.builtin.pip:
    requirements: "{{ comfyui_dir }}/requirements.txt"
    virtualenv: "{{ comfyui_venv }}"

- name: Deploy start script
  ansible.builtin.template:
    src: start-comfyui.sh.j2
    dest: "/home/{{ comfyui_user }}/start-comfyui.sh"
    mode: '0755'

- name: Ensure checkpoints directory exists
  ansible.builtin.file:
    path: "{{ comfyui_dir }}/models/checkpoints"
    state: directory
    mode: '0755'

- name: Download checkpoints
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ comfyui_dir }}/models/checkpoints/{{ item.filename }}"
    mode: '0644'
  loop: "{{ comfyui_checkpoints }}"
  when: comfyui_checkpoints | length > 0

