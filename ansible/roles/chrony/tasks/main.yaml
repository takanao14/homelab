---
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] }}.yaml"

- name: Ensure chrony is installed
  become: true
  ansible.builtin.package:
    name: chrony
    state: present
  when: chrony_install | default(true)

# On Debian/Ubuntu the default time sync is systemd-timesyncd. When we newly
# install chrony, stop/disable timesyncd so the two NTP clients don't compete.
# We deliberately do NOT mask it: installing chrony already deactivates timesyncd
# naturally, so masking is needless aggressive systemd surgery. Hosts that
# already run chrony (e.g. Proxmox) set chrony_manage_timesyncd=false.
# Minimal images may not ship the unit at all, so tolerate a "not found" result
# rather than relying on service_facts (which can misreport the unit's presence).
- name: Stop and disable systemd-timesyncd (replaced by chrony)
  become: true
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: stopped
    enabled: false
  register: chrony_timesyncd_stop
  failed_when:
    - chrony_timesyncd_stop is failed
    - "'Could not find the requested service' not in (chrony_timesyncd_stop.msg | default(''))"
  when:
    - chrony_manage_timesyncd | default(true)
    - ansible_facts['os_family'] == "Debian"

- name: Ensure chrony source directory exists
  become: true
  ansible.builtin.file:
    path: "{{ chrony_source_dir_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure chrony source directory is included
  become: true
  ansible.builtin.lineinfile:
    path: "{{ chrony_conf_path }}"
    regexp: '^[ \t]*#?[ \t]*sourcedir[ \t]+{{ chrony_source_dir_path | regex_escape }}(?:[ \t].*)?$'
    line: "sourcedir {{ chrony_source_dir_path }}"
    insertafter: EOF
  notify: Restart chrony

- name: Remove legacy chrony managed block from main config
  become: true
  ansible.builtin.blockinfile:
    path: "{{ chrony_conf_path }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK (chrony role)"
    state: absent
  notify: Restart chrony

- name: Configure homelab NTP sources
  become: true
  ansible.builtin.copy:
    dest: "{{ chrony_managed_sources_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible (chrony role). Do not edit manually.
      {% for host in chrony_servers + chrony_fallback_servers %}
      server {{ host }} iburst
      {% endfor %}
  notify: Restart chrony

# Comment out active NTP sources in the main config so the configured homelab
# source file remains the only static source definition.
- name: Disable unmanaged NTP sources in main config
  become: true
  ansible.builtin.replace:
    path: "{{ chrony_conf_path }}"
    regexp: '(?m)^([ \t]*(?:server|pool|peer)[ \t]+.*)$'
    replace: '# \1  # disabled by ansible (chrony role)'
  notify: Restart chrony

- name: Disable unmanaged chrony source directories
  become: true
  ansible.builtin.replace:
    path: "{{ chrony_conf_path }}"
    regexp: '(?m)^([ \t]*sourcedir[ \t]+{{ item | regex_escape }}(?:[ \t].*)?)$'
    replace: '# \1  # disabled by ansible (chrony role)'
  loop: "{{ chrony_disabled_source_dirs | default([]) }}"
  notify: Restart chrony

- name: Ensure chrony is enabled and running
  become: true
  ansible.builtin.service:
    name: "{{ chrony_service }}"
    enabled: true
    state: started
