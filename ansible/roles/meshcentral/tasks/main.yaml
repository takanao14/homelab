---
- name: Install Podman
  become: true
  ansible.builtin.apt:
    name: podman
    state: present
    update_cache: true

- name: Create MeshCentral data directories
  become: true
  ansible.builtin.file:
    path: "{{ meshcentral_data_root }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  loop: "{{ meshcentral_data_dirs }}"

- name: Check whether the MeshCentral image is present
  become: true
  ansible.builtin.command:
    argv:
      - podman
      - image
      - exists
      - "{{ meshcentral_image }}"
  register: meshcentral_image_present
  changed_when: false
  failed_when: meshcentral_image_present.rc not in [0, 1]
  check_mode: false

- name: Pull the MeshCentral image
  become: true
  ansible.builtin.command:
    argv:
      - podman
      - pull
      - "{{ meshcentral_image }}"
  when:
    - meshcentral_image_present.rc == 1
    - not ansible_check_mode
  changed_when: true
  notify: Restart meshcentral

- name: Deploy MeshCentral systemd unit
  become: true
  ansible.builtin.template:
    src: meshcentral.service.j2
    dest: /etc/systemd/system/meshcentral.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart meshcentral

- name: Ensure MeshCentral is started and enabled
  become: true
  ansible.builtin.systemd:
    name: meshcentral
    state: started
    enabled: true
    daemon_reload: true
  when:
    - not ansible_check_mode
    - meshcentral_image_present.rc == 0 or meshcentral_image_present.rc == 1

- name: Wait for MeshCentral to generate its configuration
  become: true
  ansible.builtin.wait_for:
    path: "{{ meshcentral_config_file }}"
    timeout: 30
  when: not ansible_check_mode

- name: Check whether the MeshCentral configuration exists
  become: true
  ansible.builtin.stat:
    path: "{{ meshcentral_config_file }}"
  register: meshcentral_config

# DYNAMIC_CONFIG generates config.json only on first start; later hostname
# changes do not rewrite the persisted settings.cert value. Keep it aligned
# with the canonical URL because MeshCentral rejects mismatched WebSocket
# origins after login.
- name: Align the MeshCentral certificate hostname
  become: true
  ansible.builtin.replace:
    path: "{{ meshcentral_config_file }}"
    regexp: '("cert"\s*:\s*")[^"]+("\s*,)'
    replace: '\1{{ meshcentral_hostname }}\2'
  when: meshcentral_config.stat.exists
  notify: Restart meshcentral
