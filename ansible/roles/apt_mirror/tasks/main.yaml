---
# Ubuntu のみ対象
- name: Skip non-Ubuntu systems
  ansible.builtin.meta: end_host
  when: ansible_distribution != "Ubuntu"

# Ubuntu 24.04+ は DEB822 形式 (/etc/apt/sources.list.d/ubuntu.sources)
- name: Replace mirror in DEB822 sources (Ubuntu 24.04+)
  become: true
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/ubuntu.sources
    regexp: 'http://archive\.ubuntu\.com/ubuntu'
    replace: "{{ apt_mirror_url }}"
  when: ansible_distribution_major_version | int >= 24
  notify: Update apt cache

# Ubuntu 22.04 以前は /etc/apt/sources.list
- name: Replace mirror in sources.list (Ubuntu 22.04 and earlier)
  become: true
  ansible.builtin.replace:
    path: /etc/apt/sources.list
    regexp: 'http://archive\.ubuntu\.com/ubuntu'
    replace: "{{ apt_mirror_url }}"
  when: ansible_distribution_major_version | int < 24
  notify: Update apt cache
