---
- name: Validate pdns role parameter
  ansible.builtin.assert:
    that:
      - pdns_role is defined
      - pdns_role in ['primary', 'secondary']
    fail_msg: "pdns_role must be either 'primary' or 'secondary'."

- name: Validate required variables (shared)
  ansible.builtin.assert:
    that:
      - pdns_primary_addr | length > 0
      - pdns_secondary_addr | length > 0
    fail_msg: "pdns_primary_addr and pdns_secondary_addr must be defined in inventory (group_vars/dns_auth.yaml)."

- name: Validate required variables for primary role
  ansible.builtin.assert:
    that:
      - pdns_primary_api_key | length > 0
      - pdns_primary_allow_axfr_ips | length > 0
      - pdns_primary_also_notify | length > 0
      - pdns_default_soa_content | length > 0
    fail_msg: "Required primary variables are missing. Check group_vars/dns_primary.yaml and dns_primary.sops.yaml."
  when: pdns_role == 'primary'

- name: Validate required variables for secondary role
  ansible.builtin.assert:
    that:
      - pdns_secondary_api_key | length > 0
    fail_msg: "pdns_secondary_api_key must be defined in group_vars/dns_secondary.sops.yaml."
  when: pdns_role == 'secondary'

- name: Ensure apt keyring directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install PowerDNS repository key
  become: true
  ansible.builtin.get_url:
    url: "{{ pdns_repo_key_url }}"
    dest: "{{ pdns_repo_key_path }}"
    mode: "0644"

- name: Configure pdns apt pinning
  become: true
  ansible.builtin.copy:
    dest: "{{ pdns_repo_pin_path }}"
    mode: "0644"
    content: |
      Package: pdns-*
      Pin: origin repo.powerdns.com
      Pin-Priority: 600

- name: Configure PowerDNS authoritative repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ pdns_repo_key_path }}] {{ pdns_repo_base_url }} {{ pdns_repo_release }}-{{ pdns_repo_channel }} main"
    filename: pdns-auth
    state: present
    update_cache: true

- name: Install pdns packages
  become: true
  ansible.builtin.apt:
    name:
      - pdns-server
      - pdns-backend-sqlite3
      - sqlite3
    state: present

- name: Ensure PowerDNS data directory exists
  become: true
  ansible.builtin.file:
    path: /var/lib/powerdns
    state: directory
    owner: pdns
    group: pdns
    mode: "0755"

- name: Initialize PowerDNS sqlite database
  become: true
  ansible.builtin.shell: |
    sqlite3 /var/lib/powerdns/pdns.sqlite3 < /usr/share/pdns-backend-sqlite3/schema/schema.sqlite3.sql
  args:
    creates: /var/lib/powerdns/pdns.sqlite3

- name: Ensure PowerDNS data directory ownership
  become: true
  ansible.builtin.file:
    path: /var/lib/powerdns
    state: directory
    owner: pdns
    group: pdns
    recurse: true

- name: Deploy pdns configuration
  become: true
  ansible.builtin.template:
    src: "pdns.conf.j2"
    dest: /etc/powerdns/pdns.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart pdns

- name: Ensure pdns service is enabled and started
  become: true
  ansible.builtin.systemd:
    name: pdns
    enabled: true
    state: started
    daemon_reload: true

- name: Get existing autoprimaries
  ansible.builtin.uri:
    url: "http://{{ pdns_secondary_addr }}:{{ pdns_webserver_port }}/api/v1/servers/localhost/autoprimaries"
    method: GET
    headers:
      X-API-Key: "{{ pdns_secondary_api_key }}"
  register: pdns_autoprimaries
  changed_when: false
  when: pdns_role == 'secondary'

- name: Register autoprimary on secondary
  ansible.builtin.uri:
    url: "http://{{ pdns_secondary_addr }}:{{ pdns_webserver_port }}/api/v1/servers/localhost/autoprimaries"
    method: POST
    headers:
      X-API-Key: "{{ pdns_secondary_api_key }}"
    body: "{{ {'ip': pdns_primary_addr, 'nameserver': pdns_primary_nameserver, 'account': ''} | to_json }}"
    body_format: json
    status_code: 201
  when:
    - pdns_role == 'secondary'
    - pdns_autoprimaries.json | selectattr('ip', 'equalto', pdns_primary_addr) | list | length == 0
