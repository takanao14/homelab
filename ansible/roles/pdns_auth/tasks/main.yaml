---
- name: Validate pdns role parameter
  ansible.builtin.assert:
    that:
      - pdns_role is defined
      - pdns_role in ['primary', 'secondary']
    fail_msg: "pdns_role must be either 'primary' or 'secondary'."

- name: Validate required environment variables (shared)
  ansible.builtin.assert:
    that:
      - pdns_primary_addr | length > 0
      - pdns_secondary_addr | length > 0
    fail_msg: "Required shared environment variables for pdns_auth are missing. Check your .envrc.prd.dev."

- name: Validate required environment variables for primary role
  ansible.builtin.assert:
    that:
      - pdns_primary_api_key | length > 0
      - pdns_primary_allow_axfr_ips | length > 0
      - pdns_primary_also_notify | length > 0
    fail_msg: "Required primary environment variables for pdns_auth are missing. Check your .envrc.prd.dev."
  when: pdns_role == 'primary'

- name: Validate required environment variables for secondary role
  ansible.builtin.assert:
    that:
      - pdns_secondary_api_key | length > 0
    fail_msg: "Required secondary environment variables for pdns_auth are missing. Check your .envrc.prd.dev."
  when: pdns_role == 'secondary'

- name: Ensure apt keyring directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install PowerDNS repository key
  become: true
  ansible.builtin.get_url:
    url: "{{ pdns_repo_key_url }}"
    dest: "{{ pdns_repo_key_path }}"
    mode: "0644"

- name: Configure pdns apt pinning
  become: true
  ansible.builtin.copy:
    dest: "{{ pdns_repo_pin_path }}"
    mode: "0644"
    content: |
      Package: pdns-*
      Pin: origin repo.powerdns.com
      Pin-Priority: 600

- name: Configure PowerDNS authoritative repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ pdns_repo_key_path }}] {{ pdns_repo_base_url }} {{ pdns_repo_release }}-{{ pdns_repo_channel }} main"
    filename: pdns-auth
    state: present
    update_cache: true

- name: Install pdns packages
  become: true
  ansible.builtin.apt:
    name:
      - pdns-server
      - pdns-backend-sqlite3
      - sqlite3
    state: present

- name: Ensure PowerDNS data directory exists
  become: true
  ansible.builtin.file:
    path: /var/lib/powerdns
    state: directory
    owner: pdns
    group: pdns
    mode: "0755"

- name: Initialize PowerDNS sqlite database
  become: true
  ansible.builtin.shell: |
    sqlite3 /var/lib/powerdns/pdns.sqlite3 < /usr/share/pdns-backend-sqlite3/schema/schema.sqlite3.sql
  args:
    creates: /var/lib/powerdns/pdns.sqlite3

- name: Ensure PowerDNS data directory ownership
  become: true
  ansible.builtin.file:
    path: /var/lib/powerdns
    state: directory
    owner: pdns
    group: pdns
    recurse: true

- name: Deploy pdns configuration
  become: true
  ansible.builtin.template:
    src: "pdns.conf.j2"
    dest: /etc/powerdns/pdns.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart pdns

- name: Ensure pdns service is enabled and started
  become: true
  ansible.builtin.systemd:
    name: pdns
    enabled: true
    state: started
    daemon_reload: true
