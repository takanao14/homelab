---
pdns_repo_base_url: "http://repo.powerdns.com/ubuntu"
pdns_repo_release: "{{ ansible_facts['distribution_release'] | default('noble') }}"
pdns_repo_channel: "auth-50"
pdns_repo_key_url: "https://repo.powerdns.com/FD380FBB-pub.asc"
pdns_repo_key_path: "/etc/apt/keyrings/auth-50-pub.asc"
pdns_repo_pin_path: "/etc/apt/preferences.d/auth-50"

pdns_webserver_port: "{{ lookup('ansible.builtin.env', 'PDNS_WEBSERVER_PORT') }}"
pdns_webserver_allow_from: "{{ lookup('ansible.builtin.env', 'PDNS_WEBSERVER_ALLOW_FROM') }}"

# Prefer explicit vars; these defaults allow reuse of existing dns_servers vars.
pdns_primary_addr: "{{ lookup('ansible.builtin.env', 'PRIMARY_AUTH_SERVER').split(':')[0] }}"
pdns_primary_port: "{{ lookup('ansible.builtin.env', 'PRIMARY_AUTH_SERVER').split(':')[1] }}"
pdns_secondary_addr: "{{ lookup('ansible.builtin.env', 'SECONDARY_AUTH_SERVER').split(':')[0] }}"
pdns_secondary_port: "{{ lookup('ansible.builtin.env', 'SECONDARY_AUTH_SERVER').split(':')[1] }}"

pdns_primary_allow_axfr_ips: "{{ lookup('ansible.builtin.env', 'PDNS_PRIMARY_ALLOW_AXFR_IPS') }}"
pdns_primary_also_notify: "{{ lookup('ansible.builtin.env', 'PDNS_PRIMARY_ALSO_NOTIFY') }}"
pdns_primary_api_key: "{{ lookup('ansible.builtin.env', 'PDNS_PRIMARY_API_KEY') }}"
pdns_secondary_api_key: "{{ lookup('ansible.builtin.env', 'PDNS_SECONDARY_API_KEY') }}"
