---
pdns_repo_base_url: "http://repo.powerdns.com/ubuntu"
pdns_repo_release: "{{ ansible_facts['distribution_release'] | default('noble') }}"
pdns_repo_channel: "auth-50"
pdns_repo_key_url: "https://repo.powerdns.com/FD380FBB-pub.asc"
pdns_repo_key_path: "/etc/apt/keyrings/auth-50-pub.asc"
pdns_repo_pin_path: "/etc/apt/preferences.d/auth-50"

pdns_webserver_port: 8081
pdns_webserver_allow_from: "192.168.10.0/24,192.168.20.0/24,192.168.30.0/24"

pdns_primary_addr: "{{ primary_auth_server.split(':')[0] }}"
pdns_primary_port: "{{ primary_auth_server.split(':')[1] }}"
pdns_secondary_addr: "{{ secondary_auth_server.split(':')[0] }}"
pdns_secondary_port: "{{ secondary_auth_server.split(':')[1] }}"

pdns_primary_allow_axfr_ips: "192.168.10.0/24"
pdns_primary_also_notify: "{{ secondary_auth_server }}"

# Secrets - loaded via community.sops.sops from group_vars/all.sops.yaml
pdns_primary_api_key: "{{ PDNS_PRIMARY_API_KEY }}"
pdns_secondary_api_key: "{{ PDNS_SECONDARY_API_KEY }}"
