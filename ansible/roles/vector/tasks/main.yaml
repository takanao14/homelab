---
- name: Install deb822 repository prerequisites
  become: true
  ansible.builtin.apt:
    name: python3-debian
    state: present
    update_cache: true

# Declarative replacement for the setup.vector.dev installer script, which
# piped an unpinned remote script into bash. Same repository and signing key:
# the key URL always points at Datadog's currently active apt signing key.
- name: Add Vector apt repository
  become: true
  ansible.builtin.deb822_repository:
    name: vector
    uris: "{{ vector_repo_url }}"
    suites: stable
    components: vector-0
    signed_by: "{{ vector_repo_key_url }}"
    architectures: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
  register: vector_repo

- name: Remove legacy vector.list installed by setup.vector.dev
  become: true
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/vector.list
    state: absent
  register: vector_legacy_list

- name: Update apt cache after repository change  # noqa no-handler
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: vector_repo.changed or vector_legacy_list.changed

- name: Install Vector
  become: true
  ansible.builtin.apt:
    name: vector
    state: present

- name: Configure Vector
  become: true
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: /etc/vector/vector.yaml
    owner: root
    group: root
    mode: '0644'
    validate: vector validate --no-environment %s
  notify: Restart vector

- name: Ensure Vector is started and enabled
  become: true
  ansible.builtin.service:
    name: vector
    state: started
    enabled: true
