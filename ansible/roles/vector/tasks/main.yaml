---
- name: Install deb822 repository prerequisites
  become: true
  ansible.builtin.apt:
    name: python3-debian
    state: present
    update_cache: true

# In check mode the apt task above reports the pending package installation but
# does not make it available to the next module in the same run. Probe the
# library without changing the host so the dry-run can continue safely.
- name: Check whether the python-debian library is available
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - import debian
  register: vector_python_debian
  changed_when: false
  failed_when: false
  check_mode: false

# Declarative replacement for the setup.vector.dev installer script, which
# piped an unpinned remote script into bash. Same repository and signing key:
# the key URL always points at Datadog's currently active apt signing key.
- name: Add Vector apt repository
  become: true
  ansible.builtin.deb822_repository:
    name: vector
    uris: "{{ vector_repo_url }}"
    suites: stable
    components: vector-0
    signed_by: "{{ vector_repo_key_url }}"
    architectures: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
  register: vector_repo
  when: not ansible_check_mode or vector_python_debian.rc == 0

- name: Report deferred Vector repository check
  ansible.builtin.debug:
    msg: >-
      Skipping the Vector deb822 repository check because python3-debian is
      pending installation in check mode. A normal run installs the prerequisite
      before managing the repository.
  when:
    - ansible_check_mode
    - vector_python_debian.rc != 0

- name: Remove legacy vector.list installed by setup.vector.dev
  become: true
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/vector.list
    state: absent
  register: vector_legacy_list

- name: Update apt cache after repository change  # noqa no-handler
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: vector_repo.changed or vector_legacy_list.changed

- name: Install Vector
  become: true
  ansible.builtin.apt:
    name: vector
    state: present

- name: Configure Vector
  become: true
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: /etc/vector/vector.yaml
    owner: root
    group: root
    mode: '0644'
    validate: vector validate --no-environment %s
  notify: Restart vector

# The template module only runs its validator when the rendered file changes.
# Validate the installed configuration on every normal run as well, so package
# upgrades cannot leave an unchanged configuration incompatible with the new
# Vector binary. The command module skips this task in check mode, where the
# template task validates the candidate configuration when it changes.
- name: Validate installed Vector configuration
  become: true
  ansible.builtin.command:
    argv:
      - vector
      - validate
      - --no-environment
      - /etc/vector/vector.yaml
  changed_when: false

- name: Ensure Vector is started and enabled
  become: true
  ansible.builtin.service:
    name: vector
    state: started
    enabled: true
