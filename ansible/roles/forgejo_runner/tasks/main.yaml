---
- name: Create forgejo-runner group
  become: true
  ansible.builtin.group:
    name: "{{ forgejo_runner_group }}"
    system: true
    state: present

- name: Create forgejo-runner user
  become: true
  ansible.builtin.user:
    name: "{{ forgejo_runner_user }}"
    group: "{{ forgejo_runner_group }}"
    home: "{{ forgejo_runner_home }}"
    shell: /bin/bash
    system: true
    state: present

- name: Create required directories
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ forgejo_runner_user }}"
    group: "{{ forgejo_runner_group }}"
    mode: '0750'
  loop:
    - "{{ forgejo_runner_home }}"
    - "{{ forgejo_runner_config | dirname }}"

- name: Install prerequisites for Docker repo
  become: true
  ansible.builtin.apt:
    name:
      - git
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Add Docker GPG key
  become: true
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker repository
  become: true
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_facts["distribution_release"] }} stable
    state: present
    filename: docker

- name: Install Docker CE
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: true

- name: Add runner user to docker group
  become: true
  ansible.builtin.user:
    name: "{{ forgejo_runner_user }}"
    groups: docker
    append: true

- name: Ensure docker is started and enabled
  become: true
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Download forgejo-runner binary
  become: true
  ansible.builtin.get_url:
    url: "https://code.forgejo.org/forgejo/runner/releases/download/v{{ forgejo_runner_version }}/forgejo-runner-{{ forgejo_runner_version }}-linux-amd64"
    dest: "{{ forgejo_runner_binary }}"
    owner: root
    group: root
    mode: '0755'
  notify: restart forgejo-runner

- name: Deploy forgejo-runner config
  become: true
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ forgejo_runner_config }}"
    owner: "{{ forgejo_runner_user }}"
    group: "{{ forgejo_runner_group }}"
    mode: '0640'
  notify: restart forgejo-runner

- name: Get runner registration token from Forgejo API
  ansible.builtin.uri:
    url: "{{ forgejo_runner_url }}/api/v1/admin/runners/registration-token"
    method: GET
    headers:
      Authorization: "token {{ forgejo_admin_token }}"
    status_code: 200
  register: forgejo_registration
  when: not (forgejo_runner_home + '/.runner') is file

- name: Register forgejo-runner
  become: true
  ansible.builtin.command:
    cmd: >
      runuser -u {{ forgejo_runner_user }} --
      {{ forgejo_runner_binary }} register
      --no-interactive
      --instance {{ forgejo_runner_url }}
      --token {{ forgejo_registration.json.token }}
      --name {{ forgejo_runner_name }}
      --labels {{ forgejo_runner_labels | join(',') }}
      --config {{ forgejo_runner_config }}
    creates: "{{ forgejo_runner_home }}/.runner"
  when: not (forgejo_runner_home + '/.runner') is file

- name: Deploy forgejo-runner systemd unit
  become: true
  ansible.builtin.template:
    src: forgejo-runner.service.j2
    dest: /etc/systemd/system/forgejo-runner.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart forgejo-runner

- name: Ensure forgejo-runner is started and enabled
  become: true
  ansible.builtin.service:
    name: forgejo-runner
    state: started
    enabled: true
