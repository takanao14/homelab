---
- name: Configure OpenBao for Kubernetes ESO integration
  hosts: openbao
  tasks:
    - name: Configure KV v2 secrets engine
      ansible.builtin.include_role:
        name: openbao
        tasks_from: configure_kv

    - name: Configure policies
      ansible.builtin.include_role:
        name: openbao
        tasks_from: configure_policies

    - name: Configure Kubernetes roles for ESO
      ansible.builtin.include_role:
        name: openbao
        tasks_from: configure_roles

    - name: Disable retired Kubernetes auth mounts
      ansible.builtin.include_role:
        name: openbao
        tasks_from: disable_retired_k8s_auth
