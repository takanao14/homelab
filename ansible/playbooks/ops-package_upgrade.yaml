---
# The dns group (dns_auth: ns1-3, dnsdist: dist1-2) is a redundant pool that
# collectively provides name resolution, so hosts are upgraded/rebooted one
# at a time to keep resolution available throughout.
- name: Upgrade OS packages on DNS hosts serially
  hosts: dns
  serial: 1
  any_errors_fatal: false
  tasks:
    - ansible.builtin.import_tasks: tasks/package_upgrade.yaml

# All other hosts run a single independent service each, so a simultaneous
# reboot only takes down that one service either way — no need to serialize.
- name: Upgrade OS packages on remaining hosts
  hosts: all:!proxmox:!dns
  any_errors_fatal: false
  tasks:
    - ansible.builtin.import_tasks: tasks/package_upgrade.yaml
