---
# Read-only audit for Renovate-managed Ansible components.
# This playbook compares desired versions from role defaults with the versions
# currently installed on hosts. It does not call service roles or change state.

- name: Audit Forgejo version
  hosts: forgejo
  gather_facts: false
  vars_files:
    - ../roles/forgejo/defaults/main.yaml
  tasks:
    - name: Read installed Forgejo version marker
      ansible.builtin.slurp:
        src: /usr/local/share/homelab-versions/forgejo.version
      register: forgejo_audit_marker
      failed_when: false

    - name: Read installed Forgejo version
      ansible.builtin.command:
        argv:
          - "{{ forgejo_binary }}"
          - "--version"
      register: forgejo_audit_version
      changed_when: false
      failed_when: false

    - name: Report Forgejo version
      ansible.builtin.debug:
        msg: >-
          {{ '%-18s %-20s desired=%-12s installed=%-12s %s' | format(
            'forgejo',
            inventory_hostname,
            forgejo_version,
            forgejo_audit_installed,
            'OK' if forgejo_audit_installed == forgejo_version else 'DIFF'
          ) }}
      vars:
        forgejo_audit_installed: >-
          {{ forgejo_audit_marker_version
             if forgejo_audit_marker_version != ''
             else (forgejo_audit_output
                   | regex_search('v?[0-9]+\\.[0-9]+\\.[0-9]+')
                   | default('unknown', true)
                   | regex_replace('^v', '')) }}
        forgejo_audit_marker_version: >-
          {{ (forgejo_audit_marker.content | default('') | b64decode | trim) }}
        forgejo_audit_output: >-
          {{ forgejo_audit_version.stdout ~ ' ' ~ forgejo_audit_version.stderr }}

