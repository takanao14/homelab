- name: Audit OpenBao package version
  hosts: openbao
  gather_facts: false
  vars_files:
    - ../roles/openbao/defaults/main.yaml
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Report OpenBao package version
      ansible.builtin.debug:
        msg: >-
          {{ '%-18s %-20s desired=%-12s installed=%-12s %s' | format(
            'openbao',
            inventory_hostname,
            openbao_version,
            openbao_audit_installed,
            'OK' if openbao_audit_matches else 'DIFF'
          ) }}
      vars:
        openbao_audit_installed: >-
          {{ (ansible_facts.packages.get('openbao', [{'version': 'unknown'}]) | first).version }}
        openbao_audit_matches: >-
          {{ openbao_audit_installed == openbao_version
             or openbao_audit_installed.startswith(openbao_version ~ '-')
             or openbao_audit_installed.startswith(openbao_version ~ '+')
             or openbao_audit_installed.startswith(openbao_version ~ '~') }}

- name: Audit ROCm package versions
  hosts: gpuvm
  gather_facts: false
  vars_files:
    - ../roles/rocm/defaults/main.yaml
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Report ROCm package version
      ansible.builtin.debug:
        msg: >-
          {{ '%-18s %-20s desired=%-12s installed=%-12s %s' | format(
            'rocm',
            inventory_hostname,
            rocm_version,
            rocm_audit_installed,
            'OK' if rocm_audit_matches else 'DIFF'
          ) }}
      vars:
        rocm_audit_installed: >-
          {{ (ansible_facts.packages.get('rocm', [{'version': 'unknown'}]) | first).version }}
        rocm_audit_matches: >-
          {{ rocm_audit_installed == rocm_version
             or rocm_audit_installed.startswith(rocm_version ~ '.')
             or rocm_audit_installed.startswith(rocm_version ~ '-')
             or rocm_audit_installed.startswith(rocm_version ~ '+')
             or rocm_audit_installed.startswith(rocm_version ~ '~') }}

    - name: Report AMD GPU driver package version
      ansible.builtin.debug:
        msg: >-
          {{ '%-18s %-20s desired=%-12s installed=%-12s %s' | format(
            'amdgpu-dkms',
            inventory_hostname,
            rocm_amdgpu_version,
            amdgpu_audit_installed,
            'OK' if amdgpu_audit_matches else 'DIFF'
          ) }}
      vars:
        amdgpu_audit_installed: >-
          {{ (ansible_facts.packages.get('amdgpu-dkms', [{'version': 'unknown'}]) | first).version }}
        amdgpu_audit_matches: >-
          {{ amdgpu_audit_installed == rocm_amdgpu_version
             or amdgpu_audit_installed.startswith(rocm_amdgpu_version ~ '.')
             or amdgpu_audit_installed.startswith(rocm_amdgpu_version ~ '-')
             or amdgpu_audit_installed.startswith(rocm_amdgpu_version ~ '+')
             or amdgpu_audit_installed.startswith(rocm_amdgpu_version ~ '~') }}

    - name: Report AMD device metrics exporter package version
      ansible.builtin.debug:
        msg: >-
          {{ '%-18s %-20s desired=%-12s installed=%-12s %s' | format(
            'amdgpu-exporter',
            inventory_hostname,
            rocm_device_metrics_exporter_version,
            exporter_audit_installed,
            'OK' if exporter_audit_matches else 'DIFF'
          ) }}
      vars:
        exporter_audit_installed: >-
          {{ (ansible_facts.packages.get('amdgpu-exporter', [{'version': 'unknown'}]) | first).version }}
        exporter_audit_matches: >-
          {{ exporter_audit_installed == rocm_device_metrics_exporter_version
             or exporter_audit_installed.startswith(rocm_device_metrics_exporter_version ~ '.')
             or exporter_audit_installed.startswith(rocm_device_metrics_exporter_version ~ '-')
             or exporter_audit_installed.startswith(rocm_device_metrics_exporter_version ~ '+')
             or exporter_audit_installed.startswith(rocm_device_metrics_exporter_version ~ '~') }}
