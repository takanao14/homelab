- name: Audit NetBox version
  hosts: netbox
  gather_facts: false
  vars_files:
    - ../roles/netbox/defaults/main.yaml
  tasks:
    - name: Read installed NetBox symlink target
      ansible.builtin.command:
        argv:
          - readlink
          - "-f"
          - "{{ netbox_home }}"
      register: netbox_audit_target
      changed_when: false
      failed_when: false

    - name: Report NetBox version
      ansible.builtin.debug:
        msg: >-
          {{ '%-18s %-20s desired=%-12s installed=%-12s %s' | format(
            'netbox',
            inventory_hostname,
            netbox_version,
            netbox_audit_installed,
            'OK' if netbox_audit_installed == netbox_version else 'DIFF'
          ) }}
      vars:
        netbox_audit_installed: >-
          {{ netbox_audit_target.stdout
             | basename
             | regex_replace('^netbox-', '')
             | default('unknown', true) }}

