---
- name: Setup Caddy reverse proxy
  hosts: caddy
  roles:
    - role: timezone
      tags: timezone
    - role: caddy
      tags: caddy
    - role: lxc_logging
      tags: logging

- name: Sync caddy DNS records to homelab-private
  hosts: localhost
  connection: local
  gather_facts: false
  tags: sync_dns
  vars_files:
    - "{{ playbook_dir }}/../inventories/homelab/group_vars/caddy.yaml"
  vars:
    homelab_private_path: "{{ lookup('env', 'HOMELAB_PRIVATE_PATH') | default(lookup('env', 'HOME') + '/homelab-private', true) }}"
    dnsconfig_path: "{{ homelab_private_path }}/dns-record/home-zone.js"
  tasks:
    - name: Check if homelab-private repository exists
      ansible.builtin.stat:
        path: "{{ homelab_private_path }}"
      register: homelab_private_stat

    - name: Skip if homelab-private not found
      ansible.builtin.debug:
        msg: "homelab-private not found at {{ homelab_private_path }}, skipping DNS sync"
      when: not homelab_private_stat.stat.exists

    - name: Update caddy section in dnsconfig.js
      ansible.builtin.blockinfile:
        path: "{{ dnsconfig_path }}"
        marker: "    // {mark} caddy"
        block: |
          {% for upstream in caddy_upstreams %}
              A("{{ upstream.hostname.split('.')[0] }}", "{{ caddy_ip }}"),
          {% endfor %}
      when: homelab_private_stat.stat.exists

    - name: Check dnsconfig.js working tree status  # noqa command-instead-of-module
      ansible.builtin.command:
        argv:
          - git
          - status
          - --porcelain
          - --
          - dns-record/home-zone/dnsconfig.js
        chdir: "{{ homelab_private_path }}"
      register: caddy_dnsconfig_git_status
      check_mode: false
      changed_when: false
      when: homelab_private_stat.stat.exists

    - name: Stage dnsconfig.js changes  # noqa command-instead-of-module
      ansible.builtin.command:
        argv:
          - git
          - add
          - --
          - dns-record/home-zone/dnsconfig.js
        chdir: "{{ homelab_private_path }}"
      when:
        - homelab_private_stat.stat.exists
        - caddy_dnsconfig_git_status.stdout | default('') | length > 0
      changed_when: true

    - name: Commit dnsconfig.js changes  # noqa command-instead-of-module
      ansible.builtin.command:
        argv:
          - git
          - commit
          - -m
          - "sync: update caddy DNS records from ansible"
          - --
          - dns-record/home-zone/dnsconfig.js
        chdir: "{{ homelab_private_path }}"
      when:
        - homelab_private_stat.stat.exists
        - caddy_dnsconfig_git_status.stdout | default('') | length > 0
      changed_when: true

    - name: Push dnsconfig.js changes  # noqa command-instead-of-module
      ansible.builtin.command:
        argv:
          - git
          - push
        chdir: "{{ homelab_private_path }}"
      when:
        - homelab_private_stat.stat.exists
        - caddy_dnsconfig_git_status.stdout | default('') | length > 0
      changed_when: true
