---
# Seed kubeconfig files from the Ansible control node into OpenBao KV.
#
# Prerequisites:
#   - openbao_admin_token must be available (set in group_vars/openbao.sops.yaml)
#   - vm-kubeconfig policy must exist (run openbao_configure.yaml first)
#   - A userpass user with vm-kubeconfig policy must exist
#     (configure via openbao_userpass_users in group_vars/openbao.sops.yaml)
#
# Configure clusters via openbao_kubeconfigs in group_vars or override with -e:
#   ansible-playbook openbao_seed_kubeconfig.yaml \
#     -e '{"openbao_kubeconfigs": [{"name": "dev", "path": "~/.kube/dev-homelab.yaml"}]}'
- name: Seed kubeconfig files to OpenBao KV
  hosts: openbao
  tasks:
    - name: Seed kubeconfig secrets
      ansible.builtin.include_role:
        name: openbao
        tasks_from: seed_kubeconfig
