---
# --- Debian / Ubuntu (apt) ---
- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    autoremove: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Check if reboot is required (Debian)
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: deb_reboot_required
  become: true
  when: ansible_facts['os_family'] == "Debian"

# --- Rocky / RHEL (dnf) ---
# dnf rejects autoremove together with state=latest, so upgrade and
# autoremove are run as separate tasks.
- name: Upgrade all packages  # noqa package-latest
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == "RedHat"

- name: Remove unused dependencies
  ansible.builtin.dnf:
    autoremove: true
  become: true
  when: ansible_facts['os_family'] == "RedHat"

# needs-restarting ships with dnf-utils; required for the reboot check below.
- name: Ensure dnf-utils is present
  ansible.builtin.dnf:
    name: dnf-utils
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"

# Exit code 1 means a reboot is required, 0 means not. failed_when disabled
# so the non-zero code is treated as data rather than a task failure.
- name: Check if reboot is required (RedHat)
  ansible.builtin.command: needs-restarting -r
  register: rhel_reboot_required
  changed_when: false
  failed_when: false
  become: true
  when: ansible_facts['os_family'] == "RedHat"

# --- Common reboot ---
- name: Reboot if required
  ansible.builtin.reboot:
    reboot_timeout: 300
  become: true
  when: >
    (ansible_facts['os_family'] == "Debian" and deb_reboot_required.stat.exists)
    or (ansible_facts['os_family'] == "RedHat" and rhel_reboot_required.rc == 1)

# Package maintainer scripts may restart services even when no reboot is
# required. Fail before the next serial host is upgraded if an updated service
# did not come back cleanly.
- name: Check for failed systemd services after package upgrades
  become: true
  ansible.builtin.command:
    argv:
      - systemctl
      - list-units
      - --state=failed
      - --type=service
      - --no-legend
      - --plain
  register: package_upgrade_failed_services
  changed_when: false
  failed_when: package_upgrade_failed_services.stdout_lines | length > 0
