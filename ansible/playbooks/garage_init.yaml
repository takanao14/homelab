---
- name: Initialize Garage S3 storage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    garage_namespace: garage
    garage_pod: garage-0
    garage_zone: dc1
    garage_capacity: 100G
    garage_public_buckets:
      - firmware
      - cloud-images
    kubectl_context: ""  # e.g. "dev-homelab"; leave empty to use current context

  tasks:
    # check_mode: false on all read-only tasks so --check mode can still inspect state
    - name: Get Garage node ID
      ansible.builtin.command:
        cmd: >
          kubectl {{ ('--context ' + kubectl_context) if kubectl_context else '' }}
          exec -n {{ garage_namespace }} {{ garage_pod }} -- /garage node id
      register: node_id_raw
      changed_when: false
      check_mode: false

    - name: Parse node ID
      ansible.builtin.set_fact:
        garage_node_id: "{{ node_id_raw.stdout | regex_search('[0-9a-f]{64}') }}"

    - name: Verify node ID was found
      ansible.builtin.assert:
        that: garage_node_id is not none and garage_node_id | length == 64
        fail_msg: "Could not parse node ID from: {{ node_id_raw.stdout }}"

    - name: Check current layout
      ansible.builtin.command:
        cmd: >
          kubectl {{ ('--context ' + kubectl_context) if kubectl_context else '' }}
          exec -n {{ garage_namespace }} {{ garage_pod }} -- /garage layout show
      register: layout_show
      changed_when: false
      check_mode: false

    - name: Apply layout if node not yet assigned
      when: garage_node_id[:8] not in layout_show.stdout
      block:
        - name: Parse current layout version
          ansible.builtin.set_fact:
            layout_version: >-
              {{ layout_show.stdout
                 | regex_search('layout version: (\d+)', '\1')
                 | default(['0'])
                 | first
                 | int }}

        - name: Assign node to layout
          ansible.builtin.command:
            cmd: >
              kubectl {{ ('--context ' + kubectl_context) if kubectl_context else '' }}
              exec -n {{ garage_namespace }} {{ garage_pod }} --
              /garage layout assign -z {{ garage_zone }} -c {{ garage_capacity }} {{ garage_node_id }}

        - name: Apply layout
          ansible.builtin.command:
            cmd: >
              kubectl {{ ('--context ' + kubectl_context) if kubectl_context else '' }}
              exec -n {{ garage_namespace }} {{ garage_pod }} --
              /garage layout apply --version {{ layout_version | int + 1 }}

    - name: Read access key from Kubernetes secret
      ansible.builtin.command:
        cmd: >
          kubectl {{ ('--context ' + kubectl_context) if kubectl_context else '' }}
          get secret garage-secret -n {{ garage_namespace }}
          -o jsonpath='{.data.access-key}'
      register: access_key_b64
      changed_when: false
      check_mode: false
      no_log: true

    - name: Read secret key from Kubernetes secret
      ansible.builtin.command:
        cmd: >
          kubectl {{ ('--context ' + kubectl_context) if kubectl_context else '' }}
          get secret garage-secret -n {{ garage_namespace }}
          -o jsonpath='{.data.secret-key}'
      register: secret_key_b64
      changed_when: false
      check_mode: false
      no_log: true

    - name: Decode credentials
      ansible.builtin.set_fact:
        garage_access_key: "{{ access_key_b64.stdout | b64decode }}"
        garage_secret_key: "{{ secret_key_b64.stdout | b64decode }}"
      no_log: true

    - name: List existing keys
      ansible.builtin.command:
        cmd: >
          kubectl {{ ('--context ' + kubectl_context) if kubectl_context else '' }}
          exec -n {{ garage_namespace }} {{ garage_pod }} -- /garage key list
      register: key_list
      changed_when: false
      check_mode: false

    - name: Import S3 key if not present
      when: garage_access_key not in key_list.stdout
      block:
        - name: Import key
          ansible.builtin.command:
            cmd: >
              kubectl {{ ('--context ' + kubectl_context) if kubectl_context else '' }}
              exec -n {{ garage_namespace }} {{ garage_pod }} --
              /garage key import --yes -n admin {{ garage_access_key }} {{ garage_secret_key }}
          no_log: true

        - name: Allow key to create buckets
          ansible.builtin.command:
            cmd: >
              kubectl {{ ('--context ' + kubectl_context) if kubectl_context else '' }}
              exec -n {{ garage_namespace }} {{ garage_pod }} --
              /garage key allow --create-bucket {{ garage_access_key }}

    - name: Configure public bucket
      ansible.builtin.shell:
        cmd: |
          set -e
          KUBECTL="kubectl {{ ('--context ' + kubectl_context) if kubectl_context else '' }}"
          EXEC="$KUBECTL exec -n {{ garage_namespace }} {{ garage_pod }} --"

          if $EXEC /garage bucket list | grep -qw "{{ item }}"; then
            echo "already configured"
          else
            $EXEC /garage bucket create {{ item }}
            BUCKET_ID=$($EXEC /garage bucket list | grep "{{ item }}" | awk '{print $1}')
            $EXEC /garage bucket website --allow "$BUCKET_ID"
            echo "configured"
          fi
      loop: "{{ garage_public_buckets }}"
      register: bucket_result
      changed_when: "'configured' in bucket_result.stdout and 'already' not in bucket_result.stdout"
