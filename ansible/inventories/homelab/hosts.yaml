    sandbox-worker3:
      ansible_host: 192.168.20.34
    prd-cp1:
      ansible_host: 192.168.30.11
    prd-worker1:
      ansible_host: 192.168.30.12
    openbao1:
      ansible_host: 192.168.40.30
    seaweedfs1:
      ansible_host: 192.168.50.31
    toolbox1:
      ansible_host: 192.168.50.30
    toolbox2:
      ansible_host: 192.168.20.21
    toolbox3:
      ansible_host: 192.168.20.23
  children:
    dns:
      children:
        dns_auth:
          children:
            dns_primary:
              hosts:
                ns1: null
            dns_secondary:
              hosts:
                ns2: null
                ns3: null
        dnsdist:
          hosts:
            dist1: null
            dist2: null

    openbao:
      hosts:
        openbao1: null

    # Standalone SeaweedFS object storage: Terraform state backup target and
    # the cloud-images bucket for Packer-built images.
    seaweedfs:
      hosts:
        seaweedfs1: null

    log_collector:
      hosts:
        log1: null

    forgejo:
      hosts:
        forgejo1: null

    forgejo_runner:
      hosts:
        runner1: null

    netbox:
      hosts:
        netbox1: null

    gpuvm:
      hosts:
        gpuvm1: null

    caddy:
      hosts:
        caddy1: null

    dhcp:
      hosts:
        rpi4: null

    prd_k8s:
      hosts:
        prd-cp1: null
        prd-worker1: null
    sandbox_k8s:
      hosts:
        sandbox-cp1: null
        sandbox-worker1: null
        sandbox-worker2: null
        sandbox-worker3: null

    lxc:
      hosts:
        caddy1: null
        log1: null
        forgejo1: null
        netbox1: null
        ns1: null
        ns2: null
        ns3: null
        dist1: null
        dist2: null
        seaweedfs1: null

    # LXC guests where Vector reads logs directly from journald.
    vector_lxc:
      children:
        caddy: {}
        dns_auth: {}
        dnsdist: {}
        forgejo: {}
        netbox: {}
        seaweedfs: {}
        log_collector: {}

    # All hosts running the Vector agent: the journald-reading LXC guests plus
    # the rpi4 DHCP host (outside vector_lxc). Target of common-vector.yaml for
    # fleet-wide Vector version bumps.
    vector:
      children:
        vector_lxc: {}
        dhcp: {}

    # Hosts whose system timezone is managed by Ansible (the set that previously
    # carried the per-playbook `timezone` role). Target of common-timezone.yaml.
    # Intentionally NOT all:!proxmox, to avoid newly touching k0s nodes/toolboxes.
    timezone:
      children:
        caddy: {}
        dnsdist: {}
        dns_auth: {}
        dhcp: {}
        forgejo: {}
        forgejo_runner: {}
        netbox: {}
        seaweedfs: {}
        openbao: {}
        gpuvm: {}
        log_collector: {}
      hosts:
        rpi3: null

    # Hosts forwarding syslog via the rsyslog role: the Proxmox nodes plus rpi3.
    # Target of common-rsyslog.yaml.
    rsyslog:
      children:
        proxmox: {}
      hosts:
        rpi3: null

    proxmox:
      hosts:
        pve: null
        node1: null
        node2: null
        node3: null
        node4: null

    node_exporter:
      children:
        node_exporter_rpi:
          hosts:
            rpi3: null
            rpi4: null
      hosts:
        pve: null
        node1: null
        node2: null
        node3: null
        node4: null
        # k0s controllers run kine (embedded SQLite) and have no kubelet, so they
        # are not covered by the in-cluster node-exporter DaemonSet. Scrape them
        # host-level to monitor the control-plane node and kine DB disk.
        prd-cp1: null
        # Stateful service guests: Proxmox OTLP does not expose in-guest
        # filesystem usage, so monitor disk-fill / inode / memory here.
        seaweedfs1: null
        forgejo1: null
        netbox1: null
        openbao1: null

    blackbox_exporter:
      hosts:
        rpi4: null

    # Shared VMs that receive bulk user accounts (see playbooks/common-users.yaml).
    # Add target VM hostnames here (they must also exist under all.hosts).
    shared_vms:
      hosts: {}
        # devvm01: null
