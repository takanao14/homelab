    node1:
      ansible_host: 192.168.10.11
    node2:
      ansible_host: 192.168.10.12
    node3:
      ansible_host: 192.168.10.13
    node4:
      ansible_host: 192.168.10.14
    rpi3:
      ansible_host: 192.168.10.240
    rpi4:
      ansible_host: 192.168.10.241
    sandbox-cp1:
      ansible_host: 192.168.20.31
    sandbox-worker1:
