---
# loki_endpoint comes from group_vars/all.yaml (fixed IP, no DNS dependency).

vector_config:
  sources:
    syslog_udp:
      type: socket
      address: "0.0.0.0:514"
      mode: udp
      decoding:
        codec: bytes

    syslog_tcp:
      type: socket
      address: "0.0.0.0:514"
      mode: tcp
      framing:
        method: newline_delimited
      decoding:
        codec: bytes

    # log1 is itself a Vector host, so it collects its own journal directly
    # instead of relying on journald-to-rsyslog forwarding (which the LXC
    # AppArmor profile denies and which would not reach Loki anyway).
    journald:
      type: journald
      include_units:
        - vector
        - ssh

  transforms:
    parse_syslog:
      type: remap
      inputs:
        - syslog_udp
        - syslog_tcp
      source: |
        msg = string!(.message)
        .parse_error = false

        if match(msg, r'^<\d+>1 ') {
          # RFC 5424 (Catalyst 1200)
          parsed, err = parse_syslog(msg)
          if err == null {
            . = merge(., parsed)
          } else {
            .parse_error = true
          }
        } else if match(msg, r'^<\d+>\[') {
          # WiFi AP (non-standard)
          parsed, err = parse_regex(msg, r'^<(?P<pri>\d+)>\[(?P<mac>[^\]]+)\]\s+(?P<host>\S+)\s*:\s*(?P<message>.+)$')
          if err == null {
            pri = to_int!(parsed.pri)
            .severity = to_string(mod(pri, 8))
            .facility = to_string(floor(to_float(pri) / 8.0))
            .host = parsed.host
            .message = parsed.message
            .appname = parsed.mac
          } else {
            .parse_error = true
          }
        } else {
          # RFC 3164 variant (IX2106)
          parsed, err = parse_syslog(msg)
          if err == null {
            . = merge(., parsed)
          } else {
            .parse_error = true
          }
        }

        # Ensure default values for required label fields
        # parse_syslog() returns .hostname for RFC 5424; socket source pre-fills .host with source IP
        if exists(.hostname) && !is_null(.hostname) {
          .host = .hostname
        } else if !exists(.host) || is_null(.host) {
          .host = .source_ip
        }
        if !exists(.appname) || is_null(.appname) { .appname = "unknown" }
        if !exists(.severity) || is_null(.severity) { .severity = "unknown" }

    parse_journald:
      type: remap
      inputs:
        - journald
      source: |
        .host = get_hostname!()
        .unit = string(._SYSTEMD_UNIT) ?? string(.SYSLOG_IDENTIFIER) ?? "unknown"

  sinks:
    loki:
      type: loki
      inputs:
        - parse_syslog
      endpoint: "{{ loki_endpoint }}"
      encoding:
        codec: json
      healthcheck:
        enabled: false
      buffer:
        type: disk
        max_size: 268435488
        when_full: block
      labels:
        host: !unsafe "{{ host }}"
        appname: !unsafe "{{ appname }}"
        severity: !unsafe "{{ severity }}"

    loki_journald:
      type: loki
      inputs:
        - parse_journald
      endpoint: "{{ loki_endpoint }}"
      encoding:
        codec: json
      healthcheck:
        enabled: false
      labels:
        host: !unsafe "{{ host }}"
        unit: !unsafe "{{ unit }}"
