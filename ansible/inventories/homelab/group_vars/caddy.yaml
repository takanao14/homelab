---
caddy_ip: "192.168.10.244"
caddy_upstreams:
  - hostname: pdns1.home.butaco.net
    backend: 192.168.10.233:8081
  - hostname: pdns2.home.butaco.net
    backend: 192.168.10.234:8081
  - hostname: pdns3.home.butaco.net
    backend: 192.168.10.235:8081
  - hostname: dnsdist1.home.butaco.net
    backend: 192.168.10.231:8083
  - hostname: dnsdist2.home.butaco.net
    backend: 192.168.10.232:8083
  - hostname: forgejo.home.butaco.net
    backend: 192.168.10.245:3000
  - hostname: truenas-ui.home.butaco.net
    backend: 192.168.20.10:443
    scheme: https
    tls_insecure: true   # TrueNAS uses a local (self-signed) cert; verify only the internal Caddy->TrueNAS leg is skipped
  - hostname: netbox-ui.home.butaco.net
    backend: 192.168.10.247:80
  - hostname: openbao.home.butaco.net
    backend: 192.168.40.30:8200
  - hostname: s3.home.butaco.net
    backend: 192.168.50.31:8333
  - hostname: seaweedfs-ui.home.butaco.net
    backend: 192.168.50.31:23646
  - hostname: meshcentral.home.butaco.net
    backend: 192.168.10.241:8443

vector_config:
  sources:
    journald:
      type: journald
      include_units:
        - caddy
        - ssh
  transforms:
    parse_journald:
      type: remap
      inputs:
        - journald
      source: |
        .host = get_hostname!()
        .unit = string(._SYSTEMD_UNIT) ?? string(.SYSLOG_IDENTIFIER) ?? "unknown"
  sinks:
    loki:
      type: loki
      inputs:
        - parse_journald
      endpoint: "{{ loki_endpoint }}"
      encoding:
        codec: json
      healthcheck:
        enabled: false
      labels:
        host: !unsafe "{{ host }}"
        unit: !unsafe "{{ unit }}"
