---
# Kernel tuning for Proxmox hosts (consumed by the `sysctl` role).
# This dict replaces the role default, so keep every key you want applied.
sysctl_settings:
  # Default 60 swaps out live VM pages too eagerly on a hypervisor; 10 only
  # swaps under genuine memory pressure. See roles/sysctl/README.md.
  vm.swappiness: 10

# Proxmox ships chrony by default, so the chrony role only repoints its config
# at the router: never (re)install the package, and never touch the systemd
# state of timesyncd (it already yielded to chrony — masking/disabling it here
# would be needless surgery on the hypervisor).
chrony_install: false
chrony_manage_timesyncd: false

# Static route source of truth for per-node Proxmox SDN SimpleZone segments.
# Each Proxmox host owns one routed SimpleZone behind its management-LAN address.
# The proxmox_simplezone_routes role installs routes to every *other* segment on
# each node, avoiding IX2106 hairpinning for SimpleZone-to-SimpleZone traffic.
proxmox_simplezone_routes_interface: vmbr0
proxmox_simplezone_routes_file: /etc/network/interfaces.d/ansible-simplezone-routes
proxmox_simplezone_routes_map:
  pve:
    segment: 192.168.20.0/24
    via: 192.168.10.10
  node1:
    segment: 192.168.30.0/24
    via: 192.168.10.11
  node2:
    segment: 192.168.40.0/24
    via: 192.168.10.12
  node3:
    segment: 192.168.50.0/24
    via: 192.168.10.13
  node4:
    segment: 192.168.60.0/24
    via: 192.168.10.14
  node5:
    segment: 192.168.70.0/24
    via: 192.168.10.15

# Forward Proxmox host logs to the central Vector log collector.
rsyslog_forward_host: "192.168.10.243"
rsyslog_forward_port: 514
rsyslog_forward_protocol: tcp
rsyslog_journal_input: true
rsyslog_ignore_previous_journal: true
rsyslog_queue_size: 10000
rsyslog_queue_high_watermark: 9000
rsyslog_queue_low_watermark: 7000
rsyslog_queue_max_disk_space: "256m"

# Proxmox file logs the journal does not cover. Exact paths only; rotated files
# (.1, .gz, index.1, pveam.log.0) are intentionally not matched. tasks/active and
# the per-task tasks/[0-F]/* output files are excluded (rewritten state / hundreds
# of low-value UPID files). Sensitive fields in access.log (source IPs, users,
# URLs, VMIDs, UPIDs) stay in the message body and must never become Loki labels.
rsyslog_file_inputs:
  - path: /var/log/pve/tasks/index
    tag: pve-task
  - path: /var/log/pveproxy/access.log
    tag: pveproxy-access
  - path: /var/log/pve-firewall.log
    tag: pve-firewall-file
  - path: /var/log/pveam.log
    tag: pveam

# Proxmox external metric server definitions are cluster-scoped. These hosts are
# independent Proxmox installations, so each one manages its own definition.
proxmox_metric_server_manage_hosts:
  - pve
  - node1
  - node2
  - node3
  - node4
  - node5

proxmox_metric_server_definitions:
  - id: alloy-otlp
    type: opentelemetry
    server: 192.168.30.251
    port: 4318
    otel-protocol: http
    otel-path: /v1/metrics
    otel-compression: gzip
    state: present
