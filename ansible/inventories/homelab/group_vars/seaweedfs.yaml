---
# Non-secret SeaweedFS configuration. The S3 access/secret key live in
# seaweedfs.sops.yaml.
#
# The role only stands the server up. Creating the Terraform state bucket and
# enabling versioning is a post-install step, deferred until the migration
# target is decided (see roles/seaweedfs/README.md).
#
# Override the advertised address here if the host has multiple interfaces:
# seaweedfs_ip: "192.168.x.y"
seaweedfs_ip: "{{ ansible_facts['default_ipv4']['address'] }}"

# Public-download buckets (absorbed from Garage). Anonymous clients get Read-only
# (no List) on these; served over HTTPS via the central Caddy at
# https://s3.home.butaco.net/<bucket>/<file>. The seaweedfs role creates these
# buckets with the Admin identity.
#   firmware     - router / PC firmware images (in use)
#   cloud-images - custom image distribution (future; empty for now)
seaweedfs_public_buckets:
  - firmware
  - cloud-images

# Upload identity for packer/push.sh. The script disables S3 multipart upload,
# and this identity gets object-level S3 actions without Admin/IAM privileges.
# SeaweedFS 4.37 rejects PutObject when these actions are bucket-scoped.
# Credentials live in seaweedfs.sops.yaml.
seaweedfs_s3_extra_identities:
  - name: imagebuilder
    access_key: "{{ seaweedfs_imagebuilder_access_key }}"
    secret_key: "{{ seaweedfs_imagebuilder_secret_key }}"
    actions: ["Read", "Write", "List"]

vector_config:
  sources:
    journald:
      type: journald
      include_units:
        - seaweedfs
        - seaweedfs-admin
        - seaweedfs-backup
        - ssh
  transforms:
    parse_journald:
      type: remap
      inputs:
        - journald
      source: |
        .host = get_hostname!()
        .unit = string(._SYSTEMD_UNIT) ?? string(.SYSLOG_IDENTIFIER) ?? "unknown"
  sinks:
    loki:
      type: loki
      inputs:
        - parse_journald
      endpoint: "{{ loki_endpoint }}"
      encoding:
        codec: json
      healthcheck:
        enabled: false
      labels:
        host: !unsafe "{{ host }}"
        unit: !unsafe "{{ unit }}"
