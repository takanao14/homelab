---
# Non-secret SeaweedFS configuration. The S3 access/secret key live in
# seaweedfs.sops.yaml.
#
# The role also creates public buckets and manages the admin UI and R2 backup
# timer. The versioned backup destination bucket remains a one-time post-install
# step (see roles/seaweedfs/README.md).

# Public-download buckets. Anonymous clients get Read-only
# (no List) on these; served over HTTPS via the central Caddy at
# https://s3.home.butaco.net/<bucket>/<file>. The seaweedfs role creates these
# buckets with the Admin identity.
#   firmware     - router / PC firmware images
#   cloud-images - custom image distribution
seaweedfs_public_buckets:
  - firmware
  - cloud-images

# Upload identity for packer/push.sh. SeaweedFS 4.37 rejects PutObject when these
# actions are bucket-scoped, so they currently apply to every bucket. This is
# broader than the intended cloud-images scope, but excludes Admin/IAM actions.
# The script disables S3 multipart upload to keep the required actions minimal.
# Credentials live in seaweedfs.sops.yaml.
seaweedfs_s3_extra_identities:
  - name: imagebuilder
    access_key: "{{ seaweedfs_imagebuilder_access_key }}"
    secret_key: "{{ seaweedfs_imagebuilder_secret_key }}"
    actions: ["Read", "Write", "List"]

vector_config:
  sources:
    journald:
      type: journald
      include_units:
        - seaweedfs
        - seaweedfs-admin
        - seaweedfs-backup
        - ssh
  transforms:
    parse_journald:
      type: remap
      inputs:
        - journald
      source: |
        .host = get_hostname!()
        .unit = string(._SYSTEMD_UNIT) ?? string(.SYSLOG_IDENTIFIER) ?? "unknown"
  sinks:
    loki:
      type: loki
      inputs:
        - parse_journald
      endpoint: "{{ loki_endpoint }}"
      encoding:
        codec: json
      healthcheck:
        enabled: false
      labels:
        host: !unsafe "{{ host }}"
        unit: !unsafe "{{ unit }}"
