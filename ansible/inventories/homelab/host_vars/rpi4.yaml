---
vector_config:
  sources:
    journald:
      type: journald
      include_units:
        - kea-dhcp4-server
        - meshcentral
        - ssh
        - tailscaled
  transforms:
    parse_journald:
      type: remap
      inputs:
        - journald
      source: |
        .host = get_hostname!()
        .unit = string(._SYSTEMD_UNIT) ?? string(.SYSLOG_IDENTIFIER) ?? "unknown"
  sinks:
    loki:
      type: loki
      inputs:
        - parse_journald
      endpoint: "{{ loki_endpoint }}"
      encoding:
        codec: json
      healthcheck:
        enabled: false
      dangerously_allow_unconfined_template_resolution: true
      labels:
        host: !unsafe "{{ host }}"
        unit: !unsafe "{{ unit }}"
