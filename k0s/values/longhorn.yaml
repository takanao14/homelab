defaultSettings:
  # Store volume data on the SSD mounted by ssdsetup.sh
  defaultDataPath: /srv/storage/volume
  # Default replica count — increase to match the number of storage nodes for redundancy
  defaultReplicaCount: 1

persistence:
  defaultClass: true
  defaultClassReplicaCount: 1

longhornUI:
  service:
    # Use ClusterIP and expose via ingress/gateway if needed
    type: ClusterIP
