apiVersion: v1
kind: Namespace
metadata:
  name: smoke-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-nginx
  namespace: smoke-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smoke-nginx
  template:
    metadata:
      labels:
        app: smoke-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: smoke-nginx
  namespace: smoke-test
spec:
  type: LoadBalancer
  selector:
    app: smoke-nginx
  ports:
    - port: 80
      targetPort: 80
