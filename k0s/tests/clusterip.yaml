apiVersion: v1
kind: Service
metadata:
  name: smoke-nginx-clusterip
  namespace: smoke-test
spec:
  type: ClusterIP
  selector:
    app: smoke-nginx
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-clusterip-check
  namespace: smoke-test
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: wget
          image: busybox:stable
          command: ["wget", "-qO-", "--timeout=10", "http://smoke-nginx-clusterip"]
