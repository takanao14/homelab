apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smoke-pvc
  namespace: smoke-test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-pvc-write
  namespace: smoke-test
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: write
          image: busybox:stable
          command: ["sh", "-c", "echo 'smoke-test-ok' > /data/test.txt && echo 'wrote: smoke-test-ok'"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: smoke-pvc
