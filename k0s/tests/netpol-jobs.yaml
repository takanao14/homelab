apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-netpol-allowed
  namespace: smoke-test
spec:
  template:
    metadata:
      labels:
        role: client-allowed
    spec:
      restartPolicy: Never
      containers:
        - name: wget
          image: busybox:stable
          command: ["wget", "-qO-", "--timeout=10", "http://netpol-server"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-netpol-denied
  namespace: smoke-test
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        role: client-denied
    spec:
      restartPolicy: Never
      containers:
        - name: wget
          image: busybox:stable
          command: ["wget", "-qO-", "--timeout=5", "http://netpol-server"]
