apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: homelab-l2-policy
spec:
  interfaces:
    - {{ .Values.l2Policy.interface }}
  {{- with .Values.l2Policy.nodeSelector }}
  nodeSelector:
    matchLabels:
      {{- toYaml . | nindent 6 }}
  {{- end }}
  externalIPs: true
  loadBalancerIPs: true
