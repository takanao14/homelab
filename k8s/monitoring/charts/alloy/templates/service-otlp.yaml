apiVersion: v1
kind: Service
metadata:
  name: alloy-otlp
  namespace: monitoring
  annotations:
    io.cilium/lb-ipam-ips: {{ .Values.otlp.loadBalancerIP | quote }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.otlp.hostname }}
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: alloy
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
