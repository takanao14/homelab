apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: pdns-auth-external
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  # External LAN hosts: opt out of the default cluster-prd scrape class.
  scrapeClass: external
  staticConfigs:
    - targets:
        {{- range .Values.targetIPs }}
        - "{{ . }}:{{ $.Values.port }}"
        {{- end }}
  metricsPath: {{ .Values.metricsPath }}
  scrapeInterval: 30s
