{{- /*
external-dns metrics. Defined here (not in k8s/externalDNS/) for consistency
with the other cross-cutting ServiceMonitors in this chart (cilium, envoy
gateway, argocd) — see cilium-servicemonitors.yaml for the CRD-race rationale,
though external-dns itself has no such ordering constraint since it isn't
part of cluster bootstrap.

The cluster label is injected by the environment's default scrape class (see
prometheusSpec.scrapeClasses in values/prometheus*.yaml).

Keep this semantically paired with the dev copy at
k8s/dev-monitoring/charts/prometheus/templates/external-dns.yaml. Sandbox
renders this same template through values/prometheus-sandbox.yaml and has no
separate copy. Selectors, ports, paths, and non-cluster relabelings should stay
in sync; cluster-label handling intentionally differs (prd/sandbox use scrape
classes, dev uses remote_write externalLabels).
*/ -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: external-dns
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames: ["external-dns"]
  selector:
    matchLabels:
      app: external-dns
  endpoints:
    - port: http-metrics
      interval: 30s
