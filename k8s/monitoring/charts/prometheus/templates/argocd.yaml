{{- /*
ArgoCD metrics. Defined here (not in k8s/argocd/) because argocd is
bootstrapped via helmfile before any ArgoCD Application exists, and would fail
on a fresh cluster if it referenced the ServiceMonitor CRD before it exists —
same reasoning as cilium-servicemonitors.yaml and envoy-gateway.yaml. The
metrics Services themselves are enabled via controller/server/repoServer/
applicationSet.metrics.enabled in k8s/argocd/values-common.yaml.

The metrics Services' own app.kubernetes.io/name label is not simply
"argocd-<component>" (that value is the *pod* selector, not the Service's own
label): application-controller and applicationset-controller both share the
generic "argocd-metrics" name and are distinguished only by
app.kubernetes.io/component, while repo-server and server each get their own
distinct "argocd-<component>-metrics" name. Confirmed via `kubectl get svc -o
yaml` on prd (2026-07-04) after the first version of this file (matching on
"argocd-<component>") produced zero scraped targets.

The cluster label is injected by the environment's default scrape class (see
prometheusSpec.scrapeClasses in values/prometheus*.yaml).

Keep this semantically paired with the dev copy at
k8s/dev-monitoring/charts/prometheus/templates/argocd.yaml. Sandbox renders
this same template through values/prometheus-sandbox.yaml and has no separate
copy. Selectors, ports, paths, and non-cluster relabelings should stay in sync;
cluster-label handling intentionally differs (prd/sandbox use scrape classes,
dev uses remote_write externalLabels).
*/ -}}
{{- $components := dict
  "application-controller" "argocd-metrics"
  "applicationset-controller" "argocd-metrics"
  "repo-server" "argocd-repo-server-metrics"
  "server" "argocd-server-metrics"
}}
{{- $i := 0 }}
{{- range $component, $serviceName := $components }}
{{- if $i }}
---
{{- end }}
{{- $i = add $i 1 }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-{{ $component }}
  namespace: {{ $.Release.Namespace }}
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames: ["argocd"]
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $serviceName }}
      app.kubernetes.io/component: {{ $component }}
  endpoints:
    - port: http-metrics
      interval: 30s
{{- end }}
