{{- /*
ServiceMonitors for Cilium metrics. Defined here (not in the Cilium chart)
because Cilium is installed via helmfile at cluster bootstrap, before the
kube-prometheus-stack ServiceMonitor CRD exists. Cilium only exposes the metrics
Services (prometheus.metricsService / hubble.metrics.enabled); scraping is wired
up here. The cluster label is injected by the environment's default scrape class
(see prometheusSpec.scrapeClasses in values/prometheus*.yaml).

Keep this semantically paired with the dev copy at
k8s/dev-monitoring/charts/prometheus/templates/cilium-servicemonitors.yaml.
Sandbox renders this same template through values/prometheus-sandbox.yaml and
has no separate copy. Selectors, ports, paths, and non-cluster relabelings
should stay in sync; cluster-label handling intentionally differs (prd/sandbox
use scrape classes, dev uses remote_write externalLabels).
*/ -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cilium-agent
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames: ["kube-system"]
  selector:
    matchLabels:
      app.kubernetes.io/name: cilium-agent
  endpoints:
    - port: metrics
      interval: 30s
      relabelings:
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cilium-operator
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames: ["kube-system"]
  selector:
    matchLabels:
      app.kubernetes.io/name: cilium-operator
  endpoints:
    - port: metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hubble
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames: ["kube-system"]
  selector:
    matchLabels:
      app.kubernetes.io/name: hubble
  endpoints:
    - port: hubble-metrics
      interval: 30s
      relabelings:
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
