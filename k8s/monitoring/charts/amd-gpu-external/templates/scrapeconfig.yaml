apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: amd-gpu-external
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  staticConfigs:
    - targets:
        - "{{ .Values.targetIP }}:{{ .Values.port }}"
  metricsPath: {{ .Values.metricsPath }}
  scrapeInterval: 30s
