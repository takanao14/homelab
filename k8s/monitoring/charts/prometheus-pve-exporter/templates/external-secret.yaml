apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pve-exporter-config
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: pve-exporter-config
    creationPolicy: Owner
    template:
      data:
        pve.yml: |
          cluster_dev:
            user: {{ "{{ .clusterDevUser }}" | quote }}
            token_name: {{ "{{ .clusterDevTokenName }}" | quote }}
            token_value: {{ "{{ .clusterDevTokenValue }}" | quote }}
            verify_ssl: false
          cluster_prd:
            user: {{ "{{ .clusterPrdUser }}" | quote }}
            token_name: {{ "{{ .clusterPrdTokenName }}" | quote }}
            token_value: {{ "{{ .clusterPrdTokenValue }}" | quote }}
            verify_ssl: false
          cluster_node2:
            user: {{ "{{ .clusterNode2User }}" | quote }}
            token_name: {{ "{{ .clusterNode2TokenName }}" | quote }}
            token_value: {{ "{{ .clusterNode2TokenValue }}" | quote }}
            verify_ssl: false
          cluster_node3:
            user: {{ "{{ .clusterNode3User }}" | quote }}
            token_name: {{ "{{ .clusterNode3TokenName }}" | quote }}
            token_value: {{ "{{ .clusterNode3TokenValue }}" | quote }}
            verify_ssl: false
  data:
    - secretKey: clusterDevUser
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-dev-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterDevTokenName
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-dev-token-name
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterDevTokenValue
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-dev-token-value
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterPrdUser
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-prd-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterPrdTokenName
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-prd-token-name
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterPrdTokenValue
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-prd-token-value
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterNode2User
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-node2-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterNode2TokenName
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-node2-token-name
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterNode2TokenValue
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-node2-token-value
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterNode3User
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-node3-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterNode3TokenName
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-node3-token-name
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: clusterNode3TokenValue
      remoteRef:
        key: k8s/monitoring/pve-exporter
        property: cluster-node3-token-value
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
