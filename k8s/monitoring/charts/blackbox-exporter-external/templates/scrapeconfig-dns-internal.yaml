apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: dns-internal
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  # External probe targets: opt out of the default cluster-prd scrape class.
  scrapeClass: external
  metricsPath: /probe
  params:
    module: [dns_internal]
  staticConfigs:
    # Recursors come from the shared inventory (values/dns-recursors.yaml);
    # dns_external and dns_internal probe the same set with different modules.
    {{- range .Values.dnsRecursors }}
    - targets: [{{ .ip | quote }}]
      labels:
        __tmp_name: {{ .name | quote }}
    {{- end }}
  relabelings:
    - action: replace
      sourceLabels: [__address__]
      targetLabel: __param_target
    - action: replace
      sourceLabels: [__tmp_name]
      targetLabel: instance
    - action: replace
      targetLabel: __address__
      replacement: {{ .Values.blackboxExporterURL | quote }}
  scrapeInterval: {{ .Values.scrapeInterval }}
