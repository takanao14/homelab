apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: icmp-network-devices
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  metricsPath: /probe
  params:
    module: [icmp]
  staticConfigs:
    {{- range .Values.icmp.targets }}
    - targets: [{{ .ip | quote }}]
      labels:
        name: {{ .name | quote }}
    {{- end }}
  relabelings:
    # 監視対象 IP を __param_target にセット
    - sourceLabels: [__address__]
      targetLabel: __param_target
    # instance ラベルをホスト名に設定
    - sourceLabels: [name]
      targetLabel: instance
    # スクレイプ先を rpi4 の blackbox_exporter に向ける
    - targetLabel: __address__
      replacement: {{ .Values.blackboxExporterURL | quote }}
  scrapeInterval: {{ .Values.scrapeInterval }}
