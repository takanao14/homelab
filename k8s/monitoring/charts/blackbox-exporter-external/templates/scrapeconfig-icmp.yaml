apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: icmp-network-devices
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  # External probe targets: opt out of the default cluster-prd scrape class.
  scrapeClass: external
  metricsPath: /probe
  params:
    module: [icmp]
  staticConfigs:
    # Proxmox hypervisors come from the shared inventory (values/proxmox-nodes.yaml):
    # one ICMP probe per node IP, plus one per AMT IP when amtIp is set.
    {{- range .Values.proxmoxNodes }}
    - targets: [{{ .ip | quote }}]
      labels:
        __tmp_name: {{ .name | quote }}
    {{- end }}
    {{- range .Values.proxmoxNodes }}
    {{- if .amtIp }}
    - targets: [{{ .amtIp | quote }}]
      labels:
        __tmp_name: {{ printf "%s-amt" .name | quote }}
    {{- end }}
    {{- end }}
    {{- range .Values.icmp.targets }}
    - targets: [{{ .ip | quote }}]
      labels:
        __tmp_name: {{ .name | quote }}
    {{- end }}
  relabelings:
    # Set target IP as __param_target
    - action: replace
      sourceLabels: [__address__]
      targetLabel: __param_target
    # Set instance label to hostname
    - action: replace
      sourceLabels: [__tmp_name]
      targetLabel: instance
    # Point scrape target to blackbox_exporter on rpi4
    - action: replace
      targetLabel: __address__
      replacement: {{ .Values.blackboxExporterURL | quote }}
  scrapeInterval: {{ .Values.scrapeInterval }}
