apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: icmp-network-devices
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  metricsPath: /probe
  params:
    module: [icmp]
  staticConfigs:
    - targets:
        {{- range .Values.icmp.targets }}
        - {{ . | quote }}
        {{- end }}
  relabelings:
    # 監視対象 IP を __param_target にセット
    - sourceLabels: [__address__]
      targetLabel: __param_target
    # instance ラベルを監視対象 IP に設定
    - sourceLabels: [__param_target]
      targetLabel: instance
    # スクレイプ先を rpi4 の blackbox_exporter に向ける
    - targetLabel: __address__
      replacement: {{ .Values.blackboxExporterURL | quote }}
  scrapeInterval: {{ .Values.scrapeInterval }}
