apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: dns-external
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  # External probe targets: opt out of the default cluster-prd scrape class.
  scrapeClass: external
  metricsPath: /probe
  params:
    module: [dns_external]
  staticConfigs:
    {{- range .Values.dnsExternal.targets }}
    - targets: [{{ .ip | quote }}]
      labels:
        __tmp_name: {{ .name | quote }}
    {{- end }}
  relabelings:
    - sourceLabels: [__address__]
      targetLabel: __param_target
    - sourceLabels: [__tmp_name]
      targetLabel: instance
    - targetLabel: __address__
      replacement: {{ .Values.blackboxExporterURL | quote }}
  scrapeInterval: {{ .Values.scrapeInterval }}
