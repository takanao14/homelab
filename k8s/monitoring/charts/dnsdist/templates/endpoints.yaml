apiVersion: v1
kind: Endpoints
metadata:
  name: dnsdist-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: dnsdist
    release: prometheus
subsets:
  - addresses:
      {{- range .Values.targetIPs }}
      - ip: {{ . | quote }}
      {{- end }}
    ports:
      - name: metrics
        port: {{ .Values.port }}
        protocol: TCP
