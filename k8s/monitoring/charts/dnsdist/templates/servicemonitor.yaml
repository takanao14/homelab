apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dnsdist-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: dnsdist
  endpoints:
    - port: metrics
      interval: 30s
      path: {{ .Values.metricsPath }}
