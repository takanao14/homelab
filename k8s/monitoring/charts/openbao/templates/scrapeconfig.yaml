apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: openbao
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  # LAN infrastructure, not a prd-cluster workload: opt out of the default
  # cluster-prd scrape class (see prometheusSpec.scrapeClasses in
  # values/prometheus.yaml).
  scrapeClass: external
  staticConfigs:
    {{- range .Values.targets }}
    - targets: ["{{ .ip }}:{{ $.Values.port }}"]
      labels:
        __tmp_name: {{ .name | quote }}
    {{- end }}
  relabelings:
    # Scrape by IP (no DNS dependency) but expose the hostname as instance.
    - sourceLabels: [__tmp_name]
      targetLabel: instance
  metricsPath: {{ .Values.metricsPath }}
  scheme: {{ .Values.scheme }}
  params:
    format: ["prometheus"]
  scrapeInterval: 30s
