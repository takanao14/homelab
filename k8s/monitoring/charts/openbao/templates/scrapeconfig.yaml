apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: openbao
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  # LAN infrastructure, not a prd-cluster workload: opt out of the default
  # cluster-prd scrape class (see prometheusSpec.scrapeClasses in
  # values/prometheus.yaml).
  scrapeClass: external
  staticConfigs:
    - targets:
        {{- range .Values.targetIPs }}
        - "{{ . }}:{{ $.Values.port }}"
        {{- end }}
  metricsPath: {{ .Values.metricsPath }}
  scheme: {{ .Values.scheme }}
  params:
    format: ["prometheus"]
  scrapeInterval: 30s
