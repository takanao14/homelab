kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector: {}
      serviceMonitorNamespaceSelector: {}
      retention: 30d
      resourceSpec:
        requests:
          memory: 512Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
    service:
      type: ClusterIP

  grafana:
    defaultDashboardsTimezone: jst
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
    persistence:
      enabled: true
      type: pvc
      accessModes:
        - ReadWriteOnce
      size: 5Gi
    initChownData:
      enabled: false
    service:
      type: ClusterIP

  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false

grafana:
  hostname: grafana.prd.butaco.net

prometheus:
  hostname: prometheus.prd.butaco.net
