kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          release: prometheus
      serviceMonitorNamespaceSelector: {}
      ruleSelectorNilUsesHelmValues: false
      ruleSelector:
        matchLabels:
          release: prometheus
      ruleSelectorNamespaceSelector: {}
      scrapeConfigSelectorNilUsesHelmValues: false
      scrapeConfigSelector:
        matchLabels:
          release: prometheus
      scrapeConfigNamespaceSelector: {}
      enableRemoteWriteReceiver: true
      externalLabels:
        cluster: prd
      retention: 30d
      resourceSpec:
        requests:
          memory: 512Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
    service:
      type: ClusterIP

  grafana:
    enabled: false

  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false

prometheus:
  hostname: prometheus.prd.butaco.net
