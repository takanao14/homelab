kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          release: prometheus
      serviceMonitorNamespaceSelector: {}
      ruleSelectorNilUsesHelmValues: false
      ruleSelector:
        matchLabels:
          release: prometheus
      ruleSelectorNamespaceSelector: {}
      scrapeConfigSelectorNilUsesHelmValues: false
      scrapeConfigSelector:
        matchLabels:
          release: prometheus
      scrapeConfigNamespaceSelector: {}
      enableRemoteWriteReceiver: true
      externalLabels:
        cluster: prd
      retention: 30d
      resourceSpec:
        requests:
          memory: 512Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
    serviceMonitor:
      metricRelabelings:
        - action: replace
          targetLabel: cluster
          replacement: prd
    service:
      type: ClusterIP

  grafana:
    enabled: false

  kubelet:
    serviceMonitor:
      metricRelabelings:
        - action: replace
          targetLabel: cluster
          replacement: prd
      cAdvisorMetricRelabelings:
        - action: replace
          targetLabel: cluster
          replacement: prd
      probesMetricRelabelings:
        - action: replace
          targetLabel: cluster
          replacement: prd

  kubeApiServer:
    serviceMonitor:
      metricRelabelings:
        - action: replace
          targetLabel: cluster
          replacement: prd

  coreDns:
    serviceMonitor:
      metricRelabelings:
        - action: replace
          targetLabel: cluster
          replacement: prd

  kube-state-metrics:
    prometheus:
      monitor:
        metricRelabelings:
          - action: replace
            targetLabel: cluster
            replacement: prd

  nodeExporter:
    enabled: true

  # The node-exporter ServiceMonitor is managed by the prometheus-node-exporter subchart.
  # nodeExporter.serviceMonitor is ignored by kube-prometheus-stack v84+; use the subchart path instead.
  prometheus-node-exporter:
    prometheus:
      monitor:
        relabelings:
          - action: replace
            sourceLabels: [__meta_kubernetes_pod_node_name]
            targetLabel: node
        metricRelabelings:
          - action: replace
            targetLabel: cluster
            replacement: prd

  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false

prometheus:
  hostname: prometheus.prd.butaco.net
