kube-prometheus-stack:
  alertmanager:
    alertmanagerSpec:
      alertmanagerConfigSelector:
        matchLabels:
          release: prometheus
      alertmanagerConfigMatcherStrategy:
        type: None
    config:
      global:
        resolve_timeout: 5m
      inhibit_rules:
        - source_matchers:
            - severity = critical
          target_matchers:
            - severity =~ warning|info
          equal:
            - namespace
            - alertname
        - source_matchers:
            - severity = warning
          target_matchers:
            - severity = info
          equal:
            - namespace
            - alertname
        - source_matchers:
            - alertname = InfoInhibitor
          target_matchers:
            - severity = info
          equal:
            - namespace
        - target_matchers:
            - alertname = InfoInhibitor
      route:
        receiver: "null"
        group_by:
          - alertname
          - cluster
          - namespace
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          - receiver: "null"
            matchers:
              - alertname = "Watchdog"
          - receiver: "null"
            matchers:
              - alertname = "InfoInhibitor"
      receivers:
        - name: "null"
      templates:
        - /etc/alertmanager/config/*.tmpl

  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          release: prometheus
      serviceMonitorNamespaceSelector: {}
      ruleSelectorNilUsesHelmValues: false
      ruleSelector:
        matchLabels:
          release: prometheus
      ruleSelectorNamespaceSelector: {}
      scrapeConfigSelectorNilUsesHelmValues: false
      scrapeConfigSelector:
        matchLabels:
          release: prometheus
      scrapeConfigNamespaceSelector: {}
      enableRemoteWriteReceiver: true
      externalLabels:
        cluster: prd
      # Default scrape class stamps cluster=prd on every scraped target so
      # individual ServiceMonitors/PodMonitors don't need their own relabeling.
      # Uses target relabelings (not metricRelabelings) so synthetic series
      # such as up and scrape_* get the label too — KubeletDown and other
      # up-join rules depend on it. External LAN targets opt out with
      # scrapeClass: external because they are not prd-cluster workloads and
      # must not appear in cluster=~"$cluster" dashboard queries (and
      # control-plane-node-exporter sets its own per-target cluster labels
      # that the default class would overwrite).
      scrapeClasses:
        - name: cluster-prd
          default: true
          relabelings:
            - action: replace
              targetLabel: cluster
              replacement: prd
        - name: external
      retention: 30d
      resources:
        requests:
          memory: 512Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
    service:
      type: ClusterIP

  grafana:
    enabled: false

  kubelet:
    serviceMonitor:
      # NOTE: these keys override the chart defaults, so the default
      # __metrics_path__ -> metrics_path relabeling must be repeated here for
      # all three kubelet scrape endpoints (/metrics, /metrics/cadvisor,
      # /metrics/probes); the KubeletDown rule selects
      # up{...,metrics_path="/metrics"}. The cluster label itself comes from
      # the default cluster-prd scrape class (values/prometheus.yaml).
      relabelings:
        - action: replace
          sourceLabels: [__metrics_path__]
          targetLabel: metrics_path
      cAdvisorRelabelings:
        - action: replace
          sourceLabels: [__metrics_path__]
          targetLabel: metrics_path
      probesRelabelings:
        - action: replace
          sourceLabels: [__metrics_path__]
          targetLabel: metrics_path

  # Resource reservations for the stack's own components. Without requests these
  # run as BestEffort and are evicted first under node memory pressure. Requests
  # only, no limits — see "Resource Requests" in k8s/README.md. Sizing basis:
  # 7-day observed usage, requests ~= mean x 1.2. Prometheus and Alertmanager
  # themselves already carry requests above.
  #
  # Observed: mean 48Mi, peak 85Mi, p95 CPU 2.6m.
  prometheusOperator:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi

  # Observed: mean 55Mi, peak 77Mi, p95 CPU 1.8m. Memory scales with the number
  # of objects in the cluster.
  kube-state-metrics:
    resources:
      requests:
        cpu: 25m
        memory: 80Mi

  nodeExporter:
    enabled: true

  # The node-exporter ServiceMonitor is managed by the prometheus-node-exporter subchart.
  # nodeExporter.serviceMonitor is ignored by kube-prometheus-stack v84+; use the subchart path instead.
  prometheus-node-exporter:
    # DaemonSet: these requests are reserved on every node. Observed: mean 19Mi,
    # peak 32Mi, p95 CPU 1.5m.
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
    prometheus:
      monitor:
        relabelings:
          - action: replace
            sourceLabels: [__meta_kubernetes_pod_node_name]
            targetLabel: node

  # The k0s controller (192.168.60.11) is a dedicated control-plane node with no
  # kubelet, so it is not discoverable as a Kubernetes Endpoint. Point the chart
  # at the node IP directly; it renders a headless Service + manual Endpoints and
  # a ServiceMonitor that scrapes the component's secure metrics port over HTTPS
  # using the Prometheus ServiceAccount token. Requires the component to listen on
  # a routable address (bind-address != 127.0.0.1); see k0s/template_lib.sh.
  kubeControllerManager:
    enabled: true
    endpoints:
      - 192.168.60.11
    service:
      enabled: true
      port: 10257
      targetPort: 10257
    serviceMonitor:
      https: true
      insecureSkipVerify: true
  kubeScheduler:
    enabled: true
    endpoints:
      - 192.168.60.11
    service:
      enabled: true
      port: 10259
      targetPort: 10259
    serviceMonitor:
      https: true
      insecureSkipVerify: true
  # kube-proxy is disabled cluster-wide (Cilium kube-proxy replacement).
  kubeProxy:
    enabled: false

prometheus:
  hostname: prometheus.prd.butaco.net

gateway:
  name: shared-gateway-envoy
  namespace: gateway-system
  sectionName: https
