grafana:
  podAnnotations:
    reloader.stakater.com/auto: "true"
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  # Resource reservations. Without requests Grafana runs as BestEffort and is
  # evicted first under node memory pressure, which is exactly when the
  # dashboards are needed. Sizing basis: 7-day observed usage from Prometheus
  # (memory requests ~= mean x 1.2, limits ~= peak x 1.5). CPU carries requests
  # only, to avoid CFS throttling on an otherwise idle node.
  #
  # Observed: mean 385Mi, peak 774Mi, p95 CPU 8.3m. The wide mean-to-peak gap is
  # query and render load, so the limit is kept well clear of peak.
  resources:
    requests:
      cpu: 50m
      memory: 448Mi
    limits:
      memory: 1Gi
  sidecar:
    # Dashboard sidecar. Observed: mean 103Mi, peak 104Mi, p95 CPU 1.3m.
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        memory: 192Mi
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-kube-prometheus-prometheus:9090
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          url: http://loki:3100
          access: proxy
  persistence:
    enabled: true
    type: pvc
    accessModes:
      - ReadWriteOnce
    size: 5Gi
  initChownData:
    enabled: false
  service:
    type: ClusterIP
  defaultDashboardsEnabled: false

hostname: grafana.prd.butaco.net

gateway:
  name: shared-gateway-envoy
  namespace: gateway-system
  sectionName: https
