prometheus-snmp-exporter:
  podAnnotations:
    reloader.stakater.com/auto: "true"
  extraArgs:
    - --config.file=/etc/snmp_exporter/snmp.yml
    - --config.file=/etc/snmp-exporter-auth/snmp-auth.yaml

  extraSecretMounts:
    - name: snmp-exporter-auth
      mountPath: /etc/snmp-exporter-auth
      secretName: snmp-exporter-auth
      readOnly: true

  extraManifests:
    - |
      apiVersion: monitoring.coreos.com/v1
      kind: Probe
      metadata:
        name: snmp-network-devices
        namespace: monitoring
        labels:
          release: prometheus
      spec:
        interval: 60s
        module: if_mib
        prober:
          url: snmp-exporter-prometheus-snmp-exporter:9116
          path: /snmp
        targets:
          staticConfig:
            relabelingConfigs:
              - action: replace
                targetLabel: __param_auth
                replacement: homelab_v2
              # Probe staticConfig has no per-target labels, so map each probed
              # IP (__param_target) to its hostname as the instance label.
              # Probing still connects by IP: no DNS dependency.
              - sourceLabels: [__param_target]
                regex: "192.168.10.1"
                targetLabel: instance
                replacement: bgw1
              - sourceLabels: [__param_target]
                regex: "192.168.10.2"
                targetLabel: instance
                replacement: c1200
            static:
              - "192.168.10.1"
              - "192.168.10.2"
