kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      additionalPrometheusRulesMap:
        hardware-alerts:
          groups:
            - name: hardware-temp.rules
              rules:
                # CPU温度異常 (Critical)
                - alert: NodeCPUTempCrit
                  expr: |
                    ((node_thermal_zone_temp{type=~"x86_pkg_temp|cpu-thermal"}) or (node_hwmon_temp_celsius{chip=~".*18_3", sensor="temp3"})) > 85
                  for: 5m
                  labels:
                    severity: critical
                  annotations:
                    summary: "Critical CPU temperature on {{ $labels.instance }}"
                    description: "CPU temperature is above 85°C (current value: {{ $value }}°C)"

                # ディスク温度異常 (Warning)
                - alert: NodeDiskTempHigh
                  expr: |
                    (nvme_temperature_celsius or smartmon_temperature_celsius_raw_value) > 60
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: "High disk temperature on {{ $labels.instance }}"
                    description: "Disk {{ $labels.device }} temperature is above 60°C (current value: {{ $value }}°C)"

                # RPi 電圧不足 (Critical)
                - alert: RPiUnderVoltage
                  expr: rpi_throttled_under_voltage == 1
                  for: 1m
                  labels:
                    severity: critical
                  annotations:
                    summary: "Raspberry Pi Under Voltage on {{ $labels.instance }}"
                    description: "Voltage dropped below 4.63V. Power supply or cable may be insufficient."

                # RPi 熱スロットリング (Warning)
                - alert: RPiThermalThrottling
                  expr: rpi_throttled_thermal_throttling == 1
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: "Raspberry Pi Thermal Throttling on {{ $labels.instance }}"
                    description: "CPU is throttling due to high temperature."

                # x86 CPU スロットリング発生 (Warning)
                - alert: NodeCPUThrottlingActive
                  expr: rate(node_cpu_package_throttles_total[5m]) > 0
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: "CPU Throttling active on {{ $labels.instance }}"
                    description: "CPU package is throttling due to thermal or power limits."
