kube-prometheus-stack:
  alertmanager:
    enabled: false

  defaultRules:
    rules:
      alertmanager: false
    disabled:
      PrometheusNotConnectedToAlertmanagers: true

  prometheus:
    prometheusSpec:
      externalLabels:
        cluster: sandbox
      scrapeClasses:
        - name: cluster-sandbox
          default: true
          relabelings:
            - action: replace
              targetLabel: cluster
              replacement: sandbox
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          release: prometheus
      serviceMonitorNamespaceSelector: {}
      ruleSelectorNilUsesHelmValues: false
      ruleSelector:
        matchLabels:
          release: prometheus
      ruleSelectorNamespaceSelector: {}
      scrapeConfigSelectorNilUsesHelmValues: false
      scrapeConfigSelector:
        matchLabels:
          release: prometheus
      scrapeConfigNamespaceSelector: {}
      retention: 3d
      resources:
        requests:
          memory: 512Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
    service:
      type: ClusterIP

  grafana:
    enabled: false

  kubeControllerManager:
    enabled: true
    endpoints:
      - 192.168.20.31
    service:
      enabled: true
      port: 10257
      targetPort: 10257
    serviceMonitor:
      https: true
      insecureSkipVerify: true
  kubeScheduler:
    enabled: true
    endpoints:
      - 192.168.20.31
    service:
      enabled: true
      port: 10259
      targetPort: 10259
    serviceMonitor:
      https: true
      insecureSkipVerify: true
  kubeProxy:
    enabled: false

prometheus:
  hostname: prometheus.sandbox.butaco.net

gateway:
  name: shared-gateway-envoy
  namespace: gateway-system
  sectionName: http

alertmanagerConfig:
  enabled: false

externalSecretAlertmanager:
  enabled: false

prometheusRules:
  certManager:
    enabled: false
  hardware:
    enabled: false

dashboards:
  enabled: true
