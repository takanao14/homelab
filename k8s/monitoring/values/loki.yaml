loki:
  deploymentMode: SingleBinary

  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    auth_enabled: false
    limits_config:
      retention_period: 90d
    compactor:
      retention_enabled: true
      delete_request_store: filesystem

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
    service:
      type: LoadBalancer
      annotations:
        io.cilium/lb-ipam-ips: 192.168.30.134
        external-dns.alpha.kubernetes.io/hostname: loki.prd.butaco.net

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  gateway:
    enabled: false

  test:
    enabled: false
  lokiCanary:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
