loki:
  deploymentMode: SingleBinary

  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    auth_enabled: false
    limits_config:
      retention_period: 90d
      max_query_series: 2000
    compactor:
      retention_enabled: true
      delete_request_store: filesystem
    rulerConfig:
      alertmanager_url: http://prometheus-kube-prometheus-alertmanager.monitoring.svc:9093
      enable_alertmanager_v2: true
      evaluation_interval: 1m
      poll_interval: 1m
      rule_path: /var/loki/ruler-tmp
      storage:
        type: local
        local:
          directory: /rules

  rbac:
    namespaced: true

  sidecar:
    # Rules sidecar. Observed: mean 82Mi, peak 89Mi, p95 CPU 0.3m.
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
    rules:
      enabled: true
      folder: /rules/fake
      resource: configmap

  singleBinary:
    replicas: 1
    # Resource reservations. Without requests Loki runs as BestEffort and is
    # evicted first under node memory pressure, taking log search down at the
    # point it is most useful. Requests only, no limits — see "Resource
    # Requests" in k8s/README.md. Sizing basis: 7-day observed usage,
    # requests ~= mean x 1.2.
    #
    # Observed: mean 210Mi, peak 403Mi, p95 CPU 7.9m. Peak tracks query load.
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
    persistence:
      enabled: true
      size: 20Gi
    service:
      type: LoadBalancer
      annotations:
        # Referenced as loki_endpoint in ansible group_vars/all.yaml — keep in sync.
        io.cilium/lb-ipam-ips: 192.168.30.250
        external-dns.alpha.kubernetes.io/hostname: loki.prd.butaco.net

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  gateway:
    enabled: false

  test:
    enabled: false
  lokiCanary:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

proxmoxAlerts:
  enabled: true
  rules:
    appArmor: true
    oom: true
    storage: true
    backup: true
    serviceErrors: true
    quorum: true
    ha: true
