loki:
  deploymentMode: SingleBinary

  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    auth_enabled: false
    limits_config:
      retention_period: 90d
      max_query_series: 2000
    compactor:
      retention_enabled: true
      delete_request_store: filesystem
    rulerConfig:
      alertmanager_url: http://prometheus-kube-prometheus-alertmanager.monitoring.svc:9093
      enable_alertmanager_v2: true
      evaluation_interval: 1m
      poll_interval: 1m
      rule_path: /var/loki/ruler-tmp
      storage:
        type: local
        local:
          directory: /rules

  rbac:
    namespaced: true

  sidecar:
    rules:
      enabled: true
      folder: /rules/fake
      resource: configmap

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
    service:
      type: LoadBalancer
      annotations:
        io.cilium/lb-ipam-ips: 192.168.30.250
        external-dns.alpha.kubernetes.io/hostname: loki.prd.butaco.net

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  gateway:
    enabled: false

  test:
    enabled: false
  lokiCanary:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

proxmoxAlerts:
  enabled: true
  rules:
    appArmor: true
    oom: true
    storage: true
    backup: true
    serviceErrors: true
    quorum: true
    ha: true
