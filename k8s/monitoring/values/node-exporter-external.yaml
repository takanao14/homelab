port: 9100
metricsPath: /metrics

# Proxmox hypervisors are injected from the shared inventory
# (values/proxmox-nodes.yaml via apps/values.yaml valueFiles); list only
# non-hypervisor hosts here.
# name becomes the instance label (relabeled from __tmp_name); scraping still
# connects by IP so monitoring does not depend on DNS resolution.
targets:
  - ip: "192.168.10.240"
    name: "rpi3"
  - ip: "192.168.10.241"
    name: "rpi4"
  # Stateful service guests (in-guest filesystem usage is not exposed by Proxmox OTLP).
  - ip: "192.168.10.245"
    name: "forgejo1"
  - ip: "192.168.10.247"
    name: "netbox1"
  - ip: "192.168.40.30"
    name: "openbao1"
  - ip: "192.168.50.31"
    name: "seaweedfs1"
