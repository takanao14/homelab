    name: "pve"
  - ip: "192.168.10.11"
    name: "node1"
  - ip: "192.168.10.12"
    name: "node2"
  - ip: "192.168.10.13"
    name: "node3"
  - ip: "192.168.10.14"
    name: "node4"
  - ip: "192.168.10.240"
    name: "rpi3"
  - ip: "192.168.10.241"
    name: "rpi4"
  # Stateful service guests (in-guest filesystem usage is not exposed by Proxmox OTLP).
  - ip: "192.168.10.245"
