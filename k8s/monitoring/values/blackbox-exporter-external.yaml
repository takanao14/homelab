# rpi4 上で稼働する外部 blackbox_exporter のエンドポイント
blackboxExporterURL: "192.168.10.241:9115"
scrapeInterval: 60s

# ICMP プローブ対象 (ネットワーク機器 + 各ホスト)
icmp:
  targets:
    - ip: "192.168.10.1"
      name: "router"
    - ip: "192.168.10.2"
      name: "ap"
    - ip: "192.168.10.10"
      name: "prd1"
    - ip: "192.168.10.11"
      name: "prd2"
    - ip: "192.168.10.12"
      name: "prd3"
    - ip: "192.168.10.240"
      name: "rpi4"
    - ip: "192.168.10.241"
      name: "ns1"
    - ip: "192.168.10.242"
      name: "ns2"
    - ip: "192.168.10.253"
      name: "nas"
    - ip: "192.168.10.254"
      name: "switch"
    - ip: "192.168.110.11"
      name: "gpu-vm"
    - ip: "192.168.110.12"
      name: "k0s-worker1"
    - ip: "192.168.20.22"
      name: "iot-device"

# DNS 外部解決プローブ (google.com を各 DNS サーバーに問い合わせ)
dnsExternal:
  targets:
    - ip: "192.168.10.241"
      name: "ns1"
    - ip: "192.168.10.242"
      name: "ns2"

# DNS 内部解決プローブ (ns1.home.butaco.net を各 DNS サーバーに問い合わせ)
dnsInternal:
  targets:
    - ip: "192.168.10.241"
      name: "ns1"
    - ip: "192.168.10.242"
      name: "ns2"
