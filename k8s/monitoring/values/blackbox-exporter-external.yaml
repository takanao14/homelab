# rpi4 上で稼働する外部 blackbox_exporter のエンドポイント
blackboxExporterURL: "192.168.10.241:9115"
scrapeInterval: 60s

# ICMP プローブ対象 (ネットワーク機器 + 各ホスト)
icmp:
  targets:
    - ip: "192.168.10.1"
      name: "bgw1"
    - ip: "192.168.10.2"
      name: "c1200"
    - ip: "192.168.10.10"
      name: "pve"
    - ip: "192.168.10.11"
      name: "node1"
    - ip: "192.168.10.12"
      name: "node2"
    - ip: "192.168.10.240"
      name: "rpi3"
    - ip: "192.168.10.241"
      name: "rpi4"
    - ip: "192.168.10.242"
      name: "ns1"
    - ip: "192.168.10.253"
      name: "wifi-ap2"
    - ip: "192.168.10.254"
      name: "wifi-ap1"
    - ip: "192.168.110.11"
      name: "node1-amt"
    - ip: "192.168.110.12"
      name: "node2-amt"
    - ip: "192.168.20.22"
      name: "gpuvm"

# DNS 外部解決プローブ (google.com を各 DNS サーバーに問い合わせ)
dnsExternal:
  targets:
    - ip: "192.168.10.241"
      name: "ns2"
    - ip: "192.168.10.242"
      name: "ns1"

# DNS 内部解決プローブ (ns1.home.butaco.net を各 DNS サーバーに問い合わせ)
dnsInternal:
  targets:
    - ip: "192.168.10.241"
      name: "ns2"
    - ip: "192.168.10.242"
      name: "ns1"
