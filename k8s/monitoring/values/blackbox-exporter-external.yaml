# External blackbox_exporter endpoint running on rpi4
blackboxExporterURL: "192.168.10.241:9115"
scrapeInterval: 60s

# ICMP probe targets (network devices + hosts).
# Proxmox hypervisors (and their AMT interfaces) are injected from the shared
# inventory (values/proxmox-nodes.yaml via apps/values.yaml valueFiles); list
# only non-hypervisor targets here.
icmp:
  targets:
    - ip: "192.168.10.1"
      name: "bgw1"
    - ip: "192.168.10.2"
      name: "c1200"
    - ip: "192.168.10.240"
      name: "rpi3"
    - ip: "192.168.10.241"
      name: "rpi4"
    - ip: "192.168.10.254"
      name: "wifi-ap1"

# DNS resolution probes (dns_external: google.com / dns_internal:
# ns1.home.butaco.net) target the shared recursor inventory
# (values/dns-recursors.yaml via apps/values.yaml valueFiles).
