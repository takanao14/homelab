repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: grafana
    url: https://grafana.github.io/helm-charts

releases:
  - name: prometheus
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/kube-prometheus-stack
    valuesTemplate:
      - values/prometheus.yaml.gotmpl
    hooks:
      - events: [prepare]
        command: bash
        args:
          - -c
          - |
            ctx=$(kubectl config current-context 2>/dev/null || echo "none")
            if [[ "$ctx" != "prd-homelab" ]]; then
              echo "ERROR: wrong cluster — expected prd-homelab, got: $ctx" >&2
              exit 1
            fi

  - name: blackbox-exporter
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/prometheus-blackbox-exporter
    valuesTemplate:
      - values/blackbox-exporter.yaml.gotmpl

  - name: prometheus-pve-exporter
    namespace: monitoring
    createNamespace: true
    chart: ./charts/prometheus-pve-exporter
    needs:
      - monitoring/prometheus
    valuesTemplate:
      - values/prometheus-pve-exporter.yaml.gotmpl

  - name: node-exporter-external
    namespace: monitoring
    createNamespace: true
    chart: ./charts/node-exporter-external
    needs:
      - monitoring/prometheus
    valuesTemplate:
      - values/node-exporter.yaml.gotmpl

  - name: dnsdist
    namespace: monitoring
    createNamespace: true
    chart: ./charts/dnsdist
    needs:
      - monitoring/prometheus
    valuesTemplate:
      - values/dnsdist.yaml.gotmpl

  - name: pdns-auth
    namespace: monitoring
    createNamespace: true
    chart: ./charts/pdns-auth
    needs:
      - monitoring/prometheus
    valuesTemplate:
      - values/pdns-auth.yaml.gotmpl

  - name: snmp-exporter
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/prometheus-snmp-exporter
    valuesTemplate:
      - values/snmp-exporter.yaml.gotmpl

  - name: loki
    namespace: monitoring
    createNamespace: true
    chart: grafana/loki
    valuesTemplate:
      - values/loki.yaml.gotmpl
