releases:
  - name: forgejo
    namespace: forgejo
    chart: oci://code.forgejo.org/forgejo-helm/forgejo
    createNamespace: true
    values:
      - values.yaml.gotmpl
    hooks:
      - events: [prepare]
        command: bash
        args:
          - -c
          - |
            ctx=$(kubectl config current-context 2>/dev/null || echo "none")
            if [[ "$ctx" != "prd-homelab" ]]; then
              echo "ERROR: wrong cluster — expected prd-homelab, got: $ctx" >&2
              exit 1
            fi
