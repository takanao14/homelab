{{- $root := . -}}
{{- with .Values.gateway }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .name }}
  namespace: {{ .namespace | default $root.Release.Namespace }}
spec:
  gatewayClassName: {{ .gatewayClassName }}
  {{- with .infrastructure }}
  infrastructure:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  listeners:
    {{- if .listeners.https.enabled }}
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: wildcard-{{ $root.Values.domain | replace "." "-" }}-tls
            namespace: cert-manager
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
    {{- if .listeners.http.enabled }}
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
{{- end }}
