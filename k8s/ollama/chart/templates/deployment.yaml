apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      tolerations: {{ toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: ollama
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 11434
          resources: {{ toYaml .Values.resources | nindent 12 }}
          env:
            - name: OLLAMA_NUM_CTX
              value: {{ .Values.numCtx | quote }}
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
            - name: kfd
              mountPath: /dev/kfd
            - name: dri
              mountPath: /dev/dri
          securityContext:
            seccompProfile:
              type: Unconfined
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
        - name: kfd
          hostPath:
            path: /dev/kfd
        - name: dri
          hostPath:
            path: /dev/dri
