replicaCount: 0

hostname: ""

gateway:
  name: shared-gateway-envoy
  namespace: gateway-system
  sectionName: https

image:
  repository: ollama/ollama
  tag: 0.32.0-rocm

resources:
  limits:
    amd.com/gpu: "1"
  requests:
    amd.com/gpu: "1"

storage:
  size: 100Gi
  storageClassName: openebs-hostpath

numCtx: 4096

nodeSelector:
  gpu: amd

tolerations:
  - key: gpu
    operator: Equal
    value: amd
    effect: NoSchedule
