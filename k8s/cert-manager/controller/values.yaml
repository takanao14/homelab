# Common values for the upstream cert-manager controller chart
# (https://charts.jetstack.io). Per-env overrides live in <env>/values.yaml.
# The local config chart (ClusterIssuer/Certificate) lives one level up and
# has its own values.yaml / <env>/values.yaml.
crds:
  enabled: true

extraArgs:
  - --dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53
  - --dns01-recursive-nameservers-only

prometheus:
  enabled: true
  servicemonitor:
    enabled: true
    # Must match the Prometheus serviceMonitorSelector (release: prometheus).
    labels:
      release: prometheus
