apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-{{ .Values.domain | replace "." "-" }}
  namespace: cert-manager
spec:
  secretName: wildcard-{{ .Values.domain | replace "." "-" }}-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - "*.{{ .Values.domain }}"
