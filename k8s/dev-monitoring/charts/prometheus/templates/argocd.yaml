{{- /*
ArgoCD metrics on the dev cluster. See the prd counterpart
(k8s/monitoring/charts/prometheus/templates/argocd.yaml) for the full
rationale on why this lives here instead of in k8s/argocd/. The cluster label
is added at remote_write time via externalLabels (cluster=dev), so no
per-resource relabeling is needed here.
*/ -}}
{{- $components := list "application-controller" "server" "repo-server" "applicationset-controller" }}
{{- range $i, $component := $components }}
{{- if $i }}
---
{{- end }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-{{ $component }}
  namespace: {{ $.Release.Namespace }}
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames: ["argocd"]
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-{{ $component }}
  endpoints:
    - port: http-metrics
      interval: 30s
{{- end }}
