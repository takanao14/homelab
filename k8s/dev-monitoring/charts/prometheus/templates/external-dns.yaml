{{- /*
external-dns metrics on the dev cluster. See the prd counterpart
(k8s/monitoring/charts/prometheus/templates/external-dns.yaml). The cluster
label is added at remote_write time via externalLabels (cluster=dev), so no
per-resource relabeling is needed here.
*/ -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: external-dns
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames: ["external-dns"]
  selector:
    matchLabels:
      app: external-dns
  endpoints:
    - port: http-metrics
      interval: 30s
