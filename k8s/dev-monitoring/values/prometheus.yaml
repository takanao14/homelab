kube-prometheus-stack:
  prometheus:
    # Deploy as a PrometheusAgent: scrape + remote_write only, with no local
    # rule evaluation, alerting, or queryable storage. Alerting is centralized
    # on the prd cluster, which evaluates rules against this cluster's
    # remote-written data.
    # IMPORTANT: agent mode MUST be enabled via this chart toggle (it renders a
    # PrometheusAgent CRD). Setting prometheusSpec.enableFeatures: [agent] does
    # NOT enable agent mode on a regular Prometheus CRD -- the flag is ignored
    # and the instance runs as a full server, evaluating the default rules and
    # firing alerts locally (e.g. PrometheusNotConnectedToAlertmanagers).
    agentMode: true
    prometheusSpec:
      externalLabels:
        cluster: dev
      remoteWrite:
        - url: https://prometheus.prd.butaco.net/api/v1/write
          # In agent mode this Prometheus still scrapes its own /metrics, so it
          # exposes prometheus_notifications_* self-metrics that are always
          # 0/meaningless (an agent never connects to an Alertmanager). Dropping
          # them before remote_write prevents prd's stock "prometheus" alert
          # group (PrometheusNotConnectedToAlertmanagers,
          # PrometheusErrorSendingAlertsTo*, PrometheusNotificationQueueRunningFull)
          # from false-firing against this agent. Remote-write health metrics
          # (prometheus_remote_storage_*) are kept so the dev->prd pipeline
          # stays monitored.
          writeRelabelConfigs:
            - sourceLabels: [__name__]
              regex: prometheus_notifications_.*
              action: drop
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          release: prometheus
      serviceMonitorNamespaceSelector: {}
      scrapeConfigSelectorNilUsesHelmValues: false
      scrapeConfigSelector:
        matchLabels:
          release: prometheus
      scrapeConfigNamespaceSelector: {}
      resourceSpec:
        requests:
          memory: 256Mi

  kubelet:
    serviceMonitor:
      # cAdvisor (/metrics/cadvisor) exposes samples with embedded timestamps.
      # When honored, those timestamps regress between scrapes and the agent's
      # WAL rejects them as out-of-order (hundreds/scrape dropped -> data loss,
      # firing PrometheusOutOfOrderTimestamps). Using the monotonic scrape time
      # instead resolves it.
      # NOTE: both flags are required. The chart's kubelet ServiceMonitor forces
      # honorTimestamps: true on the cAdvisor endpoint whenever
      # trackTimestampsStaleness is true (its default), so honorTimestamps: false
      # alone is silently overridden -- trackTimestampsStaleness must also be
      # false for honorTimestamps to take effect.
      honorTimestamps: false
      trackTimestampsStaleness: false

  grafana:
    enabled: false

  alertmanager:
    enabled: false

  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
