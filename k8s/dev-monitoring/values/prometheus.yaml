kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      enableFeatures:
        - agent
      externalLabels:
        cluster: dev
      remoteWrite:
        - url: https://prometheus.prd.butaco.net/api/v1/write
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          release: prometheus
      serviceMonitorNamespaceSelector: {}
      scrapeConfigSelectorNilUsesHelmValues: false
      scrapeConfigSelector:
        matchLabels:
          release: prometheus
      scrapeConfigNamespaceSelector: {}
      resourceSpec:
        requests:
          memory: 256Mi

  grafana:
    enabled: false

  alertmanager:
    enabled: false

  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
