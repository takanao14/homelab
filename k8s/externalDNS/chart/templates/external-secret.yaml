apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-env
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: external-dns-env
    creationPolicy: Owner
    template:
      data:
        PDNS_API_URL: {{ .Values.pdns.apiUrl | quote }}
        PDNS_SERVER_ID: {{ .Values.pdns.serverId | quote }}
        OWNER_ID_FOR_THIS_EXTERNAL_DNS: {{ .Values.ownerId | quote }}
        DOMAIN_FILTER: {{ .Values.domainFilter | quote }}
        PDNS_HTTP_API_KEY: {{ "{{ .pdnsApiKey }}" | quote }}
  data:
    - secretKey: pdnsApiKey
      remoteRef:
        key: k8s/external-dns/pdns
        property: api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
