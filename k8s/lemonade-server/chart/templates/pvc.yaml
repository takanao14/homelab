apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lemonade-huggingface
  namespace: {{ .Release.Namespace }}
  labels:
    homelab/gpu-switchable: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.storage.huggingface.size }}
---
