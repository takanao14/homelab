apiVersion: v1
kind: ConfigMap
metadata:
  name: meshcentral-config
  namespace: {{ .Release.Namespace }}
data:
  HOSTNAME: {{ .Values.hostname | quote }}
  DYNAMIC_CONFIG: {{ .Values.dynamicConfig | toString | quote }}
  REVERSE_PROXY: "true"
  REVERSE_PROXY_TLS_PORT: "443"
  NODE_ENV: "production"
  # Use HTTP on port 80 for internal communication with the gateway
  TLS_OFF: "true"
  PORT: "80"

