apiVersion: v1
kind: ConfigMap
metadata:
  name: meshcentral-config
  namespace: {{ .Release.Namespace }}
data:
  HOSTNAME: {{ .Values.hostname | quote }}
  DYNAMIC_CONFIG: {{ .Values.dynamicConfig | toString | quote }}
  REVERSE_PROXY: {{ .Values.hostname | quote }}
  REVERSE_PROXY_TLS_PORT: "443"
  NODE_ENV: "production"
  # Use port 443 (HTTP) for internal communication with the gateway
  TLS_OFFLOAD: "true"
  PORT: "443"

