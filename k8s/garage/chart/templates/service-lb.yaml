apiVersion: v1
kind: Service
metadata:
  name: garage-web-lb
  namespace: {{ .Release.Namespace }}
  annotations:
    lbipam.cilium.io/ips: {{ .Values.webLoadBalancerIP | quote }}
spec:
  type: LoadBalancer
  selector:
    app: garage
  ports:
    - name: web
      port: 3902
      targetPort: 3902
