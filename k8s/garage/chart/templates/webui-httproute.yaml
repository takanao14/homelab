{{- if .Values.webui.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: garage-webui
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - {{ .Values.webui.hostname }}
  rules:
    - backendRefs:
        - name: garage-webui
          port: 3909
{{- end }}
