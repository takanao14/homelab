apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: {{ .Release.Namespace }}
data:
  Caddyfile: |
    :80 {
      {{- range .Values.publicBuckets }}
      handle /{{ . }}/* {
        uri strip_prefix /{{ . }}
        reverse_proxy garage:3902 {
          header_up Host {{ . }}
        }
      }
      {{- end }}
    }
