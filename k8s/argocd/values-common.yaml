configs:
  cm:
    helm.valuesFileSchemes: secrets+age-import, secrets+gpg-import, secrets+age-import-kubernetes, secrets+gpg-import-kubernetes, secrets, secrets+literal
  cmp:
    create: true
    plugins:
      helm-secrets:
        allowConcurrency: true
        init:
          command: [sh, -c]
          args:
            - |
              if grep -q "^dependencies:" Chart.yaml 2>/dev/null; then
                helm dependency update .
              fi
        generate:
          command: [sh, -c]
          args:
            - helm secrets template "$ARGOCD_APP_NAME" . --namespace "$ARGOCD_APP_NAMESPACE" $(echo "$ARGOCD_ENV_HELM_VALUES" | tr ',' '\n' | sed 's/^/-f /' | tr '\n' ' ')
        lockRepo: false

server:
  extraArgs:
    - --insecure
  ingress:
    enabled: false

repoServer:
  volumes:
    - name: plugins
      emptyDir: {}
    - name: helm-secrets-private-keys
      secret:
        secretName: helm-secrets-private-keys
    - name: cmp-tmp
      emptyDir: {}
    - name: argocd-cmp-cm
      configMap:
        name: argocd-cmp-cm
    - name: tools
      emptyDir: {}
    - name: helm-plugins
      emptyDir: {}
  # Install sops and helm-secrets into shared volumes at pod startup.
  # Image tag must match the ArgoCD version (global.image.tag).
  initContainers:
    - name: install-tools
      image: quay.io/argoproj/argocd:v3.3.8
      command: [sh, -c]
      args:
        - |
          curl -Lo /tools/sops https://github.com/getsops/sops/releases/download/v3.10.2/sops-v3.10.2.linux.amd64
          chmod +x /tools/sops
          export HELM_PLUGINS=/helm-plugins
          helm plugin install https://github.com/jkroepke/helm-secrets --version v4.1.3
      volumeMounts:
        - mountPath: /tools
          name: tools
        - mountPath: /helm-plugins
          name: helm-plugins
  extraContainers:
    - name: helm-secrets-cmp
      image: quay.io/argoproj/argocd:v3.3.8
      command: [argocd-cmp-server]
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      env:
        - name: HELM_SECRETS_BACKEND
          value: sops
        - name: SOPS_AGE_KEY_FILE
          value: /helm-secrets-private-keys/key.txt
        - name: HELM_CACHE_HOME
          value: /tmp/helm-cache
        - name: HELM_PLUGINS
          value: /helm-plugins
        - name: SOPS_BINARY_PATH
          value: /tools/sops
      volumeMounts:
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /tmp
          name: cmp-tmp
        - mountPath: /helm-secrets-private-keys/
          name: helm-secrets-private-keys
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: helm-secrets.yaml
          name: argocd-cmp-cm
        - mountPath: /tools
          name: tools
        - mountPath: /helm-plugins
          name: helm-plugins
