# Resource reservations.
#
# Without requests every Argo CD pod lands in the BestEffort QoS class, which
# makes it invisible to the scheduler (it accounts for requests, not actual
# usage) and first in line for eviction under node memory pressure. Losing the
# controllers that reconcile the cluster is the worst failure to take first, so
# they carry explicit reservations.
#
# Sizing basis: 7-day observed usage from Prometheus.
#   memory requests ~= mean x 1.2, memory limits ~= peak x 1.5.
# CPU carries requests only: limits throttle through the CFS quota even when
# the node is idle, and measured CPU use is negligible for every component
# except the application controller.

server:
  extraArgs:
    - --insecure
  ingress:
    enabled: false
  # Only the metrics Service is enabled here; the ServiceMonitor lives in the
  # prometheus chart (monitoring app syncs after argocd, so a ServiceMonitor
  # bundled here would fail its CRD lookup on a fresh cluster).
  metrics:
    enabled: true
  # Observed: mean 43Mi, peak 69Mi, p95 CPU 1.2m.
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

controller:
  metrics:
    enabled: true
  # Observed: mean 494Mi, peak 651Mi, p95 CPU 44m — by far the heaviest
  # component, and the only one where the CPU request is meaningful.
  resources:
    requests:
      cpu: 100m
      memory: 640Mi
    limits:
      memory: 1Gi

repoServer:
  metrics:
    enabled: true
  # Observed: mean 127Mi, peak 368Mi, p95 CPU 4m. The widest mean-to-peak gap
  # of any component because manifest rendering is bursty, so the limit is set
  # well above peak: an OOM here stalls rendering for every application.
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      memory: 768Mi

applicationSet:
  metrics:
    enabled: true
  # Observed: mean 33Mi, peak 49Mi, p95 CPU 1.0m.
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

# Observed: mean 78Mi, peak 115Mi, p95 CPU 0.2m.
dex:
  resources:
    requests:
      cpu: 10m
      memory: 96Mi
    limits:
      memory: 192Mi

# Observed: mean 57Mi, peak 120Mi, p95 CPU 0.6m.
notifications:
  resources:
    requests:
      cpu: 10m
      memory: 96Mi
    limits:
      memory: 192Mi

# Observed: mean 28Mi, peak 44Mi, p95 CPU 3.8m.
redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

configs:
  cm:
    ### Argo CD >=1.8 ships no built-in health check for the Application CRD,
    ### so app-of-apps sync waves do not gate on child app health without this.
    ### Required so envoy-gateway-crds (wave -2) is Healthy before the
    ### envoy-gateway controller (-1) and gateway (0) apps sync on a fresh cluster.
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs
    resource.customizations.health._PersistentVolumeClaim: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""

      local labels = {}
      if obj.metadata ~= nil and obj.metadata.labels ~= nil then
        labels = obj.metadata.labels
      end

      if obj.status ~= nil and obj.status.phase ~= nil then
        if obj.status.phase == "Bound" then
          hs.status = "Healthy"
          hs.message = "PVC is bound"
        elseif labels["homelab/gpu-switchable"] == "true" and obj.status.phase == "Pending" then
          hs.status = "Healthy"
          hs.message = "PVC is waiting for the switchable GPU workload's first consumer"
        elseif obj.status.phase == "Lost" then
          hs.status = "Degraded"
          hs.message = "PVC is lost"
        else
          hs.status = "Progressing"
          hs.message = "PVC phase is " .. obj.status.phase
        end
      end
      return hs
    resource.customizations.health.gateway.networking.k8s.io_HTTPRoute: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""

      local labels = {}
      if obj.metadata ~= nil and obj.metadata.labels ~= nil then
        labels = obj.metadata.labels
      end

      if obj.status == nil or obj.status.parents == nil or #obj.status.parents == 0 then
        hs.message = "HTTPRoute has no parent status"
        return hs
      end

      local accepted = false
      local resolvedRefs = false
      local backendsAvailable = true
      local backendMessage = ""

      for _, parent in ipairs(obj.status.parents) do
        if parent.conditions ~= nil then
          for _, condition in ipairs(parent.conditions) do
            if condition.type == "Accepted" and condition.status == "True" then
              accepted = true
            end
            if condition.type == "ResolvedRefs" and condition.status == "True" then
              resolvedRefs = true
            end
            if condition.type == "BackendsAvailable" and condition.status == "False" then
              backendsAvailable = false
              backendMessage = condition.message or ""
            end
          end
        end
      end

      if not accepted then
        hs.status = "Degraded"
        hs.message = "HTTPRoute is not accepted"
      elseif not resolvedRefs then
        hs.status = "Degraded"
        hs.message = "HTTPRoute references are not resolved"
      elseif not backendsAvailable and labels["homelab/gpu-switchable"] == "true" then
        hs.status = "Healthy"
        hs.message = "HTTPRoute is accepted; backend is intentionally scaled to zero"
      elseif not backendsAvailable then
        hs.status = "Progressing"
        hs.message = backendMessage
      else
        hs.status = "Healthy"
        hs.message = "HTTPRoute is accepted"
      end
      return hs
    resource.exclusions: |
      ### Network resources created by the Kubernetes control plane and excluded to reduce watched events and UI clutter.
      ### Keep core Endpoints managed: kube-prometheus-stack uses manual Endpoints for k0s control-plane scraping.
      - apiGroups:
        - discovery.k8s.io
        kinds:
        - EndpointSlice
      ### Internal Kubernetes resources excluded to reduce watched events.
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      ### Internal Kubernetes Authz/Authn resources excluded to reduce watched events.
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      ### Intermediate Certificate Request resources excluded to reduce watched events.
      - apiGroups:
        - certificates.k8s.io
        kinds:
        - CertificateSigningRequest
      - apiGroups:
        - cert-manager.io
        kinds:
        - CertificateRequest
      ### Cilium internal resources excluded to reduce watched events and UI clutter.
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumEndpointSlice
      ### Kyverno intermediate and reporting resources excluded to improve performance.
      - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
        kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest
