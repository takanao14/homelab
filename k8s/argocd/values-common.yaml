configs:
  cm:
    helm.valuesFileSchemes: secrets+age-import, secrets+gpg-import, secrets+age-import-kubernetes, secrets+gpg-import-kubernetes, secrets, secrets+literal
  cmp:
    create: true
    plugins:
      helm-secrets:
        allowConcurrency: true
        init:
          command: [sh, -c]
          args:
            - |
              if grep -q "^dependencies:" Chart.yaml 2>/dev/null; then
                helm dependency update .
              fi
        generate:
          command: [sh, -c]
          args:
            - |
              if [ -n "$ARGOCD_ENV_HELM_VALUES" ]; then
                for v in $(echo "$ARGOCD_ENV_HELM_VALUES" | tr ',' ' '); do
                  HELM_ARGS="$HELM_ARGS -f $v"
                done
              fi
              helm secrets template "$ARGOCD_APP_NAME" . --namespace "$ARGOCD_APP_NAMESPACE" $HELM_ARGS
        lockRepo: false

server:
  extraArgs:
    - --insecure
  ingress:
    enabled: false

repoServer:
  volumes:
    - name: plugins
      emptyDir: {}
    - name: helm-secrets-private-keys
      secret:
        secretName: helm-secrets-private-keys
    - name: cmp-tmp
      emptyDir: {}
    - name: argocd-cmp-cm
      configMap:
        name: argocd-cmp-cm
  extraContainers:
    - name: helm-secrets-cmp
      image: ghcr.io/takanao14/argocd-helm-secrets-cmp:latest
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      env:
        - name: HELM_SECRETS_BACKEND
          value: sops
        - name: HELM_SECRETS_SOPS_PATH
          value: /usr/local/bin/sops
        - name: SOPS_AGE_KEY_FILE
          value: /helm-secrets-private-keys/key.txt
        - name: HELM_CACHE_HOME
          value: /tmp/helm-cache
        - name: HELM_CONFIG_HOME
          value: /tmp/helm-config
        - name: HELM_DATA_HOME
          value: /tmp/helm-data
        - name: HELM_PLUGINS
          value: /usr/local/share/helm/plugins
        - name: PATH
          value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      volumeMounts:
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /tmp
          name: cmp-tmp
        - mountPath: /helm-secrets-private-keys/
          name: helm-secrets-private-keys
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: helm-secrets.yaml
          name: argocd-cmp-cm
