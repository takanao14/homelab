repositories:
  - name: argo
    url: https://argoproj.github.io/argo-helm

releases:
  - name: argocd
    namespace: argocd
    createNamespace: true
    chart: argo/argo-cd
    version: 10.1.4
    # On a fresh cluster the redis-secret-init pre-install hook pulls the
    # ~200MB argocd image on an empty node cache, which alone can exceed
    # helm's default 5m timeout.
    timeout: 600
    values:
      - ../values-common.yaml
      - values.yaml
    hooks:
      - events: [prepare]
        command: bash
        args:
          - -c
          - |
            ctx=$(kubectl config current-context 2>/dev/null || echo "none")
            if [[ "$ctx" != "prd-homelab" ]]; then
              echo "ERROR: wrong cluster — expected prd-homelab, got: $ctx" >&2
              exit 1
            fi

            # This helmfile is for initial bootstrap only. Once root-apps is
            # applied, Argo CD self-manages this release (see apps/templates/
            # argocd.yaml) and applies with ServerSideApply, so every resource
            # a later chart version adds is created without Helm ownership
            # annotations. Re-running helm here then aborts on the first such
            # resource: "invalid ownership metadata; missing key
            # meta.helm.sh/release-name".
            if [[ "${ARGOCD_BOOTSTRAP_FORCE:-}" != "1" ]] \
              && kubectl -n argocd get application argocd >/dev/null 2>&1; then
              echo "ERROR: Argo CD already self-manages this release (Application/argocd exists)." >&2
              echo "       helmfile is for initial bootstrap only. To change values, commit them" >&2
              echo "       and let Argo CD sync — see k8s/argocd/README.md." >&2
              echo "       Set ARGOCD_BOOTSTRAP_FORCE=1 only to deliberately re-run bootstrap." >&2
              exit 1
            fi
