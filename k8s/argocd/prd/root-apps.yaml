apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/takanao14/homelab.git
    targetRevision: HEAD
    path: k8s/argocd/prd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # Sync waves gate on child app health; on a fresh cluster apps can be
    # transiently Degraded while their workloads bootstrap, which fails the
    # whole app-of-apps operation. Automated sync never re-attempts the same
    # revision, so give the operation a generous retry budget.
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
