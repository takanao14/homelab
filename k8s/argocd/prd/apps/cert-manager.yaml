apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.20.3
      helm:
        values: |
          crds:
            enabled: true
          extraArgs:
            - --dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53
            - --dns01-recursive-nameservers-only
          prometheus:
            enabled: true
            servicemonitor:
              enabled: true
              # Must match the Prometheus serviceMonitorSelector (release: prometheus).
              labels:
                release: prometheus
              # Inject cluster=prd via target relabeling, matching the rest of the
              # prd ServiceMonitors. externalLabels does not apply to locally stored
              # series, and this chart's ServiceMonitor is not covered by the
              # kube-prometheus-stack relabelings. (dev gets cluster=dev via
              # remote_write external labels, so no relabeling is needed there.)
              endpointAdditionalProperties:
                relabelings:
                  - action: replace
                    targetLabel: cluster
                    replacement: prd
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
