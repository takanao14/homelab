apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/takanao14/homelab.git
      targetRevision: HEAD
      path: k8s/homepage/chart
      plugin:
        name: helm-secrets
        env:
          - name: HELM_VALUES
            value: "$values/k8s/homepage/values.yaml,secrets://$values/k8s/homepage/secrets.enc.yaml"
    - repoURL: https://github.com/takanao14/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
