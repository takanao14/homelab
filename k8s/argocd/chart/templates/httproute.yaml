apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: {{ .Values.server.route.gatewayName }}
      namespace: {{ .Values.server.route.gatewayNamespace }}
      sectionName: {{ .Values.server.route.sectionName }}
  hostnames:
    - {{ .Values.server.ingress.hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
