apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/takanao14/homelab.git
    targetRevision: HEAD
    path: k8s/externalDNS/chart
    plugin:
      name: helm-secrets
      env:
        - name: HELM_VALUES
          value: "../values-common.yaml,../dev/values.yaml,secrets.enc.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: dns-homelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
