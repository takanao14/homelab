apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seaweedfs
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://seaweedfs.github.io/seaweedfs/helm
      chart: seaweedfs
      targetRevision: 4.23.0
      helm:
        valueFiles:
          - $values/k8s/seaweedfs/values.yaml
          - $values/k8s/seaweedfs/dev/values.yaml
    - repoURL: https://github.com/takanao14/homelab.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/takanao14/homelab.git
      targetRevision: HEAD
      path: k8s/seaweedfs/chart
      helm:
        releaseName: seaweedfs-routes
        valueFiles:
          - $values/k8s/seaweedfs/values.yaml
          - $values/k8s/seaweedfs/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: seaweedfs
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /spec/parentRefs
        - /spec/rules
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
