repositories:
  - name: argo
    url: https://argoproj.github.io/argo-helm

releases:
  - name: argocd
    namespace: argocd
    createNamespace: true
    chart: argo/argo-cd
    values:
      - ../values-common.yaml
      - values.yaml
    hooks:
      - events: [prepare]
        command: bash
        args:
          - -c
          - |
            ctx=$(kubectl config current-context 2>/dev/null || echo "none")
            if [[ "$ctx" != "dev-homelab" ]]; then
              echo "ERROR: wrong cluster — expected dev-homelab, got: $ctx" >&2
              exit 1
            fi
