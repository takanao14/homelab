env: dev

apps:
  argocd:
    enabled: false
  cert-manager:
    enabled: false
  cert-manager-config:
    enabled: false
  comfyui:
    enabled: false
  envoy-gateway-crds:
    enabled: false
  envoy-gateway:
    enabled: false
  eso:
    enabled: false
  external-dns:
    enabled: true
  gateway:
    enabled: false
  headlamp:
    enabled: false
  lemonade-server:
    enabled: false
  meshcentral:
    enabled: false
  monitoring:
    enabled: false
    # Prometheus agent mode, remote_write to prd (see k8s/dev-monitoring).
    path: k8s/dev-monitoring/charts/prometheus
    namespace: monitoring
    helm:
      releaseName: prometheus
      valueFiles:
        - ../../values/prometheus.yaml
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ollama:
    enabled: false
  open-webui:
    enabled: false
  reloader:
    enabled: false
