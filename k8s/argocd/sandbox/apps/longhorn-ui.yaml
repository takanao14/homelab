apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-ui
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/takanao14/homelab.git
    targetRevision: HEAD
    path: k8s/longhorn-ui
    helm:
      releaseName: longhorn-ui
      values: |
        gateway:
          name: shared-gateway-envoy
          namespace: gateway-system
          sectionName: http
        proxy:
          enabled: false
        route:
          backend:
            name: longhorn-frontend
            port: 80
        securityPolicy:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
