env: sandbox

apps:
  argocd:
    enabled: true
  envoy-gateway-crds:
    enabled: true
  envoy-gateway:
    enabled: true
  eso:
    enabled: true
  external-dns:
    enabled: true
  gateway:
    enabled: true
  homepage:
    enabled: true
  longhorn-ui:
    enabled: true
  monitoring:
    enabled: true
    # Staging-style subset of the shared monitoring stack. External alert
    # delivery and external target scrapes stay disabled in the overlay.
    path: k8s/monitoring/apps
    namespace: argocd
    helm:
      releaseName: monitoring-apps
      valueFiles:
        - ../values/apps-sandbox.yaml
    syncOptions:
      - ServerSideApply=true
