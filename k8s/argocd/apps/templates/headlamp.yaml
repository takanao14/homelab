{{- $app := index .Values.apps "headlamp" }}
{{- if $app.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: {{ $app.wave | quote }}
spec:
  project: default
  sources:
    - repoURL: {{ .Values.repo.url }}
      targetRevision: {{ .Values.repo.targetRevision }}
      path: k8s/headlamp/chart
      helm:
        releaseName: headlamp
        valueFiles:
          - $values/k8s/headlamp/values.yaml
    - repoURL: {{ .Values.repo.url }}
      targetRevision: {{ .Values.repo.targetRevision }}
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
