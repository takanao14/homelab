{{- $app := index .Values.apps "cert-manager-config" }}
{{- if $app.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: {{ $app.wave | quote }}
spec:
  project: default
  source:
    repoURL: {{ .Values.repo.url }}
    targetRevision: {{ .Values.repo.targetRevision }}
    path: k8s/cert-manager
    helm:
      valueFiles:
        - values.yaml
        - {{ include "argocd-apps.env" . }}/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    # On a fresh cluster the first automated sync can race the cert-manager app
    # (ClusterIssuer/Certificate kinds not yet registered); a failed automated
    # sync is never re-attempted for the same revision unless a retry policy is set.
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
{{- end }}
