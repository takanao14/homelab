{{- $app := index .Values.apps "gateway" }}
{{- if $app.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: {{ $app.wave | quote }}
spec:
  project: default
  source:
    repoURL: {{ .Values.repo.url }}
    targetRevision: {{ .Values.repo.targetRevision }}
    path: k8s/gateway
    helm:
      releaseName: gateway
      # Shared definitions live in k8s/gateway/values.yaml; per-env
      # differences live in k8s/gateway/<env>/values.yaml.
      valueFiles:
        - {{ include "argocd-apps.env" . }}/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    # On a fresh cluster the first automated sync can race the envoy-gateway-crds
    # app (EnvoyProxy kind not yet registered); a failed automated sync is never
    # re-attempted for the same revision unless a retry policy is set.
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
{{- end }}
