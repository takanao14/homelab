{{- $app := index .Values.apps "cert-manager" }}
{{- if $app.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: {{ $app.wave | quote }}
spec:
  project: default
  sources:
    - repoURL: {{ $app.upstream.repoURL }}
      chart: {{ $app.upstream.chart }}
      targetRevision: {{ $app.upstream.targetRevision }}
      helm:
        valueFiles:
          - $values/k8s/cert-manager/controller/values.yaml
          - $values/k8s/cert-manager/controller/{{ include "argocd-apps.env" . }}/values.yaml
    - repoURL: {{ .Values.repo.url }}
      targetRevision: {{ .Values.repo.targetRevision }}
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
