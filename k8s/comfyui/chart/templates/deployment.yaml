apiVersion: apps/v1
kind: Deployment
metadata:
  name: comfyui
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: comfyui
  template:
    metadata:
      labels:
        app: comfyui
    spec:
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      tolerations: {{ toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: comfyui
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 8188
          resources: {{ toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/ComfyUI/models
            - name: kfd
              mountPath: /dev/kfd
            - name: dri
              mountPath: /dev/dri
          securityContext:
            seccompProfile:
              type: Unconfined
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: comfyui-data
        - name: kfd
          hostPath:
            path: /dev/kfd
        - name: dri
          hostPath:
            path: /dev/dri
