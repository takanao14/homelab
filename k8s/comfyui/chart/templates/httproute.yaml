apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: comfyui
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - {{ .Values.hostname }}
  rules:
    - backendRefs:
        - name: comfyui
          port: 8188
