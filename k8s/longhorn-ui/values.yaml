replicaCount: 1

image:
  repository: nginxinc/nginx-unprivileged
  tag: 1.29-alpine
  pullPolicy: IfNotPresent

proxy:
  enabled: true

hostname: longhorn.sandbox.butaco.net

gateway:
  name: shared-gateway-envoy
  namespace: gateway-system
  sectionName: http

longhorn:
  service:
    name: longhorn-frontend
    namespace: longhorn-system
    port: 80

route:
  backend:
    name: longhorn-ui-proxy
    port: 80

securityPolicy:
  enabled: false
  name: longhorn-basic-auth
  secretName: longhorn-ui-basic-auth

openbao:
  secretStore:
    name: openbao
    kind: ClusterSecretStore
  basicAuth:
    key: k8s/longhorn-ui/basic-auth
    property: htpasswd

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
