hostname: longhorn.sandbox.butaco.net

gateway:
  name: shared-gateway-envoy
  namespace: gateway-system
  sectionName: http

# Route directly to the Longhorn frontend; Basic Auth is enforced at the
# Gateway layer by the Envoy Gateway SecurityPolicy below (ADR-0009).
route:
  backend:
    name: longhorn-frontend
    port: 80

securityPolicy:
  enabled: true
  name: longhorn-basic-auth
  secretName: longhorn-ui-basic-auth

openbao:
  secretStore:
    name: openbao
    kind: ClusterSecretStore
  basicAuth:
    key: k8s/longhorn-ui/basic-auth
    property: htpasswd
