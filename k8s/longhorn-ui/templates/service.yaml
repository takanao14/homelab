apiVersion: v1
kind: Service
metadata:
  name: longhorn-ui-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: longhorn-ui
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: longhorn-ui
    app.kubernetes.io/component: proxy
  ports:
    - name: http
      port: 80
      targetPort: http
