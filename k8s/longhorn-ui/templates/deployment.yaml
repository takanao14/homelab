{{- if .Values.proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: longhorn-ui-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: longhorn-ui
    app.kubernetes.io/component: proxy
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: longhorn-ui
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longhorn-ui
        app.kubernetes.io/component: proxy
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: basic-auth
              mountPath: /etc/nginx/auth
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: longhorn-ui-proxy
        - name: basic-auth
          secret:
            secretName: longhorn-ui-basic-auth
{{- end }}
