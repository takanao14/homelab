{{- if .Values.securityPolicy.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ .Values.securityPolicy.name }}
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: longhorn-ui
  basicAuth:
    users:
      group: ""
      kind: Secret
      name: {{ .Values.securityPolicy.secretName }}
{{- end }}
