{{- /*
external-dns metrics on the sandbox cluster. See the prd counterpart
(k8s/monitoring/charts/prometheus/templates/external-dns.yaml). The cluster
label is added at scrape time via the default cluster-sandbox scrape class
(values/prometheus.yaml), so no per-resource cluster relabeling is needed
here.
*/ -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: external-dns
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames: ["external-dns"]
  selector:
    matchLabels:
      app: external-dns
  endpoints:
    - port: http-metrics
      interval: 30s
