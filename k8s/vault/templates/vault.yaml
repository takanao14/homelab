apiVersion: vault.banzaicloud.com/v1alpha1
kind: Vault
metadata:
  name: vault
  namespace: vault
spec:
  size: 1
  image: hashicorp/vault:1.18.4
  bankVaultsImage: ghcr.io/bank-vaults/bank-vaults:v1.31.1

  unsealConfig:
    kubernetes:
      secretNamespace: vault
    # file ストレージの場合は raft 関連の引数を不要にするため、空のオプションを明示
    options:
      - --mode=k8s

  config:
    storage:
      file:
        path: /vault/file
    listener:
      tcp:
        address: "0.0.0.0:8200"
        tls_disable: true
    api_addr: "http://vault.vault:8200"
    ui: true

  externalConfig:
    auth:
      - type: kubernetes
        path: kubernetes
        roles:
          - name: eso-prd
            bound_service_account_names: ["external-secrets"]
            bound_service_account_namespaces: ["external-secrets"]
            policies: ["eso-readonly"]
            ttl: 24h
          - name: eso-dev
            bound_service_account_names: ["external-secrets"]
            bound_service_account_namespaces: ["external-secrets"]
            policies: ["eso-readonly"]
            ttl: 24h

    secretEngines:
      - path: secret
        type: kv
        options:
          version: "2"

    policies:
      - name: eso-readonly
        rules: |
          path "secret/data/*" {
            capabilities = ["read"]
          }
          path "secret/metadata/*" {
            capabilities = ["list"]
          }

  # 永続ストレージへの書き込み権限と、Probe の緩和
  vaultContainerSpec:
    securityContext:
      runAsUser: 100
      runAsGroup: 1000
      fsGroup: 1000
    livenessProbe:
      httpGet:
        path: /v1/sys/health
        port: 8200
      initialDelaySeconds: 60
    readinessProbe:
      httpGet:
        path: /v1/sys/health?uninitcode=200
        port: 8200

  volumeClaimTemplates:
    - metadata:
        name: vault-raft # 名前は互換性のために維持
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
