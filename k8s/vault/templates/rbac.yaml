apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-secrets-manager
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-secrets-manager
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-secrets-manager
subjects:
  - kind: ServiceAccount
    name: default
    namespace: vault
