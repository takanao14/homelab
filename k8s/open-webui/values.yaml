# Common values for the upstream open-webui chart
# (https://helm.openwebui.com/). Per-env overrides live in <env>/values.yaml.
ollama:
  enabled: false
ollamaUrls:
  - http://ollama.ollama.svc.cluster.local:11434

pipelines:
  enabled: false

enableOpenaiApi: true
openaiBaseApiUrls:
  - http://lemonade-server.lemonade-server.svc.cluster.local:13305/v1
openaiApiKeys:
  - "dummy"

persistence:
  enabled: true
  size: 2Gi

# Resource reservations. Without requests this runs as BestEffort, invisible to
# the scheduler and first to be evicted under node memory pressure. At roughly
# 1.6Gi resident this is the largest workload in the cluster, so leaving it
# unaccounted for skewed scheduling the most.
#
# Sizing basis: 7-day observed usage, mean 1644Mi and high-water 1937Mi, p95 CPU
# 1.0m. The figures come from container_memory_max_usage_bytes rather than
# container_memory_working_set_bytes: the working set is sampled every 30s and
# misses spikes between scrapes, which is how an earlier limit on the Argo CD
# application controller ended up far too low. The limit here is set well above
# high-water for the same reason, with extra room because chat and embedding
# workloads vary. CPU carries requests only, to avoid CFS throttling on an
# otherwise idle node.
resources:
  requests:
    cpu: 25m
    memory: 1792Mi
  limits:
    memory: 3Gi

websocket:
  redis:
    # Observed: mean 28Mi, high-water 31Mi, p95 CPU 2.6m.
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        memory: 96Mi

ingress:
  enabled: false

route:
  enabled: true
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway-envoy
      namespace: gateway-system
      sectionName: https
