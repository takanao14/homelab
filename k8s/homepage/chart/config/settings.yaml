---
# https://gethomepage.dev/latest/configs/settings/
title: HomeLab Portal
description: Homelab Portal
logpath: stdout
disableCollapse: true
useEqualHeights: true

# Group display order and rendering style.
# Keys must match the group names in services.yaml exactly.
layout:
  Hypervisor:
    style: row
    columns: 5
  Storage:
    style: row
    columns: 3
  DNS:
    style: row
    columns: 5
  Infrastructure:
    style: row
    columns: 2
  Monitoring:
    style: row
    columns: 2
  Development:
    style: row
    columns: 2
  CI/CD:
    style: row
    columns: 3
  AI:
    style: row
    columns: 3
  Remote Management:
    style: row
    columns: 1
  Network:
    style: row
    columns: 3
