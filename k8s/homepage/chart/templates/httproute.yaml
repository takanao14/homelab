apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - {{ .Values.hostname }}
  rules:
    - backendRefs:
        - name: homepage
          port: 80
