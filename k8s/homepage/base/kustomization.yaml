apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- deployment.yaml
- homepage-k8s.yaml

configMapGenerator:
  - name: homepage-config
    files:
      - config/settings.yaml
      - config/services.yaml
      - config/widgets.yaml
      - config/bookmarks.yaml
      - config/docker.yaml
      - config/kubernetes.yaml
      - config/proxmox.yaml
      - config/custom.css
      - config/custom.js
