---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage-sa
  namespace: homepage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-rolebinding
subjects:
  - kind: ServiceAccount
    name: homepage-sa
    namespace: homepage
roleRef:
  kind: ClusterRole
  name: homepage-role
  apiGroup: rbac.authorization.k8s.io
