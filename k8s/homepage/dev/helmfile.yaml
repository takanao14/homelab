releases:
  - name: homepage
    namespace: homepage
    chart: ../chart
    createNamespace: true
    values:
      - ../values-common.yaml.gotmpl
      - values.yaml.gotmpl
    hooks:
      - events: [prepare]
        command: bash
        args:
          - -c
          - |
            ctx=$(kubectl config current-context 2>/dev/null || echo "none")
            if [[ "$ctx" != "dev-homelab" ]]; then
              echo "ERROR: wrong cluster — expected dev-homelab, got: $ctx" >&2
              exit 1
            fi
