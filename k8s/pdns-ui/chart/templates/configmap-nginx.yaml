apiVersion: v1
kind: ConfigMap
metadata:
  name: pdns-ui-nginx
  namespace: {{ .Values.namespace }}
  labels:
    app: pdns-ui
data:
  # Rendered by the nginx entrypoint into /etc/nginx/conf.d/default.conf.
  # NGINX_ENVSUBST_FILTER (see deployment.yaml) limits substitution to PDNS_*,
  # so nginx's own $host / $uri variables survive envsubst untouched.
  default.conf.template: |
    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # The injected API key grants full write access to PowerDNS. Records are
        # owned by dnscontrol, so this vhost forwards read-only verbs only and
        # the key itself never leaves the pod.
        location /api/ {
            limit_except GET HEAD {
                deny all;
            }
            proxy_pass http://${PDNS_BACKEND}/api/;
            proxy_set_header X-API-Key "${PDNS_API_KEY}";
            proxy_set_header Host $host;
        }

        location / {
            limit_except GET HEAD {
                deny all;
            }
            try_files $uri $uri/ =404;
        }
    }
