# Common values for all environments. Headlamp runs in-cluster (upstream
# chart default): ServiceAccount RBAC only, no kubeconfig secrets. Per-env
# differences (hostname) live in k8s/headlamp/<env>/values.yaml.
headlamp:
  namespaceOverride: headlamp
  httpRoute:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: shared-gateway-envoy
        namespace: gateway-system
        sectionName: https
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - group: ""
            kind: Service
            name: headlamp
            port: 80
            weight: 1
