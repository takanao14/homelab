headlamp:
  config:
    extraArgs:
      - "-kubeconfig=/headlamp/dev-kubeconfig:/headlamp/prd-kubeconfig"
  volumeMounts:
    - name: dev-kubeconfig
      mountPath: /headlamp/dev-kubeconfig
      subPath: kubeconfig
      readOnly: true
    - name: prd-kubeconfig
      mountPath: /headlamp/prd-kubeconfig
      subPath: kubeconfig
      readOnly: true
  volumes:
    - name: dev-kubeconfig
      secret:
        secretName: headlamp-dev-kubeconfig
    - name: prd-kubeconfig
      secret:
        secretName: headlamp-prd-kubeconfig
  httpRoute:
    enabled: true
    parentRefs:
      - name: shared-gateway
        namespace: gateway-system
        sectionName: https
