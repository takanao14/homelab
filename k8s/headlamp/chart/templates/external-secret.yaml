apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-dev-kubeconfig
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: headlamp-dev-kubeconfig
    creationPolicy: Owner
  data:
    - secretKey: kubeconfig
      remoteRef:
        key: kubeconfig/dev
        property: kubeconfig
