apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      tolerations: {{ toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: vllm
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          args:
            - serve
            - {{ .Values.model | quote }}
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --max-model-len
            - {{ .Values.maxModelLen | quote }}
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - containerPort: 8000
          resources: {{ toYaml .Values.resources | nindent 12 }}
          env:
            - name: HF_HOME
              value: /root/.cache/huggingface
            {{- if .Values.hfToken }}
            - name: HUGGING_FACE_HUB_TOKEN
              value: {{ .Values.hfToken | quote }}
            {{- end }}
          volumeMounts:
            - name: cache
              mountPath: /root/.cache/huggingface
            - name: kfd
              mountPath: /dev/kfd
            - name: dri
              mountPath: /dev/dri
          securityContext:
            seccompProfile:
              type: Unconfined
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: vllm-cache
        - name: kfd
          hostPath:
            path: /dev/kfd
        - name: dri
          hostPath:
            path: /dev/dri
