replicaCount: 0

image:
  repository: vllm/vllm-rocm
  tag: latest

# Model to serve (HuggingFace model ID)
model: Qwen/Qwen2.5-7B-Instruct

# Max context length (reduce if OOM)
maxModelLen: 8192

resources:
  limits:
    amd.com/gpu: "1"
  requests:
    amd.com/gpu: "1"

storage:
  size: 50Gi
  storageClassName: openebs-hostpath

nodeSelector:
  gpu: amd

tolerations:
  - key: gpu
    operator: Equal
    value: amd
    effect: NoSchedule

# Optional: HuggingFace token for gated models
hfToken: ""

# vLLM extra args appended to `vllm serve`
extraArgs: []
