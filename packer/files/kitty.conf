# System-wide kitty defaults for golden-image VMs.
# kitty reads this from /etc/xdg/kitty/kitty.conf (XDG_CONFIG_DIRS), so every
# user gets the UDEV Gothic NF font baked alongside it under
# /usr/local/share/fonts.

# font
font_family      UDEV Gothic NFLG
bold_font        UDEV Gothic NFLG Bold
italic_font      UDEV Gothic NFLG Italic
bold_italic_font UDEV Gothic NFLG Bold Italic
font_size 12.0
