name: Build ArgoCD CMP Image

on:
  push:
    branches:
      - main
      - feat/**
    paths:
      - 'docker/argocd-helm-secrets-cmp/Dockerfile'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/argocd-helm-secrets-cmp
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/argocd-helm-secrets-cmp:latest
