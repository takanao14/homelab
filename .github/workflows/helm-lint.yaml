name: Helm Lint

on:
  pull_request:
    paths:
      - "k8s/**/Chart.yaml"
      - "k8s/**/values*.yaml"
      - "k8s/argocd/**/*.yaml"

jobs:
  lint:
    name: helm-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5

      - name: Helm dependency update & lint
        run: |
          find k8s -name "Chart.yaml" | while read chart; do
            dir=$(dirname "$chart")
            if grep -q "dependencies:" "$chart"; then
              helm dependency update "$dir"
            fi
            helm lint "$dir"
          done

      - name: Install yq
        env:
          # renovate: datasource=github-releases depName=mikefarah/yq
          YQ_VERSION: "v4.53.3"
        run: |
          set -euo pipefail
          curl -fsSL -o "${RUNNER_TEMP}/yq" \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          chmod +x "${RUNNER_TEMP}/yq"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      # ArgoCD Applications that reference a remote chart (repoURL+chart, as
      # opposed to a path into this repo) have no local Chart.yaml, so the
      # lint loop above never touches them. The Application manifests are
      # themselves templates of the shared app-of-apps chart, so render that
      # chart with each environment's values first, then validate every
      # enabled remote source against its pinned targetRevision to catch
      # incompatible chart/values bumps. Apps disabled in every environment
      # are not rendered and therefore not validated, mirroring what ArgoCD
      # would actually deploy.
      - name: Validate ArgoCD remote Helm sources
        run: |
          set -euo pipefail
          for env in prd sandbox; do
            rendered="${RUNNER_TEMP}/argocd-apps-${env}.yaml"
            helm template root-apps k8s/argocd/apps \
              -f "k8s/argocd/${env}/apps-values.yaml" > "$rendered"
            yq -o=json -I=0 \
              'select(.kind == "Application") | .spec.sources[] | select(has("chart"))' \
              "$rendered" |
            while IFS= read -r src; do
              repo=$(jq -r '.repoURL' <<<"$src")
              chart=$(jq -r '.chart' <<<"$src")
              version=$(jq -r '.targetRevision' <<<"$src")
              ignore_missing=$(jq -r '.helm.ignoreMissingValueFiles // false' <<<"$src")
              args=()
              while IFS= read -r vf; do
                [ -z "$vf" ] && continue
                # "$values" is the ref source pointing at this repo's root
                path="${vf#\$values/}"
                if [ -f "$path" ]; then
                  args+=(-f "$path")
                elif [ "$ignore_missing" != "true" ]; then
                  echo "::error::${env}/${chart}: value file ${path} not found"
                  exit 1
                fi
              done < <(jq -r '.helm.valueFiles // [] | .[]' <<<"$src")
              echo "::group::validate ${env} ${chart} ${version}"
              helm template "$chart" --repo "$repo" --version "$version" \
                ${args[@]+"${args[@]}"} > /dev/null
              echo "::endgroup::"
            done
          done
