name: Terraform Lint

on:
  pull_request:
    paths:
      - "tf/**"

jobs:
  lint:
    name: tf-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Check formatting
        run: terraform fmt -check -recursive tf/

      - name: Check Terragrunt HCL formatting
        env:
          # renovate: datasource=github-releases depName=gruntwork-io/terragrunt
          TERRAGRUNT_VERSION: "v1.1.1"
        run: |
          set -euo pipefail
          curl -fsSL -o "${RUNNER_TEMP}/terragrunt" \
            "https://github.com/gruntwork-io/terragrunt/releases/download/${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
          chmod +x "${RUNNER_TEMP}/terragrunt"
          "${RUNNER_TEMP}/terragrunt" hcl format --check --diff --working-dir tf

      # Modules don't declare the provider themselves (it is injected into each
      # stack by terragrunt from tf/provider.tf). Copy that same file in so init
      # resolves bpg/proxmox at the pinned version, then validate the module's
      # resources against that provider's schema. -backend=false needs no creds.
      - name: Validate modules against the pinned provider
        run: |
          set -euo pipefail
          for dir in tf/modules/*/; do
            echo "::group::validate ${dir}"
            cp tf/provider.tf "${dir}provider.tf"
            terraform -chdir="${dir}" init -backend=false -input=false -no-color
            terraform -chdir="${dir}" validate -no-color
            rm -f "${dir}provider.tf"
            echo "::endgroup::"
          done
