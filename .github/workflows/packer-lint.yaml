name: Packer Lint

on:
  pull_request:
    paths:
      - "packer/**"

jobs:
  lint:
    name: packer-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-packer@v3
        with:
          # renovate: datasource=github-releases depName=hashicorp/packer
          version: "1.15.4"

      - name: Check formatting
        run: packer fmt -check -recursive packer/

      # Templates read the builder's SSH public key via
      # file("~/.ssh/id_ed25519.pub"); provide a stub so validate can evaluate
      # locals on the runner. The content is never used beyond interpolation.
      - name: Create stub SSH public key
        run: |
          mkdir -p ~/.ssh
          echo "ssh-ed25519 AAAA ci-stub" > ~/.ssh/id_ed25519.pub

      # Full validate checks attributes against the qemu plugin schema. It also
      # fetches each template's iso_checksum URL (file:https://...), so a brief
      # upstream mirror outage can fail a run; retry once to absorb transient
      # network errors.
      - name: Validate templates
        working-directory: packer
        run: |
          set -euo pipefail
          validate() {
            packer validate \
              -var output_directory=output-ci \
              -var vm_name=ci.qcow2 \
              -var image_name=images/ci.img \
              -var user_password=ci-stub \
              "$1"
          }
          for template in *.pkr.hcl; do
            echo "::group::validate ${template}"
            packer init "$template"
            if ! validate "$template"; then
              echo "Transient failure validating ${template}; retrying in 15s..."
              sleep 15
              validate "$template"
            fi
            echo "::endgroup::"
          done
