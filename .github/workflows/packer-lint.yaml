name: Packer Lint

on:
  pull_request:
    paths:
      - "packer/**"

jobs:
  lint:
    name: packer-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-packer@v3
        with:
          # renovate: datasource=github-releases depName=hashicorp/packer
          version: "1.15.4"

      - name: Check formatting
        run: packer fmt -check -recursive packer/

      # Validate every var file against its template (vars/*-xrdp.pkrvars.hcl
      # -> xrdp.pkr.hcl, the rest -> basic.pkr.hcl; same convention as
      # build.sh). Full validate checks attributes against the qemu plugin
      # schema. It also fetches each target's iso_checksum URL
      # (file:https://...), so a brief upstream mirror outage can fail a run;
      # retry once to absorb transient network errors. ssh_pubkey is stubbed so
      # validate needs no key file on the runner (empty default = read the
      # builder's ~/.ssh/id_ed25519.pub).
      - name: Validate templates
        working-directory: packer
        run: |
          set -euo pipefail
          validate() {
            packer validate \
              -var-file "$1" \
              -var output_directory=output-ci \
              -var vm_name=ci.qcow2 \
              -var image_name=images/ci.img \
              -var user_password=ci-stub \
              -var ssh_pubkey="ssh-ed25519 AAAA ci-stub" \
              "$2"
          }
          packer init basic.pkr.hcl
          packer init xrdp.pkr.hcl
          for var_file in vars/*.pkrvars.hcl; do
            case "$var_file" in
              *-xrdp.pkrvars.hcl) template="xrdp.pkr.hcl" ;;
              *) template="basic.pkr.hcl" ;;
            esac
            echo "::group::validate ${var_file} (${template})"
            if ! validate "$var_file" "$template"; then
              echo "Transient failure validating ${var_file}; retrying in 15s..."
              sleep 15
              validate "$var_file" "$template"
            fi
            echo "::endgroup::"
          done
